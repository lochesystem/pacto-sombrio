  titleGrd.addColorStop(0, '#7733aa');
  titleGrd.addColorStop(0.5, '#5c2488');
  titleGrd.addColorStop(1, '#7733aa88');
  ctx.fillStyle = titleGrd;
  ctx.beginPath();
  ctx.moveTo(px + 4, ty);
  ctx.lineTo(px + pw - 4, ty);
  ctx.lineTo(px + pw - 2, ty + th);
  ctx.lineTo(px + 2, ty + th);
  ctx.closePath();
  ctx.fill();

  ctx.font = 'bold italic 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8dcc8';
  ctx.shadowColor = '#7733aa';
  ctx.shadowBlur = 8;
  ctx.fillText(text, px + pw / 2, ty + th / 2);
  ctx.shadowBlur = 0;
  ctx.restore();
};

const drawPersonaBtn = (bx, by, bw, bh, text, hov) => {

  ctx.moveTo(bx - 4, by - 3);
  ctx.lineTo(bx + bw + 4, by - 3);
  ctx.lineTo(bx + bw + 6, by + bh + 3);
  ctx.lineTo(bx - 6, by + bh + 3);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = hov ? '#1a1230' : '#0c081e';

  ctx.lineTo(bx + bw + 3, by + bh);

  ctx.font = 'bold italic 15px sans-serif';

  ctx.fillStyle = hov ? '#d4a645' : '#e0d8c8';

const renderEvent = () => {
  ctx.fillStyle = '#08061a';
  ctx.fillRect(0, 0, W, H);

  const px = W / 2 - 300, py = 50, pw = 600, ph = 620;
  drawPersonaPanel(px, py, pw, ph);

  const evt = eventData.current;
  if (!evt) return;

  drawPersonaTitle(evt.n.toUpperCase(), px, pw, py + 10, 50);

  const descLines = wrapText(evt.d, 480, 15);
  ctx.save();
  ctx.transform(1, 0, -0.07, 1, 0, 0);
  ctx.font = 'italic 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#a89880';
  let dy = py + 90;
  for (const line of descLines) {
    ctx.fillText(line, px + pw / 2, dy);
    dy += 22;
  }
  ctx.restore();

  if (eventData.pickingCard) {
    ctx.save();
    ctx.transform(1, 0, -0.07, 1, 0, 0);
    ctx.font = 'bold italic 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4d03f';
    ctx.fillText('ESCOLHA UMA CARTA', px + pw / 2, 190);
    ctx.restore();

    const evtCardScale = isTouchDevice ? 1.45 : 1;
    const evtCardSpace = isTouchDevice ? 230 : 160;
    for (let i = 0; i < eventData.cardChoices.length; i++) {
      const cardX = W / 2 + (i - 1) * evtCardSpace;
      const cardY = 340;
      const hitW = CARD_W * evtCardScale + 20, hitH = CARD_H * evtCardScale + 20;
      const hov = isInRect(mouse.x, mouse.y, cardX - hitW / 2, cardY - hitH / 2, hitW, hitH);
      drawCard(cardX, cardY, eventData.cardChoices[i], evtCardScale, hov, true);
    }

    const skipX = W / 2 - 80, skipY = 520, skipW = 160, skipH = 40;
    const skipHov = isInRect(mouse.x, mouse.y, skipX, skipY, skipW, skipH);
    drawPersonaBtn(skipX, skipY, skipW, skipH, 'PULAR', skipHov);
  } else if (eventData.pickingRemove) {
    ctx.save();
    ctx.transform(1, 0, -0.07, 1, 0, 0);
    ctx.font = 'bold italic 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aa55dd';
    ctx.fillText('ESCOLHA UMA CARTA PARA REMOVER', px + pw / 2, 190);
    ctx.restore();

    const rmCards = eventData.removeChoices;
    const rmCols = 5;
    const rmCardScale = 0.55;
    const rmCW = CARD_W * rmCardScale;
    const rmCH = CARD_H * rmCardScale;
    const rmGapX = 15;
    const rmGapY = 12;
    const rmGridLeft = (W - (rmCols * rmCW + (rmCols - 1) * rmGapX)) / 2;
    const rmGridTop = 210;
    const rmClipTop = 205;
    const rmClipBot = py + ph - 70;
    const rmRowH = rmCH + rmGapY;
    const rmTotalRows = Math.ceil(rmCards.length / rmCols);
    const rmContentH = rmTotalRows * rmRowH;
    const rmMaxScroll = Math.max(0, rmContentH - (rmClipBot - rmClipTop));
    if (eventData.removeScrollY > rmMaxScroll) eventData.removeScrollY = rmMaxScroll;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, rmClipTop, W, rmClipBot - rmClipTop);
    ctx.clip();

    for (let ri = 0; ri < rmCards.length; ri++) {
      const col = ri % rmCols;
      const row = Math.floor(ri / rmCols);
      const cx = rmGridLeft + col * (rmCW + rmGapX) + rmCW / 2;
      const cy = rmGridTop + row * rmRowH + rmCH / 2 - eventData.removeScrollY;

      if (cy + rmCH / 2 < rmClipTop || cy - rmCH / 2 > rmClipBot) continue;

      const hov = isInRect(mouse.x, mouse.y, cx - rmCW / 2, cy - rmCH / 2, rmCW, rmCH);
      drawCard(cx, cy, rmCards[ri].card, rmCardScale, hov, true);

      if (hov) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#6622aa';
        ctx.beginPath();
        const lx = cx - rmCW / 2;
        const ly = cy - rmCH / 2;
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx + rmCW, ly);
        ctx.lineTo(lx + rmCW, ly + rmCH);
        ctx.lineTo(lx, ly + rmCH);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#aa55dd';
        ctx.fillText('✕', cx, cy);
      }
    }

    ctx.restore();

    if (eventData.removeScrollY > 0) {
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#7733aa';
      ctx.fillText('▲', W / 2, rmClipTop + 12);
    }
    if (eventData.removeScrollY < rmMaxScroll) {
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#7733aa';
      ctx.fillText('▼', W / 2, rmClipBot - 4);
    }
  } else if (eventData.done) {
    const resultLines = wrapText(eventData.resultText, 460, 16);
    ctx.save();
    ctx.transform(1, 0, -0.07, 1, 0, 0);

    const resY = 310;
    const resW = 480;
    const resH = 16 + resultLines.length * 22;
    const resX = px + pw / 2 - resW / 2;
    ctx.fillStyle = '#0c0e1a';
    ctx.beginPath();
    ctx.moveTo(resX, resY);
    ctx.lineTo(resX + resW, resY);
    ctx.lineTo(resX + resW + 3, resY + resH);
    ctx.lineTo(resX - 3, resY + resH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#28aa5566';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = 'bold italic 16px sans-serif';
    ctx.fillStyle = '#33cc33';
    let ry = resY + 14;
    for (const line of resultLines) {
      ctx.fillText(line, px + pw / 2, ry);
      ry += 22;
    }
    ctx.restore();

    const contX = W / 2 - 80, contY = 500, contW = 160, contH = 44;

const processEventChoice = (choiceAction) => {
  eventData.done = true;
  switch (choiceAction) {
    case 'darkShrine':
      game.hp = Math.max(1, game.hp - 15);
      {
        const owned = new Set(game.relics);
        const available = RELICS.filter(r => !owned.has(r.id));
        if (available.length > 0) {
          const rel = available[randInt(0, available.length - 1)];
          game.relics.push(rel.id);
          eventData.resultText = `Perdeu 15 HP. Ganhou ${rel.n}!`;
        } else {
          eventData.resultText = 'Perdeu 15 HP. Não há relíquias disponíveis.';
        }
      }
      break;
    case 'removeCard':
      if (game.deck.length > 0) {
        eventData.done = false;
        eventData.pickingRemove = true;
        eventData.removeChoices = game.deck.map((c, i) => ({ card: c, deckIdx: i }));
        eventData.removeScrollY = 0;
      } else {
        eventData.resultText = 'Baralho vazio!';
      }
      break;
    case 'gold50':
      game.gold += 50;
      eventData.resultText = 'Ganhou 50 de ouro!';
      break;
    case 'gold80':
      game.gold += 80;
      eventData.resultText = 'Ganhou 80 de ouro!';
      break;
    case 'gainCard': {
      const pool = getCardPool();
      shuffle(pool);
      const offered = pool.slice(0, 3);
      eventData.done = false;
      eventData.pickingCard = true;
      eventData.cardChoices = offered.map(cid => makeCard(cid));
      break;
    }
    case 'heal20':
      {
        const heal = Math.floor(game.maxHp * 0.2);
        game.hp = Math.min(game.maxHp, game.hp + heal);
        eventData.resultText = `Curou ${heal} HP!`;
      }
      break;
    case 'mysticPool':
      if (Math.random() < 0.5) {
        const heal = 30;
        game.hp = Math.min(game.maxHp, game.hp + heal);
        eventData.resultText = `Sorte! Curou ${heal} HP!`;
      } else {
        game.hp = Math.max(1, game.hp - 15);
        eventData.resultText = 'Azar! Perdeu 15 HP!';
      }
      break;
    case 'darkAltar':
      game.hp = Math.max(1, game.hp - 20);
      {
        const rareCards = [];
        for (const i of getCardPool()) {
          const r = CARDS[i].r;
          if (r === 'rare' || r.endsWith('_rare')) rareCards.push(i);
        }
        if (rareCards.length > 0) {
          const cid = rareCards[randInt(0, rareCards.length - 1)];
          game.deck.push(makeCard(cid));
          eventData.resultText = `Perdeu 20 HP. Ganhou ${CARDS[cid].n}!`;
        } else {
          eventData.resultText = 'Perdeu 20 HP. Nada aconteceu.';
        }
      }
      break;
    case 'leave':
    default:
      eventData.resultText = 'Seguiu em frente.';
      break;
  }
};

  ctx.lineTo(W * 0.15, -20);

    ctx.moveTo(lx, -20);

// ==================== STATE TRANSITIONS ====================
const fadeToState = (newState, callback) => {
  game.fadeDir = 1;
  game.fadeCallback = () => {
    if (callback) callback();
    game.state = newState;
    if (newState === 'map') centerMapOnFloor(Math.max(0, game.floor));
    if (newState === 'gameover' || newState === 'victory') game._endHandled = false;
    game.fadeDir = -1;
  };
};

const startNewRun = (character) => {
  const ch = character || game.character || 'pacto';
  game.character = ch;
  game.act = 1;
  game.floor = -1;
  game.nodeIdx = -1;
  game.maxHp = ch === 'sombra' ? 70 : ch === 'cinza' ? 65 : 80;
  game.gold = ch === 'sombra' ? 99 : ch === 'cinza' ? 80 : 99;

  const upLv = (id) => meta.upgrades[id] || 0;
  game.maxHp += upLv('hp1') * 5;
  game.hp = game.maxHp;
  game.gold += upLv('gold1') * 15;

  game.deck = makeStarterDeck(ch);
  game.relics = [];
  game.potions = [];

  if (upLv('potion1') >= 1) game.potions.push(POTIONS.find(p => p.id === 'heal'));
  if (upLv('startRelic') >= 1) {
    const available = RELICS.filter(r => !game.relics.includes(r.id));
    if (available.length > 0) game.relics.push(available[randInt(0, available.length - 1)].id);
  }

  game.stats = { enemiesKilled: 0, cardsPlayed: 0, damageDealt: 0, floorsCleared: 0, elitesKilled: 0, bossesKilled: 0 };
  game.map = generateMap();
  game.menuTime = 0;
  mapScrollY = 0;
  particles.length = 0;
  floatingTexts.length = 0;
  tweens.length = 0;
  clearRunSave();
};

const enterNode = (floor, nodeIdx) => {
  game.floor = floor;
  game.nodeIdx = nodeIdx;
  game.map[floor][nodeIdx].visited = true;
  const nodeType = game.map[floor][nodeIdx].type;
  saveRun(nodeType);

  switch (nodeType) {
    case 'combat':
      fadeToState('combat', () => startCombat('normal'));
      break;
    case 'elite':
      fadeToState('combat', () => startCombat('elite'));
      break;
    case 'boss':
      fadeToState('combat', () => startCombat('boss'));
      break;
    case 'event':
      fadeToState('event', () => {
        eventData.current = EVENTS[randInt(0, EVENTS.length - 1)];
        eventData.done = false;
        eventData.resultText = '';
        eventData.pickingCard = false;
        eventData.pickingRemove = false;
        eventData.cardChoices = [];
        eventData.removeChoices = [];
        eventData.removeScrollY = 0;
      });
      break;
    case 'shop':
      fadeToState('shop', () => initShop());
      break;
    case 'rest':
      fadeToState('rest', () => { restData.choosing = false; });
      break;
    default:
      fadeToState('combat', () => startCombat('normal'));
      break;
  }
};

const returnToMap = () => {
  const nodeType = game.map[game.floor][game.nodeIdx].type;
  if (nodeType === 'boss') {
    meta.actsCleared = Math.max(meta.actsCleared || 0, game.act);
    saveMeta();
    if (game.act < 3) {
      game.act++;
      game.floor = -1;
      game.nodeIdx = -1;
      game.map = generateMap();
      saveRun('map');
      fadeToState('map');
    } else {
      fadeToState('victory');
    }
  } else {
    saveRun('map');
    fadeToState('map');
  }
};

// ==================== POTION USAGE ====================
const getPotion = (p) => typeof p === 'string' ? POTIONS.find(pt => pt.id === p) || { id: p, n: p, d: '', color: '#aaa' } : p;

const usePotion = (potionIdx) => {
  if (potionIdx < 0 || potionIdx >= game.potions.length) return;
  const pot = getPotion(game.potions[potionIdx]);
  let used = false;
  switch (pot.id) {
    case 'heal':
      const healAmt = Math.floor(game.maxHp * 0.3);
      game.hp = Math.min(game.maxHp, game.hp + healAmt);
      addFloatingText(140, 390, `+${healAmt} HP`, '#33cc33', 18);
      spawnParticles(140, 410, '#33cc33', 10, 30);
      sfxHeal();
      used = true;
      break;
    case 'block':
      if (game.state === 'combat') {
        combat.playerBlock += 12;
        addFloatingText(140, 390, '+12 Bloqueio', '#3366cc', 18);
        spawnParticles(140, 410, '#3366cc', 10, 30);
        sfxBlock();
        used = true;
      }
      break;
    case 'strength':
      if (game.state === 'combat') {
        combat.playerStrength += 2;
        addFloatingText(140, 390, '+2 Força', '#cc3333', 18);
        spawnParticles(140, 410, '#cc3333', 10, 30);
        sfxBuff();
        used = true;
      }
      break;
    case 'energy':
      if (game.state === 'combat') {
        combat.energy += 2;
        addFloatingText(140, 390, '+2 Energia', '#f39c12', 18);
        spawnParticles(140, 410, '#f39c12', 10, 30);
        sfxBuff();
        used = true;
      }
      break;
  }
  if (used) {
    game.potions.splice(potionIdx, 1);
    meta.totalPotionsUsed = (meta.totalPotionsUsed || 0) + 1;
    checkTrophies();
  }
};

});

document.addEventListener('keydown', (e) => {

      gamePaused = true;

  }
  if (e.key === 'h' || e.key === 'H') {

});

// ==================== TOUCH HANDLING ====================
let touchStartY = 0;
let touchStartX = 0;
let touchScrolling = false;
let touchMoved = false;
const TOUCH_SCROLL_THRESHOLD = 8;

const touchToCanvas = (touch) => {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top) * (H / rect.height),
  };
};

const applyTouchScroll = (deltaY) => {
  const dy = deltaY * 1.2;
  if (showHelp) { helpScrollY = Math.max(0, helpScrollY + dy); return true; }
  if (game.state === 'trophies') { trophyScrollY = Math.max(0, trophyScrollY + dy); return true; }
  if (game.state === 'bestiary') { bestiaryScrollY = Math.max(0, bestiaryScrollY + dy); return true; }
  if (game.state === 'cardex') { cardexScrollY = Math.max(0, cardexScrollY + dy); return true; }
  if (game.state === 'map' && isTouchDevice) { mapScrollY = clamp(mapScrollY + dy, 0, getMapMaxScroll()); return true; }
  if (game.state === 'event' && eventData.pickingRemove) { eventData.removeScrollY = Math.max(0, eventData.removeScrollY + dy); return true; }
  if (game.state === 'shop' && shopData.pickingRemove) { shopData.removeScrollY = Math.max(0, shopData.removeScrollY + dy); return true; }
  if (game.state === 'rest' && restData.choosing) {
    const upgradeable = game.deck.filter(c => !c.upgraded && CARDS[c.id].r !== 'status');
    const totalRows = Math.ceil(upgradeable.length / 5);
    const rowH = 160, firstCardY = 340, clipBot = H - 110;
    const contentEnd = firstCardY + (totalRows - 1) * rowH + CARD_H * 0.4 + 10;
    const maxScroll = Math.max(0, contentEnd - clipBot);
    restData.scrollY = clamp(restData.scrollY + dy * 0.8, 0, maxScroll);
    return true;
  }
  return false;
};

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  startBGM();
  const t = e.touches[0];
  const p = touchToCanvas(t);
  mouse.x = p.x;
  mouse.y = p.y;
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchScrolling = false;
  touchMoved = false;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const p = touchToCanvas(t);
  mouse.x = p.x;
  mouse.y = p.y;

  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;

  if (!touchScrolling && (Math.abs(dy) > TOUCH_SCROLL_THRESHOLD || Math.abs(dx) > TOUCH_SCROLL_THRESHOLD)) {
    touchScrolling = true;
    touchMoved = true;
  }

  if (touchScrolling) {
    const scrollDy = touchStartY - t.clientY;
    touchStartY = t.clientY;
    touchStartX = t.clientX;
    applyTouchScroll(scrollDy);
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!touchMoved) {
    mouse.justClicked = true;
  }
  touchScrolling = false;
  touchMoved = false;
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  touchScrolling = false;
  touchMoved = false;
}, { passive: false });

document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });

document.addEventListener('touchmove', (e) => {
  if (e.target === canvas || e.target === document.body) e.preventDefault();
}, { passive: false });

document.body.addEventListener('scroll', (e) => e.preventDefault(), { passive: false });

const handleInput = () => {
  if (gamePaused || showHelp) {
    if (!mouse.justClicked) return;
    mouse.justClicked = false;

    if (showHelp) {
      const hpX = 60, hpW = W - 120, hpY = 30;
      const closeX = hpX + hpW - 25, closeY = hpY + 12;
      const closeR = isTouchDevice ? 22 : 15;
      if (isInRect(mouse.x, mouse.y, closeX - closeR, closeY - closeR, closeR * 2, closeR * 2)) {
        showHelp = false;
      }
      return;
    }
    if (gamePaused) {
      const pmW = isTouchDevice ? 400 : 300, pmBtnH = isTouchDevice ? 58 : 44, pmGap = isTouchDevice ? 16 : 12;
      const pmX = W / 2 - pmW / 2;
      const pmStartY = H / 2 - 80;
      for (let pi = 0; pi < 4; pi++) {
        const by = pmStartY + pi * (pmBtnH + pmGap);
        if (isInRect(mouse.x, mouse.y, pmX, by, pmW, pmBtnH)) {
          if (pi === 0) { gamePaused = false; }
          else if (pi === 1) { gamePaused = false; showHelp = true; helpScrollY = 0; }
          else if (pi === 2) { gamePaused = false; trophyScrollY = 0; fadeToState('trophies'); }
          else if (pi === 3) { gamePaused = false; tutorial.active = false; tutorial.finished = false; tutorial.step = 0; if (bgmCurrentTrack !== BGM_TRACKS.normal) switchBGM(BGM_TRACKS.normal); fadeToState('menu'); }
          break;
        }
      }
      return;
    }
    return;
  }
  if (!mouse.justClicked) {
    if (game.state === 'combat' && combat.playerTurn && !combat.animating) {
      const prevHovered = combat.hoveredCardIdx;
      combat.hoveredCardIdx = getHoveredCardIdx();
      combat.hoveredEnemyIdx = getHoveredEnemyIdx();

      if (combat.hoveredCardIdx !== prevHovered) {
        layoutHand();
        // Keep selected card lifted
        if (combat.selectedCardIdx >= 0 && combat.selectedCardIdx < combat.hand.length) {
          const selCard = combat.hand[combat.selectedCardIdx];
          selCard.targetY -= isTouchDevice ? 90 : 65;
          selCard.targetScale = isTouchDevice ? 1.5 : 1.05;
          selCard.hover = true;
        }
        if (combat.hoveredCardIdx >= 0 && combat.hoveredCardIdx !== combat.selectedCardIdx) {
          const card = combat.hand[combat.hoveredCardIdx];
          card.targetY -= isTouchDevice ? 55 : 40;
          card.targetScale = isTouchDevice ? 1.4 : 0.95;
          card.hover = true;
        }
      }
    }
    return;
  }

  mouse.justClicked = false;

  {
    const mob = isTouchDevice;
    const _btnSz = mob ? 32 : 22;
    const _btnY = mob ? 22 : 18;
    const _rightM = mob ? 16 : 14;
    const _mX = W - _rightM;
    const _hitP = mob ? 10 : 4;
    if (isInRect(mouse.x, mouse.y, _mX - _btnSz / 2 - _hitP, _btnY - _btnSz / 2 - _hitP, _btnSz + _hitP * 2, _btnSz + _hitP * 2)) {
      toggleBGM();
      return;
    }
  }

  sfxClick();

  // Global toolbar button clicks (matching new toolbar layout)
  if (!['menu', 'gameover', 'victory', 'charSelect', 'tutorialAsk', 'altar', 'trophies', 'bestiary', 'cardex'].includes(game.state)) {
    const mob = isTouchDevice;
    const btnSize = mob ? 32 : 22;
    const btnGap = mob ? 10 : 8;
    const btnY = mob ? 22 : 18;
    const rightMargin = mob ? 16 : 14;
    const hitPad = mob ? 10 : 4;

    const mX = W - rightMargin;
    const pbX = mX - btnSize - btnGap;
    const hbX = pbX - btnSize - btnGap;

    if (isInRect(mouse.x, mouse.y, pbX - btnSize / 2 - hitPad, btnY - btnSize / 2 - hitPad, btnSize + hitPad * 2, btnSize + hitPad * 2)) {
      gamePaused = true;
      return;
    }
    if (isInRect(mouse.x, mouse.y, hbX - btnSize / 2 - hitPad, btnY - btnSize / 2 - hitPad, btnSize + hitPad * 2, btnSize + hitPad * 2)) {
      showHelp = true;
      helpScrollY = 0;
      return;
    }
  }

  switch (game.state) {
    case 'menu': {
      const menuSpacing = isTouchDevice ? 55 : 45;
      const menuStartY = isTouchDevice ? 320 : 340;
      for (let mi = 0; mi < 7; mi++) {
        const iy = menuStartY + mi * menuSpacing;
        if (isInRect(mouse.x, mouse.y, 50, iy - 10, isTouchDevice ? 520 : 400, menuSpacing)) {
          if (mi === 0) {
            fadeToState('charSelect');
          } else if (mi === 1 && hasRunSave()) {
            if (loadRun()) {
              const ss = game._savedState || 'map';
              if (ss === 'map') {
                fadeToState('map');
              } else {
                // Re-enter the node (combat, event, shop, rest)
                fadeToState('map', () => {
                  setTimeout(() => {
                    const nodeType = game.map[game.floor] && game.map[game.floor][game.nodeIdx] && game.map[game.floor][game.nodeIdx].type;
                    if (!nodeType) return;
                    switch (nodeType) {
                      case 'combat': fadeToState('combat', () => startCombat('normal')); break;
                      case 'elite': fadeToState('combat', () => startCombat('elite')); break;
                      case 'boss': fadeToState('combat', () => startCombat('boss')); break;
                      case 'event':
                        fadeToState('event', () => {
                          eventData.current = EVENTS[randInt(0, EVENTS.length - 1)];
                          eventData.done = false; eventData.resultText = '';
                          eventData.pickingCard = false; eventData.pickingRemove = false;
                          eventData.cardChoices = []; eventData.removeChoices = [];
                          eventData.removeScrollY = 0;
                        }); break;
                      case 'shop': fadeToState('shop', () => initShop()); break;
                      case 'rest': fadeToState('rest', () => { restData.choosing = false; }); break;
                      default: fadeToState('map'); break;
                    }
                  }, 100);
                });
              }
            }
          } else if (mi === 2) {
            fadeToState('altar');
          } else if (mi === 3) {
            bestiaryScrollY = 0;
            fadeToState('bestiary');
          } else if (mi === 4) {
            cardexScrollY = 0;
            cardexFilter = 'all';
            fadeToState('cardex');
          } else if (mi === 5) {
            trophyScrollY = 0;
            fadeToState('trophies');
          } else if (mi === 6) {
            startNewRun(game.character || 'pacto');
            tutorial.askingPlayer = false;
            tutorial.active = true;
            tutorial.step = 0;
            tutorial.waitingConfirm = false;
            tutorial.enemyTurnDone = false;
            tutorial.finished = false;
            startTutorialCombat();
            fadeToState('combat');
          }
          break;
        }
      }
      break;
    }

    case 'map': {
      const reachable = getReachableNodes();
      for (const r of reachable) {
        const pos = getNodePos(r.floor, r.node, game.map[r.floor].length);
        const dx = mouse.x - pos.x;
        const dy = mouse.y - pos.y;
        const nodeHitR = isTouchDevice ? 38 : 20;
        if (dx * dx + dy * dy < nodeHitR * nodeHitR) {
          enterNode(r.floor, r.node);
          break;
        }
      }
      break;
    }

    case 'combat': {
      if (bossIntro) {
        if (bossIntro.timer < 3.5) bossIntro = null;
        break;
      }
      if (tutorial.active && !tutorial.finished) {
        handleTutorialClick();
        break;
      }
      if (!combat.playerTurn || combat.animating) break;

      const potSlotW = isTouchDevice ? 56 : 42, potSlotH = isTouchDevice ? 56 : 42, potGap = isTouchDevice ? 8 : 6;
      const potSlotX = isTouchDevice ? 340 : 290, potSlotY = isTouchDevice ? 395 : 420;
      for (let pi = 0; pi < game.potions.length; pi++) {
        const ppx = potSlotX + pi * (potSlotW + potGap);
        if (isInRect(mouse.x, mouse.y, ppx, potSlotY, potSlotW, potSlotH)) {
          usePotion(pi);
          break;
        }
      }

      // Targeting mode: click enemy to use selected attack card
      if (combat.targeting) {
        const eidx = getHoveredEnemyIdx();
        if (eidx >= 0 && combat.selectedCardIdx >= 0) {
          playCard(combat.selectedCardIdx, eidx);
        } else {
          const cidxT = getHoveredCardIdx();
          if (cidxT >= 0 && cidxT !== combat.selectedCardIdx) {
            // Clicked a different card while targeting — switch selection
            combat.targeting = false;
            combat.selectedCardIdx = -1;
            // Fall through handled below after break removal
          } else {
            combat.targeting = false;
            combat.selectedCardIdx = -1;
            layoutHand();
            break;
          }
        }
        if (combat.selectedCardIdx < 0) {
          // Fell through from card switch — re-process as new card click
        } else {
          break;
        }
      }

      const cidx = getHoveredCardIdx();
      if (cidx >= 0) {
        if (!canPlayCard(cidx)) {
          const cData = getCardData(combat.hand[cidx]);
          if (cData.c > combat.energy) {
            showCombatWarning(`⚡ Energia insuficiente! (${combat.energy}/${cData.c})`);
          } else if (cData.unplayable) {
            showCombatWarning('✖ Esta carta não pode ser jogada');
          } else if (!combat.playerTurn) {
            showCombatWarning('⏳ Aguarde seu turno');
          }
          combat.selectedCardIdx = -1;
          combat.targeting = false;
          layoutHand();
          break;
        }

        const card = combat.hand[cidx];
        const data = getCardData(card);
        const isAttackOne = data.t === 'attack' && data.tgt === 'one' && data.special !== 'reaper';

        if (combat.selectedCardIdx === cidx) {
          // Same card clicked again — confirm (non-targeting cards only)
          if (isAttackOne) {
            // Already in targeting, shouldn't reach here, but handle gracefully
            const alive = combat.enemies.filter(e => !e.dead);
            if (alive.length === 1) playCard(cidx, combat.enemies.indexOf(alive[0]));
          } else {
            playCard(cidx, -1);
          }
        } else {
          // Select card
          combat.selectedCardIdx = cidx;
          combat.targeting = false;
          layoutHand();
          card.targetY -= isTouchDevice ? 90 : 65;
          card.targetScale = isTouchDevice ? 1.5 : 1.05;
          card.hover = true;

          if (isAttackOne) {
            // Attack card — go straight to targeting
            const alive = combat.enemies.filter(e => !e.dead);
            if (alive.length === 1) {
              playCard(cidx, combat.enemies.indexOf(alive[0]));
            } else {
              combat.targeting = true;
            }
          }
        }
        break;
      }

      // Clicked on empty area — deselect
      if (combat.selectedCardIdx >= 0) {
        combat.selectedCardIdx = -1;
        combat.targeting = false;
        layoutHand();
        break;
      }

      const endBtnW = isTouchDevice ? 160 : 120, endBtnH = isTouchDevice ? 54 : 40;
      const endBtnX = W - endBtnW - 20, endBtnY = isTouchDevice ? 340 : 420;
      const endPad = isTouchDevice ? 8 : 0;
      if (isInRect(mouse.x, mouse.y, endBtnX - endPad, endBtnY - endPad, endBtnW + endPad * 2, endBtnH + endPad * 2)) {
        endPlayerTurn();
      }
      break;
    }

    case 'rewards': {
      if (!rewards.cardPicked && rewards.cards.length > 0) {
        const rwdScale = isTouchDevice ? 1.5 : 1;
        const rwdSpacing = isTouchDevice ? 240 : 160;
        for (let i = 0; i < rewards.cards.length; i++) {
          const cx = W / 2 + (i - 1) * rwdSpacing;
          const cy = 380;
          const hitW = CARD_W * rwdScale + 20, hitH = CARD_H * rwdScale + 20;
          if (isInRect(mouse.x, mouse.y, cx - hitW / 2, cy - hitH / 2, hitW, hitH)) {
            game.deck.push(rewards.cards[i]);
            rewards.cardPicked = true;
            break;
          }
        }
      }

      if (rewards.relic && !game.relics.includes(rewards.relic.id)) {
        game.relics.push(rewards.relic.id);
        rewards.relic = null;
      }

      const skipX = W / 2 - 80, skipY = 580, skipW = 160, skipH = 44;
      if (isInRect(mouse.x, mouse.y, skipX - 10, skipY - 5, skipW + 20, skipH + 10)) {
        returnToMap();
      }
      break;
    }

    case 'event': {
      const evt = eventData.current;
      if (!evt) break;

      if (eventData.pickingCard) {
        for (let i = 0; i < eventData.cardChoices.length; i++) {
          const cardX = W / 2 + (i - 1) * 160;
          const cardY = 340;
          if (isInRect(mouse.x, mouse.y, cardX - CARD_W / 2 - 10, cardY - CARD_H / 2 - 10, CARD_W + 20, CARD_H + 20)) {
            game.deck.push(eventData.cardChoices[i]);
            const cardName = getCardData(eventData.cardChoices[i]).n;
            eventData.pickingCard = false;
            eventData.cardChoices = [];
            eventData.done = true;
            eventData.resultText = `Ganhou ${cardName}!`;
            break;
          }
        }
        const skipX = W / 2 - 80, skipY = 520, skipW = 160, skipH = 40;
        if (isInRect(mouse.x, mouse.y, skipX - 10, skipY - 5, skipW + 20, skipH + 10)) {
          eventData.pickingCard = false;
          eventData.cardChoices = [];
          eventData.done = true;
          eventData.resultText = 'Você não escolheu nenhuma carta.';
        }
      } else if (eventData.pickingRemove) {
        const rmCards = eventData.removeChoices;
        const rmCols = 5;
        const rmCardScale = 0.55;
        const rmCW = CARD_W * rmCardScale;
        const rmCH = CARD_H * rmCardScale;
        const rmGapX = 15;
        const rmGapY = 12;
        const rmGridLeft = (W - (rmCols * rmCW + (rmCols - 1) * rmGapX)) / 2;
        const rmGridTop = 210;
        const rmClipTop = 205;
        const px = W / 2 - 300, py = 50, ph = 620;
        const rmClipBot = py + ph - 70;
        const rmRowH = rmCH + rmGapY;

        for (let ri = 0; ri < rmCards.length; ri++) {
          const col = ri % rmCols;
          const row = Math.floor(ri / rmCols);
          const cx = rmGridLeft + col * (rmCW + rmGapX) + rmCW / 2;
          const cy = rmGridTop + row * rmRowH + rmCH / 2 - eventData.removeScrollY;

          if (cy + rmCH / 2 < rmClipTop || cy - rmCH / 2 > rmClipBot) continue;

          if (isInRect(mouse.x, mouse.y, cx - rmCW / 2, cy - rmCH / 2, rmCW, rmCH)) {
            const removedCard = rmCards[ri].card;
            const cardName = getCardData(removedCard).n;
            const deckIdx = game.deck.indexOf(removedCard);
            if (deckIdx >= 0) game.deck.splice(deckIdx, 1);
            eventData.pickingRemove = false;
            eventData.removeChoices = [];
            eventData.done = true;
            eventData.resultText = `Removeu ${cardName} do baralho!`;
            break;
          }
        }
      } else if (eventData.done) {
        const contX = W / 2 - 80, contY = 500, contW = 160, contH = 44;
        if (isInRect(mouse.x, mouse.y, contX - 10, contY - 5, contW + 20, contH + 10)) {
          returnToMap();
        }
      } else {
        for (let i = 0; i < evt.choices.length; i++) {
          const btnX = W / 2 - 220, btnY = 300 + i * 60, btnW = 440, btnH = 45;
          if (isInRect(mouse.x, mouse.y, btnX - 10, btnY - 5, btnW + 20, btnH + 10)) {
            processEventChoice(evt.choices[i].action);
            break;
          }
        }
      }
      break;
    }

    case 'shop': {
      if (shopData.pickingRemove) {
        const rmCols = 5;
        const rmCardScale = 0.55;
        const rmCW = CARD_W * rmCardScale;
        const rmCH = CARD_H * rmCardScale;
        const rmGapX = 15;
        const rmGapY = 12;
        const rmGridLeft = (W - (rmCols * rmCW + (rmCols - 1) * rmGapX)) / 2;
        const rmGridTop = 180;
        const rmClipTop = 175;
        const rmClipBot = H - 80;
        const rmRowH = rmCH + rmGapY;

        for (let ri = 0; ri < game.deck.length; ri++) {
          const col = ri % rmCols;
          const row = Math.floor(ri / rmCols);
          const cx = rmGridLeft + col * (rmCW + rmGapX) + rmCW / 2;
          const cy = rmGridTop + row * rmRowH + rmCH / 2 - shopData.removeScrollY;

          if (cy + rmCH / 2 < rmClipTop || cy - rmCH / 2 > rmClipBot) continue;

          if (isInRect(mouse.x, mouse.y, cx - rmCW / 2, cy - rmCH / 2, rmCW, rmCH)) {
            const removedCard = game.deck[ri];
            game.gold -= shopData.removeCost;
            game.deck.splice(ri, 1);
            shopData.purchased['remove'] = true;
            shopData.pickingRemove = false;
            break;
          }
        }

        const cancelX = W / 2 - 80, cancelY = H - 65, cancelW = 160, cancelH = 40;
        if (isInRect(mouse.x, mouse.y, cancelX - 10, cancelY - 5, cancelW + 20, cancelH + 10)) {
          shopData.pickingRemove = false;
        }
        break;
      }

      for (let i = 0; i < shopData.cards.length; i++) {
        if (shopData.purchased[`card_${i}`]) continue;
        const item = shopData.cards[i];
        const cx = 60 + (i % 3) * 170 + CARD_W / 2;
        const cy = 150 + Math.floor(i / 3) * 220;
        if (isInRect(mouse.x, mouse.y, cx - CARD_W / 2 - 10, cy - CARD_H / 2 - 10, CARD_W + 20, CARD_H + 30)) {
          if (game.gold >= item.price) {
            game.gold -= item.price;
            game.deck.push(makeCard(item.cardId));
            shopData.purchased[`card_${i}`] = true;
            meta.totalShopBuys = (meta.totalShopBuys || 0) + 1;
            checkTrophies();
          }
          break;
        }
      }

      const rightX = Math.max(590, W * 0.52);
      for (let i = 0; i < shopData.relics.length; i++) {
        if (shopData.purchased[`relic_${i}`]) continue;
        const item = shopData.relics[i];
        const ry = 105 + i * 52;
        if (isInRect(mouse.x, mouse.y, rightX - 5, ry - 5, 380, 55)) {
          if (game.gold >= item.price) {
            game.gold -= item.price;
            game.relics.push(item.relic.id);
            shopData.purchased[`relic_${i}`] = true;
            meta.totalShopBuys = (meta.totalShopBuys || 0) + 1;
            checkTrophies();
          }
          break;
        }
      }

      for (let i = 0; i < shopData.potions.length; i++) {
        if (shopData.purchased[`potion_${i}`]) continue;
        const item = shopData.potions[i];
        const py = 260 + i * 45;
        if (isInRect(mouse.x, mouse.y, rightX - 5, py - 5, 380, 48)) {
          if (game.gold >= item.price && game.potions.length < 3) {
            game.gold -= item.price;
            game.potions.push(item.potion);
            shopData.purchased[`potion_${i}`] = true;
            meta.totalShopBuys = (meta.totalShopBuys || 0) + 1;
            checkTrophies();
          }
          break;
        }
      }

      const removeY = 370;
      if (!shopData.purchased['remove'] && !shopData.pickingRemove && isInRect(mouse.x, mouse.y, rightX - 5, removeY - 5, 380, 48)) {
        if (game.gold >= shopData.removeCost && game.deck.length > 0) {
          shopData.pickingRemove = true;
          shopData.removeScrollY = 0;
        }
      }

      const leaveX = W / 2 - 80, leaveY = H - 70, leaveW = 160, leaveH = 44;
      if (isInRect(mouse.x, mouse.y, leaveX - 10, leaveY - 5, leaveW + 20, leaveH + 10)) {
        returnToMap();
      }
      break;
    }

    case 'rest': {
      if (!restData.choosing) {
        const healAmt = Math.floor(game.maxHp * 0.3);
        const restBtnX = W / 2 - 200, restBtnY = 260, restBtnW = 400, restBtnH = 50;
        if (isInRect(mouse.x, mouse.y, restBtnX - 10, restBtnY - 5, restBtnW + 20, restBtnH + 10)) {
          game.hp = Math.min(game.maxHp, game.hp + healAmt);
          sfxHeal();
          returnToMap();
          break;
        }

        const smithBtnX = W / 2 - 200, smithBtnY = 330, smithBtnW = 400, smithBtnH = 50;
        if (isInRect(mouse.x, mouse.y, smithBtnX - 10, smithBtnY - 5, smithBtnW + 20, smithBtnH + 10)) {
          restData.choosing = true;
          restData.scrollY = 0;
          break;
        }
      } else {
        const upgradeable = game.deck.filter(c => !c.upgraded && CARDS[c.id].r !== 'status');
        const perRow = 5;
        const rowH = 160, firstCardY = 340;
        const clipTop = 280, clipBot = H - 110;
        for (let i = 0; i < upgradeable.length; i++) {
          const col = i % perRow;
          const row = Math.floor(i / perRow);
          const cx = W / 2 + (col - Math.min(perRow, upgradeable.length) / 2 + 0.5) * 130;
          const cy = firstCardY + row * rowH - restData.scrollY;
          if (cy < clipTop || cy > clipBot) continue;
          if (isInRect(mouse.x, mouse.y, cx - CARD_W * 0.4 - 5, cy - CARD_H * 0.4 - 5, CARD_W * 0.8 + 10, CARD_H * 0.8 + 10)) {
            upgradeable[i].upgraded = true;
            meta.totalCardsForged = (meta.totalCardsForged || 0) + 1;
            checkTrophies();
            sfxBuff();
            returnToMap();
            break;
          }
        }

        const cancelX = W / 2 - 80, cancelY = H - 85, cancelW = 160, cancelH = 40;
        if (isInRect(mouse.x, mouse.y, cancelX - 10, cancelY - 5, cancelW + 20, cancelH + 10)) {
          restData.choosing = false;
        }
      }
      break;
    }

    case 'gameover': {
      if (game._endHandled) { fadeToState('menu'); break; }
      game._endHandled = true;
      const earned = calcSouls(false);
      meta.souls += earned;
      meta.totalRuns++;
      if (game.floor + 1 > meta.bestFloor) meta.bestFloor = game.floor + 1;
      saveMeta();
      checkTrophies();
      clearRunSave();
      if (bgmCurrentTrack !== BGM_TRACKS.normal) switchBGM(BGM_TRACKS.normal);
      fadeToState('menu');
      break;
    }

    case 'victory': {
      if (game._endHandled) { fadeToState('menu'); break; }
      game._endHandled = true;
      const earnedV = calcSouls(true);
      meta.souls += earnedV;
      meta.totalRuns++;
      if (game.floor + 1 > meta.bestFloor) meta.bestFloor = game.floor + 1;
      const ch = game.character || 'pacto';
      if (!meta.victories) meta.victories = { pacto: 0, sombra: 0, cinza: 0 };
      meta.victories[ch] = (meta.victories[ch] || 0) + 1;
      saveMeta();
      checkTrophies();
      clearRunSave();
      if (bgmCurrentTrack !== BGM_TRACKS.normal) switchBGM(BGM_TRACKS.normal);
      fadeToState('menu');
      break;
    }

    case 'charSelect': {
      const csChars = ['pacto', 'sombra', 'cinza'];
      const charCosts = [0, 150, 300];
      const cardW = 260, cardH = 380, csGap = 40;
      const totalW = csChars.length * cardW + (csChars.length - 1) * csGap;
      const startX = W / 2 - totalW / 2;
      const cardY = 130;

      for (let i = 0; i < csChars.length; i++) {
        const cx = startX + i * (cardW + csGap);
        if (isInRect(mouse.x, mouse.y, cx - 10, cardY - 10, cardW + 20, cardH + 20)) {
          const unlocked = meta.unlockedChars.includes(csChars[i]);
          if (unlocked) {
            startNewRun(csChars[i]);
            if (!meta.tutorialDone) {
              tutorial.askingPlayer = true;
              tutorial.active = false;
              tutorial.step = 0;
              fadeToState('tutorialAsk');
            } else {
              fadeToState('map');
            }
          } else if (meta.souls >= charCosts[i]) {
            meta.souls -= charCosts[i];
            meta.unlockedChars.push(csChars[i]);
            saveMeta();
            checkTrophies();
          }
          break;
        }
      }

      if (isInRect(mouse.x, mouse.y, 30, H - 70, 180, 46)) {
        fadeToState('menu');
      }
      break;
    }

    case 'tutorialAsk': {
      const bw = 220, bh = 56, bgap = 40;
      const bx1 = W / 2 - bw - bgap / 2, bx2 = W / 2 + bgap / 2;
      const by = H / 2 + 40;
      if (isInRect(mouse.x, mouse.y, bx1, by, bw, bh)) {
        tutorial.askingPlayer = false;
        tutorial.active = true;
        tutorial.step = 0;
        tutorial.waitingConfirm = false;
        tutorial.enemyTurnDone = false;
        tutorial.finished = false;
        startTutorialCombat();
        fadeToState('combat');
      } else if (isInRect(mouse.x, mouse.y, bx2, by, bw, bh)) {
        tutorial.askingPlayer = false;
        tutorial.active = false;
        meta.tutorialDone = true;
        saveMeta();
        fadeToState('map');
      }
      break;
    }

    case 'altar': {
      if (game._altarBtns) {
        for (const btn of game._altarBtns) {
          if (btn.canBuy && isInRect(mouse.x, mouse.y, btn.x - 5, btn.y - 5, btn.w + 10, btn.h + 10)) {
            const upg = UPGRADES.find(u => u.id === btn.id);
            if (upg) {
              const curLv = meta.upgrades[upg.id] || 0;
              const cost = upg.costs[curLv];
              if (meta.souls >= cost) {
                meta.souls -= cost;
                meta.upgrades[upg.id] = curLv + 1;
                meta.totalAltarBuys = (meta.totalAltarBuys || 0) + 1;
                saveMeta();
                checkTrophies();
              }
            }
            break;
          }
        }
      }

      if (isInRect(mouse.x, mouse.y, 30, H - 70, 180, 46)) {
        fadeToState('menu');
      }
      break;
    }

    case 'bestiary': {
      const backX = 40, backY = H - 50, backW = 160, backH = 36;
      if (isInRect(mouse.x, mouse.y, backX - 5, backY - 5, backW + 10, backH + 10)) {
        fadeToState('menu');
      }
      break;
    }

    case 'cardex': {
      if (cardexZoomed !== null) {
        cardexZoomed = null;
        break;
      }
      const tabs = ['all', 'neutras', 'pacto', 'sombra', 'cinza'];
      const tabStartX = 70, tabY = 75, tabW = 90, tabH = 30, tabGap = 8;
      for (let ti = 0; ti < tabs.length; ti++) {
        const tx = tabStartX + ti * (tabW + tabGap);
        if (isInRect(mouse.x, mouse.y, tx, tabY, tabW, tabH)) {
          cardexFilter = tabs[ti];
          cardexScrollY = 0;
          break;
        }
      }

      const cardScale = 0.55;
      const cw = 120 * cardScale, ch = 170 * cardScale;
      const cardCols = 6, cardGapX = 20, cardGapY = 18;
      const gridLeft = (W - (cardCols * cw + (cardCols - 1) * cardGapX)) / 2;
      const gridTop = 120, clipTop = 115, clipBot = H - 60;
      const rowH = ch + cardGapY;

      let filteredCards = [];
      for (let i = 0; i < CARDS.length; i++) {
        const card = CARDS[i];
        const r = card.r;
        let cat = 'neutras';
        if (r.includes('sombra')) cat = 'sombra';
        else if (r.includes('cinza')) cat = 'cinza';
        else if (r === 'starter') cat = 'pacto';
        if (cardexFilter === 'all' || cardexFilter === cat) {
          const locked = (cat === 'sombra' && (!meta.unlockedChars || !meta.unlockedChars.includes('sombra'))) ||
                         (cat === 'cinza' && (!meta.unlockedChars || !meta.unlockedChars.includes('cinza')));
          filteredCards.push({ idx: i, locked });
        }
      }

      for (let fi = 0; fi < filteredCards.length; fi++) {
        const { idx, locked } = filteredCards[fi];
        if (locked) continue;
        const col = fi % cardCols;
        const row = Math.floor(fi / cardCols);
        const cx = gridLeft + col * (cw + cardGapX);
        const cy = gridTop + row * rowH - cardexScrollY;
        if (cy + ch < clipTop || cy > clipBot) continue;
        if (isInRect(mouse.x, mouse.y, cx, cy, cw, ch)) {
          cardexZoomed = idx;
          break;
        }
      }

      const backX = 40, backY = H - 50, backW = 160, backH = 36;
      if (isInRect(mouse.x, mouse.y, backX - 5, backY - 5, backW + 10, backH + 10)) {
        fadeToState('menu');
      }
      break;
    }

    case 'trophies': {
      const backX = 40, backY = H - 50, backW = 160, backH = 36;
      if (isInRect(mouse.x, mouse.y, backX - 5, backY - 5, backW + 10, backH + 10)) {
        fadeToState('menu');
      }
      break;
    }
  }
};

// ==================== UPDATE ====================
const update = (dt) => {
  handleInput();
  if (gamePaused || showHelp) return;
  updateTweens(dt);
  updateParticles(dt);
  updateFloatingTexts(dt);
  updateCombatWarning(dt);
  if (game.state === 'combat') updateAmbientParticles(dt);
  if (bossIntro) {
    bossIntro.timer -= dt;
    if (bossIntro.timer <= 0) bossIntro = null;
  }

  if (game.state === 'combat') {
    for (const card of combat.hand) {
      card.x = lerp(card.x, card.targetX, dt * 12);
      card.y = lerp(card.y, card.targetY, dt * 12);
      card.scale = lerp(card.scale, card.targetScale, dt * 12);
    }

    for (const e of combat.enemies) {
      if (e.shake > 0) e.shake -= dt;
      if (e.dead && e.deathTimer > 0) e.deathTimer -= dt;
    }

    updateSlashEffects(dt);

    if (combat.turnPhase === 'enemyTurn') {
      combat.animTimer -= dt;
      if (combat.animTimer <= 0) {
        const alive = combat.enemies.filter(e => !e.dead);
        if (combat.enemyTurnIdx < alive.length) {
          processEnemyAction(alive[combat.enemyTurnIdx]);
          combat.enemyTurnIdx++;
          combat.animTimer = 0.55;

          if (game.hp <= 0 && !tutorial.active) {
            combat.animating = false;
            combat.turnPhase = 'player';
            fadeToState('gameover');
            return;
          }
          if (game.hp <= 0 && tutorial.active) game.hp = 1;
        } else {
          combat.animating = false;
          combat.turnPhase = 'player';
          endEnemyTurns();
        }
      }
    }
  }

  if (game.fadeDir !== 0) {
    game.fadeAlpha += game.fadeDir * dt * 3.5;
    if (game.fadeDir === 1 && game.fadeAlpha >= 1) {
      game.fadeAlpha = 1;
      if (game.fadeCallback) {
        game.fadeCallback();
        game.fadeCallback = null;
      }
    }
    if (game.fadeDir === -1 && game.fadeAlpha <= 0) {
      game.fadeAlpha = 0;
      game.fadeDir = 0;
    }
  }

};

// ==================== BESTIARY SCREEN ====================
const renderBestiary = () => {
  ctx.fillStyle = '#08061a';
  ctx.fillRect(0, 0, W, H);

  const skewBg = -0.12;
  ctx.save();
  ctx.transform(1, 0, skewBg, 1, 0, 0);
  ctx.fillStyle = '#7733aa';
  ctx.beginPath();
  ctx.moveTo(W * 0.6, -20);
  ctx.lineTo(W + 80, -20);
  ctx.lineTo(W + 100, H * 0.4);
  ctx.lineTo(W * 0.55, H * 0.45);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#3a1166';
  ctx.beginPath();
  ctx.moveTo(-60, H * 0.75);
  ctx.lineTo(W * 0.3, H * 0.65);
  ctx.lineTo(W * 0.35, H + 20);
  ctx.lineTo(-60, H + 20);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  const enemyKeys = Object.keys(ENEMIES);
  const seenCount = meta.enemiesSeen ? meta.enemiesSeen.filter(k => enemyKeys.includes(k)).length : 0;

  drawPersonaTitle('BESTIÁRIO', 100, W - 200, 30, 48);

  ctx.font = 'bold italic 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#9a9088';
  ctx.fillText(`${seenCount}/15 DESCOBERTOS`, W / 2, 72);

  const cols = 5;
  const cellW = 190, cellH = 180;
  const gridLeft = (W - cols * cellW) / 2;
  const gridTop = 95;
  const clipTop = 90, clipBot = H - 60;

  const totalRows = Math.ceil(enemyKeys.length / cols);
  const contentH = totalRows * cellH;
  const maxScroll = Math.max(0, contentH - (clipBot - clipTop));
  if (bestiaryScrollY > maxScroll) bestiaryScrollY = maxScroll;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, clipTop, W, clipBot - clipTop);
  ctx.clip();

  for (let ei = 0; ei < enemyKeys.length; ei++) {
    const key = enemyKeys[ei];
    const enemy = ENEMIES[key];
    const col = ei % cols;
    const row = Math.floor(ei / cols);
    const cx = gridLeft + col * cellW + cellW / 2;
    const cy = gridTop + row * cellH + cellH / 2 - bestiaryScrollY;

    if (cy + cellH / 2 < clipTop || cy - cellH / 2 > clipBot) continue;

    const seen = meta.enemiesSeen && meta.enemiesSeen.includes(key);

    ctx.save();
    ctx.transform(1, 0, -0.07, 1, 0, 0);
    ctx.fillStyle = '#7733aa';
    ctx.beginPath();
    ctx.moveTo(cx - cellW / 2 + 8, cy - cellH / 2 + 5);
    ctx.lineTo(cx + cellW / 2 - 8, cy - cellH / 2 + 5);
    ctx.lineTo(cx + cellW / 2 - 6, cy + cellH / 2 - 5);
    ctx.lineTo(cx - cellW / 2 + 6, cy + cellH / 2 - 5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = seen ? '#0c0a1e' : '#14121e';
    ctx.beginPath();
    ctx.moveTo(cx - cellW / 2 + 11, cy - cellH / 2 + 8);
    ctx.lineTo(cx + cellW / 2 - 11, cy - cellH / 2 + 8);
    ctx.lineTo(cx + cellW / 2 - 9, cy + cellH / 2 - 8);
    ctx.lineTo(cx - cellW / 2 + 9, cy + cellH / 2 - 8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    if (seen) {
      drawEnemySprite(key, cx, cy - 38, 45, 0);

      ctx.font = 'bold italic 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e8dcc8';
      ctx.fillText(enemy.n, cx, cy + 18);

      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = '#cc4444';
      ctx.fillText(`HP: ${enemy.hp}`, cx, cy + 32);

      ctx.font = '9px sans-serif';
      ctx.fillStyle = '#9a9088';
      const maxIntents = Math.min(enemy.pattern.length, 3);
      const intentParts = [];
      for (let pi = 0; pi < maxIntents; pi++) {
        const p = enemy.pattern[pi];
        if (p.intent === 'attack') intentParts.push(`⚔${p.dmg}`);
        else if (p.intent === 'multi') intentParts.push(`⚔${p.dmg}x${p.hits}`);
        else if (p.intent === 'block') intentParts.push(`🛡${p.blk}`);
        else if (p.intent === 'buff') intentParts.push(`↑${p.str ? 'str' + p.str : 'buff'}`);
        else if (p.intent === 'debuff') intentParts.push(`↓${p.weak ? 'wk' : ''}${p.vuln ? 'vln' : ''}`);
      }
      ctx.fillText(intentParts.join('  '), cx, cy + 44);
    } else {
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#2a2238';
      ctx.beginPath();
      ctx.arc(cx, cy - 25, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#4a4050';
      ctx.fillText('?', cx, cy - 18);

      ctx.font = 'bold italic 12px sans-serif';
      ctx.fillStyle = '#4a4050';
      ctx.fillText('???', cx, cy + 18);

      ctx.font = '10px sans-serif';
      ctx.fillStyle = '#3a3240';
      ctx.fillText('HP: ?', cx, cy + 32);
    }
  }

  ctx.restore();

  if (bestiaryScrollY > 0) {
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7733aa';
    ctx.fillText('▲', W / 2, clipTop + 12);
  }
  if (bestiaryScrollY < maxScroll) {
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7733aa';
    ctx.fillText('▼', W / 2, clipBot - 4);
  }

  const backX = 40, backY = H - 50, backW = 160, backH = 36;
  const backHov = isInRect(mouse.x, mouse.y, backX - 5, backY - 5, backW + 10, backH + 10);
  drawPersonaBtn(backX, backY, backW, backH, 'VOLTAR', backHov);

  drawVignette();
};

    const hov = isInRect(mouse.x, mouse.y, tx, tabY, tabW, tabH);
