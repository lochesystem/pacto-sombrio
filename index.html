<script>
'use strict';
(() => {

const H = 750;
let W = 1100;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

const resizeCanvas = () => {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  if (isTouchDevice) {
    const deviceRatio = vw / vh;
    const newW = Math.round(H * Math.max(deviceRatio, 1.47));
    if (newW !== W) {
      W = newW;
      canvas.width = W;
    }
    canvas.style.width = vw + 'px';
    canvas.style.height = vh + 'px';
  } else {
    const ratio = W / H;
    let cw, ch;
    if (vw / vh > ratio) {
      ch = vh;
      cw = ch * ratio;
    } else {
      cw = vw;
      ch = cw / ratio;
    }
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
  }
};
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

// ==================== COMBAT BG THEME ====================
const getCombatTheme = () => {
  const node = game.map && game.map[game.floor] && game.map[game.floor][game.nodeIdx];
  if (node && node.type === 'boss') return 'boss';
  return `act${game.act}`;
};

// ==================== AUDIO ====================
let audioCtx = null;
let masterGain = null;

const initAudio = () => {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  }
  // iOS/Safari e algumas versões de Chrome iniciam o contexto suspended
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
};

const playTone = (type, freqStart, freqEnd, duration, startTime) => {
  if (!audioCtx) return;
  const t0 = startTime || audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freqStart, t0);
  osc.frequency.linearRampToValueAtTime(freqEnd, t0 + duration);
  gain.gain.setValueAtTime(0.3, t0);
  gain.gain.linearRampToValueAtTime(0, t0 + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(t0);
  osc.stop(t0 + duration);
};

const sfxCard = () => playTone('triangle', 400, 600, 0.1);
const sfxHit = () => playTone('sawtooth', 150, 50, 0.15);
const sfxBlock = () => playTone('sine', 300, 500, 0.1);
const sfxHeal = () => playTone('sine', 400, 800, 0.2);
const sfxClick = () => playTone('triangle', 600, 600, 0.05);
const sfxDraw = () => playTone('sine', 500, 700, 0.08);
const sfxBuff = () => {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  playTone('triangle', 300, 600, 0.1, t);
  playTone('triangle', 600, 800, 0.1, t + 0.1);
};
const sfxDeath = () => playTone('sawtooth', 200, 30, 0.4);

// ==================== BGM ====================
let bgmStarted = false;
let bgmMuted = false;
let bgmCurrentTrack = 'bmg.mp3';
const bgmTargetVol = 0.25;
const BGM_FADE_MS = 1800;
const BGM_TRACKS = { normal: 'bmg.mp3', boss1: 'boss_1.mp3', boss2: 'boss_2.mp3', boss3: 'boss_3.mp3' };

const bgmLayers = { current: null, fading: null };
let bgmFadeTimer = null;

function _createAudio(src, vol) {
  const a = new Audio(src);
  a.loop = true;
  a.volume = vol;
  a.muted = bgmMuted;
  a.preload = 'auto';
  return a;
}

function startBGM() {
  if (bgmStarted) return;
  bgmLayers.current = _createAudio('bmg.mp3', bgmTargetVol);
  bgmCurrentTrack = 'bmg.mp3';
  bgmLayers.current.play().catch(() => {});
  bgmStarted = true;
}

function switchBGM(track) {
  if (!bgmStarted || bgmCurrentTrack === track) return;
  bgmCurrentTrack = track;

  if (bgmFadeTimer) { clearInterval(bgmFadeTimer); bgmFadeTimer = null; }
  if (bgmLayers.fading) { try { bgmLayers.fading.pause(); } catch (_) {} bgmLayers.fading = null; }

  bgmLayers.fading = bgmLayers.current;
  bgmLayers.current = _createAudio(track, 0);
  bgmLayers.current.play().catch(() => {});

  const stepMs = 20;
  const totalSteps = BGM_FADE_MS / stepMs;
  let s = 0;
  bgmFadeTimer = setInterval(() => {
    s++;
    const progress = Math.min(s / totalSteps, 1);
    if (bgmLayers.fading) bgmLayers.fading.volume = Math.max(0, bgmTargetVol * (1 - progress));
    if (bgmLayers.current) bgmLayers.current.volume = bgmTargetVol * progress;
    if (progress >= 1) {
      clearInterval(bgmFadeTimer);
      bgmFadeTimer = null;
      if (bgmLayers.fading) { try { bgmLayers.fading.pause(); } catch (_) {} bgmLayers.fading = null; }
      if (bgmLayers.current) bgmLayers.current.volume = bgmTargetVol;
    }
  }, stepMs);
}

function toggleBGM() {
  if (!bgmStarted) {
    bgmMuted = false;
    startBGM();
    return;
  }
  bgmMuted = !bgmMuted;
  for (const k of ['current', 'fading']) {
    const a = bgmLayers[k];
    if (!a) continue;
    a.muted = bgmMuted;
    if (!bgmMuted && a.paused) a.play().catch(() => {});
  }
}

// Aliases for compatibility
const bgm_get = () => bgmLayers.current;
function setBGMVolume(vol) {
  if (bgmLayers.current) bgmLayers.current.volume = clamp(vol, 0, 1);
}

// ==================== MATH UTILITIES ====================
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const shuffle = (arr) => {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
};
const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack = (t) => {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
};
const easeOutQuad = (t) => 1 - (1 - t) * (1 - t);
const easeOutElastic = (t) => {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
};

// ==================== COLOR PALETTE ====================
const PAL = {
  bg: '#08061a', panel: 'rgba(14,10,30,0.94)', panelBorder: '#2a2248',
  text: '#e0d8c8', textDim: '#8a7a66', textFaint: '#504838',
  ivory: '#e8e0d0',
  gold: '#d4a645', energy: '#c88a30',
  attack: { c1: '#aa2233', c2: '#551122', c3: '#3a0e28', border: '#aa2233', glow: '#dd3344' },
  skill: { c1: '#2255aa', c2: '#142a55', c3: '#152842', border: '#2255aa', glow: '#3377cc' },
  power: { c1: '#b88830', c2: '#5c4418', c3: '#44320e', border: '#b88830', glow: '#ddaa33' },
  status: { c1: '#3a3340', c2: '#1e1a24', c3: '#2a2430', border: '#555060', glow: '#555060' },
  rarity: { starter: '#777070', common: '#777070', uncommon: '#3a77aa', rare: '#b89530', status: '#555050' },
  damage: '#dd3344', block: '#2a7abb', heal: '#28aa55', poison: '#28aa55',
  vulnerable: '#bb5522', weak: '#5588aa', strength: '#aa2233',
  act1: { bgTop: '#0a0618', bgMid: '#10081c', bgBot: '#140e22', particle1: '#8844aa', particle2: '#bb66dd', ambientGlow: 'rgba(100,40,160,0.04)' },
  act2: { bgTop: '#060a12', bgMid: '#0a1018', bgBot: '#081020', particle1: '#2288aa', particle2: '#44bbcc', ambientGlow: 'rgba(30,120,160,0.04)' },
  act3: { bgTop: '#0a0418', bgMid: '#12081e', bgBot: '#0e0620', particle1: '#7722bb', particle2: '#aa44ee', ambientGlow: 'rgba(100,30,180,0.04)' },
};

// ==================== TWEEN SYSTEM ====================
const tweens = [];
const addTween = (obj, props, duration, easing, onComplete) => {
  const start = {};
  const end = {};
  for (const key in props) {
    start[key] = obj[key] !== undefined ? obj[key] : 0;
    end[key] = props[key];
  }
  tweens.push({ obj, start, end, duration, easing: easing || easeInOutCubic, elapsed: 0, onComplete: onComplete || null });
};
const updateTweens = (dt) => {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i];
    tw.elapsed += dt;
    const t = clamp(tw.elapsed / tw.duration, 0, 1);
    const et = tw.easing(t);
    for (const key in tw.start) {
      tw.obj[key] = lerp(tw.start[key], tw.end[key], et);
    }
    if (t >= 1) {
      if (tw.onComplete) tw.onComplete();
      tweens.splice(i, 1);
    }
  }
};

// ==================== PARTICLE SYSTEM ====================
const particles = [];
const addParticle = (x, y, color, vx, vy, life, size) => {
  particles.push({ x, y, color, vx: vx !== undefined ? vx : rand(-30, 30), vy: vy !== undefined ? vy : rand(-60, -20), life, maxLife: life, size: size || rand(2, 5) });
};
const spawnParticles = (x, y, color, count, spread) => {
  const s = spread || 40;
  for (let i = 0; i < count; i++) {
    addParticle(x + rand(-s / 2, s / 2), y + rand(-s / 2, s / 2), color, rand(-s, s), rand(-s * 2, -s / 2), rand(0.4, 1), rand(2, 5));
  }
};
const updateParticles = (dt) => {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 40 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
};
const renderParticles = () => {
  for (const p of particles) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
};

// ==================== FLOATING TEXT ====================
const floatingTexts = [];
const addFloatingText = (x, y, text, color, size) => {
  floatingTexts.push({ x, y, text, color, size: size || 20, life: 1.2, maxLife: 1.2 });
};
const updateFloatingTexts = (dt) => {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y -= 40 * dt;
    ft.life -= dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
};
const renderFloatingTexts = () => {
  for (const ft of floatingTexts) {
    const alpha = clamp(ft.life / ft.maxLife, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${ft.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
};

// ==================== COMBAT WARNING TOAST ====================
let combatWarning = null;
const showCombatWarning = (text) => {
  combatWarning = { text, life: 1.8, maxLife: 1.8, shakePhase: 0 };
};
const updateCombatWarning = (dt) => {
  if (!combatWarning) return;
  combatWarning.life -= dt;
  combatWarning.shakePhase += dt * 25;
  if (combatWarning.life <= 0) combatWarning = null;
};
const renderCombatWarning = () => {
  if (!combatWarning) return;
  const cw = combatWarning;
  const progress = 1 - cw.life / cw.maxLife;
  const fadeIn = Math.min(progress * 8, 1);
  const fadeOut = cw.life < 0.4 ? cw.life / 0.4 : 1;
  const alpha = fadeIn * fadeOut;
  const shakeX = progress < 0.15 ? Math.sin(cw.shakePhase) * 4 * (1 - progress / 0.15) : 0;

  ctx.save();
  ctx.globalAlpha = alpha;

  const tw = ctx.measureText(cw.text).width || 200;
  const boxW = tw + 60, boxH = 40;
  const bx = W / 2 - boxW / 2 + shakeX, by = H / 2 - 30;

  ctx.fillStyle = 'rgba(12,8,30,0.92)';
  ctx.beginPath();
  ctx.moveTo(bx - 4, by - 2);
  ctx.lineTo(bx + boxW + 4, by - 2);
  ctx.lineTo(bx + boxW + 6, by + boxH + 2);
  ctx.lineTo(bx - 6, by + boxH + 2);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#7733aa';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.shadowColor = '#7733aa';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = '#7733aa88';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.font = 'bold italic 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#d4a645';
  ctx.fillText(cw.text, W / 2 + shakeX, by + boxH / 2);

  ctx.restore();
};

// ==================== AMBIENT PARTICLES ====================
const ambientParticles = [];
let shakeAmount = 0;
const shakeDecay = 0.88;
let damageFlashTimer = 0;
let gamePaused = false;
let showHelp = false;

// ==================== BOSS INTRO ====================
const BOSS_INTRO = {
  demonKnight: {
    title: 'Cavaleiro Demônio',
    lines: [
      '"Mais um verme rastejando até meu salão..."',
      '"Suas preces não serão ouvidas aqui."',
    ],
    color: '#cc2222',
  },
  lich: {
    title: 'Lich',
    lines: [
      '"Séculos de sabedoria... e me enviam um mortal?"',
      '"Sua alma será um belo acréscimo à minha coleção."',
    ],
    color: '#44cccc',
  },
  theVoid: {
    title: 'O Vazio',
    lines: [
      '"Você ousou olhar para o abismo..."',
      '"E agora o abismo olha de volta. Não há fuga."',
    ],
    color: '#9944dd',
  },
};
let bossIntro = null;
let helpScrollY = 0;
let trophyScrollY = 0;
let bestiaryScrollY = 0;
let cardexScrollY = 0;
let cardexFilter = 'all';
let cardexZoomed = null;
let mapScrollY = 0;

// ==================== TUTORIAL ====================
const tutorial = {
  active: false,
  step: 0,
  waitingConfirm: false,
  askingPlayer: false,
  enemyTurnDone: false,
  finished: false,
};
const TUTORIAL_STEPS = [
  { msg: 'Esta é sua mão de cartas. Selecione a carta "Golpe" para atacar.', target: 'card_attack', hint: 'Toque na carta Golpe' },
  { msg: 'Agora selecione o inimigo para desferir o ataque!', target: 'enemy', hint: 'Toque no inimigo' },
  { msg: 'O inimigo perdeu vida! Agora use "Defesa" para se proteger.', target: 'card_defend', hint: 'Toque na carta Defesa' },
  { msg: 'Confirme o uso da Defesa tocando novamente na carta.', target: 'card_defend_confirm', hint: 'Toque novamente' },
  { msg: 'Sua energia acabou! Toque em "Fim do Turno" para encerrar.', target: 'end_turn', hint: 'Toque no botão' },
  { msg: 'O inimigo atacou! Seu bloqueio absorveu parte do dano. Observe o HP e bloqueio.', target: 'info', hint: '' },
  { msg: 'Use suas poções nos slots acima das cartas. Toque na poção para curar!', target: 'potion', hint: 'Toque na poção' },
];

const triggerShake = (amount) => { shakeAmount = Math.max(shakeAmount, amount); };
const triggerDamageFlash = () => { damageFlashTimer = 1; };

let slashEffects = [];
let glitchTimer = 0;
let enemyLungeAnims = new Map();

const triggerSlash = (x, y, dir) => {
  slashEffects.push({
    x, y, dir: dir || 1, timer: 0.4, maxTimer: 0.4,
    angle: rand(-0.5, 0.5), len: rand(140, 220), width: rand(3, 6),
  });
};

const triggerGlitch = () => { glitchTimer = 0.25; };

const triggerEnemyLunge = (enemy, targetX, targetY) => {
  const origX = enemy.x;
  const origY = enemy.y;
  const lungeX = origX + (targetX - origX) * 0.35;
  const lungeY = origY + (targetY - origY) * 0.15;
  enemyLungeAnims.set(enemy, {
    origX, origY, lungeX, lungeY,
    phase: 0, duration: 0.3,
  });
};

const updateSlashEffects = (dt) => {
  for (let i = slashEffects.length - 1; i >= 0; i--) {
    slashEffects[i].timer -= dt;
    if (slashEffects[i].timer <= 0) slashEffects.splice(i, 1);
  }
  if (glitchTimer > 0) glitchTimer -= dt;

  for (const [enemy, anim] of enemyLungeAnims) {
    anim.phase += dt / anim.duration;
    if (anim.phase < 0.5) {
      const t = anim.phase * 2;
      const ease = t * t;
      enemy.x = lerp(anim.origX, anim.lungeX, ease);
      enemy.y = lerp(anim.origY, anim.lungeY, ease);
    } else {
      const t = (anim.phase - 0.5) * 2;
      const ease = 1 - (1 - t) * (1 - t);
      enemy.x = lerp(anim.lungeX, anim.origX, ease);
      enemy.y = lerp(anim.lungeY, anim.origY, ease);
    }
    if (anim.phase >= 1) {
      enemy.x = anim.origX;
      enemy.y = anim.origY;
      enemyLungeAnims.delete(enemy);
    }
  }
};

const renderSlashEffects = () => {
  for (const sl of slashEffects) {
    const progress = 1 - sl.timer / sl.maxTimer;
    const alpha = progress < 0.3 ? progress / 0.3 : (1 - progress) / 0.7;
    const sweep = progress;

    ctx.save();
    ctx.translate(sl.x, sl.y);
    ctx.rotate(sl.angle);

    const startX = -sl.len / 2 + sl.len * Math.max(0, sweep - 0.4);
    const endX = -sl.len / 2 + sl.len * sweep;

    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#e8dcc8';
    ctx.lineWidth = sl.width;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ff3333';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(startX, 0);
    ctx.lineTo(endX, 0);
    ctx.stroke();

    ctx.lineWidth = sl.width * 2.5;
    ctx.globalAlpha = alpha * 0.3;
    ctx.strokeStyle = '#ff2222';
    ctx.shadowBlur = 40;
    ctx.beginPath();
    ctx.moveTo(startX, 0);
    ctx.lineTo(endX, 0);
    ctx.stroke();

    for (let sp = 0; sp < 4; sp++) {
      const sparkX = lerp(startX, endX, rand(0, 1));
      const sparkY = rand(-15, 15);
      ctx.globalAlpha = alpha * rand(0.3, 0.7);
      ctx.fillStyle = '#ffccaa';
      ctx.beginPath();
      ctx.arc(sparkX, sparkY, rand(1, 3), 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
};

const renderGlitch = () => {
  if (glitchTimer <= 0) return;
  const intensity = glitchTimer / 0.25;

  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  for (let i = 0; i < Math.floor(intensity * 6); i++) {
    const sy = randInt(0, H);
    const sh = randInt(2, 15);
    const sx = Math.round(rand(-12, 12) * intensity);

    ctx.globalAlpha = 1;
    ctx.drawImage(canvas, 0, sy, W, sh, sx, sy + Math.round(rand(-2, 2)), W, sh);

    ctx.globalAlpha = intensity * 0.15;
    ctx.fillStyle = i % 2 === 0 ? '#ff0000' : '#00ffff';
    ctx.fillRect(0, sy, W, sh);
  }

  ctx.globalAlpha = intensity * 0.08;
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(0, 0, W, H);

  const scanline = Math.floor(Date.now() * 0.5) % H;
  ctx.globalAlpha = intensity * 0.15;
  ctx.fillStyle = '#e8dcc8';
  ctx.fillRect(0, scanline, W, 2);

  ctx.restore();
  ctx.globalAlpha = 1;
};

const spawnAmbientParticles = (act) => {
  ambientParticles.length = 0;
  const hueBase = act === 1 ? 120 : act === 2 ? 260 : 320;
  for (let i = 0; i < 50; i++) {
    ambientParticles.push({
      x: rand(0, W), y: rand(50, H - 100),
      vx: rand(-4, 4), vy: rand(-6, 6),
      size: rand(1, 3.5), alpha: rand(0.15, 0.5),
      hue: hueBase + rand(-60, 120),
      phase: rand(0, Math.PI * 2),
      speed: rand(0.3, 1.2),
      trail: Math.random() < 0.2,
    });
  }
};

const updateAmbientParticles = (dt) => {
  const t = Date.now() * 0.001;
  for (const p of ambientParticles) {
    p.x += Math.sin(t * p.speed + p.phase) * 0.8 + p.vx * dt * 0.3;
    p.y += Math.cos(t * p.speed * 0.7 + p.phase) * 0.6 + p.vy * dt * 0.2;
    p.hue += dt * 5;
    if (p.y < 30) p.y = H - 120;
    if (p.y > H - 60) p.y = 50;
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
  }
  shakeAmount *= shakeDecay;
  if (shakeAmount < 0.5) shakeAmount = 0;
  if (damageFlashTimer > 0) damageFlashTimer -= dt * 3;
};

const renderAmbientParticles = () => {
  const t = Date.now() * 0.003;
  for (const p of ambientParticles) {
    const flicker = 0.6 + Math.sin(t + p.phase) * 0.4;
    const a = p.alpha * flicker;
    const h = p.hue % 360;

    if (p.trail) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (let ti = 3; ti > 0; ti--) {
        const ta = a * (ti / 3) * 0.3;
        ctx.globalAlpha = ta;
        ctx.fillStyle = `hsl(${h},70%,60%)`;
        ctx.beginPath();
        ctx.arc(p.x - p.vx * ti * 0.04, p.y - p.vy * ti * 0.04, p.size * (ti / 3), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    ctx.globalAlpha = a;
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = `hsl(${h},80%,50%)`;
    ctx.fillStyle = `hsl(${h},70%,65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
};

const psyHueShift = (h, s, l) => `hsl(${h % 360},${s}%,${l}%)`;

const renderCombatBackground = () => {
  const t = Date.now() * 0.001;
  const theme = getCombatTheme();

  // --- Helpers ---
  const drawHills = (baseY, speed, hue, sat, lum, alpha, amp, freq) => {
    const ht = t * speed * 0.3;
    const h = (hue + Math.sin(t * 0.15) * 15) % 360;
    const grd = ctx.createLinearGradient(0, baseY - amp, 0, H);
    grd.addColorStop(0, `hsla(${h},${sat}%,${lum + 3}%,${alpha})`);
    grd.addColorStop(0.5, `hsla(${(h + 15) % 360},${sat - 5}%,${lum}%,${alpha})`);
    grd.addColorStop(1, `hsla(${(h + 30) % 360},${sat - 8}%,${lum - 2}%,${alpha * 0.8})`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let gx = 0; gx <= W; gx += 3) {
      const ny = baseY + Math.sin(gx * freq + ht) * amp + Math.sin(gx * freq * 2.3 + ht * 1.4) * (amp * 0.4) + Math.sin(gx * freq * 0.5 + ht * 0.7) * (amp * 0.6);
      ctx.lineTo(gx, ny);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  };

  const drawStone = (x, y, w, h, hue, lum) => {
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, `hsl(${hue},15%,${lum + 3}%)`);
    g.addColorStop(0.5, `hsl(${hue},12%,${lum}%)`);
    g.addColorStop(1, `hsl(${hue},15%,${lum - 2}%)`);
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = `hsl(${hue},10%,${lum - 5}%)`;
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  };

  // =============================================================
  // ACT 1: DUNGEON / CAVE — stone brick walls, cauldron, torches, lava glow
  // =============================================================
  if (theme === 'act1') {
    const skyGrd = ctx.createLinearGradient(0, 0, 0, H);
    skyGrd.addColorStop(0, '#06020a');
    skyGrd.addColorStop(0.2, '#0a0410');
    skyGrd.addColorStop(0.5, '#100816');
    skyGrd.addColorStop(0.8, '#14060c');
    skyGrd.addColorStop(1, '#0e0408');
    ctx.fillStyle = skyGrd;
    ctx.fillRect(0, 0, W, H);

    // Cave stone brick wall (back layer)
    ctx.save();
    const brickH = 18, brickW = 40;
    for (let row = 0; row < 14; row++) {
      const offset = (row % 2) * (brickW / 2);
      const rowY = row * brickH + 40;
      const rowLum = 7 + Math.sin(row * 0.5) * 2;
      for (let col = -1; col < Math.ceil(W / brickW) + 1; col++) {
        const bx = col * brickW + offset;
        const bLum = rowLum + Math.sin(col * 1.7 + row * 2.3) * 1.5;
        drawStone(bx, rowY, brickW - 1, brickH - 1, 275, bLum);
      }
    }
    ctx.restore();

    // Large stalactites from ceiling
    ctx.save();
    for (let si = 0; si < 14; si++) {
      const sx = (si * 83 + 25) % W;
      const sLen = 45 + Math.sin(si * 2.7) * 30 + Math.sin(t * 0.3 + si) * 4;
      const sW = 6 + Math.sin(si * 1.3) * 4;
      const grd = ctx.createLinearGradient(sx, 0, sx, sLen);
      grd.addColorStop(0, 'rgba(50,35,60,0.9)');
      grd.addColorStop(0.6, 'rgba(35,25,45,0.6)');
      grd.addColorStop(1, 'rgba(20,15,30,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(sx - sW, 0);
      ctx.quadraticCurveTo(sx - sW * 0.8, sLen * 0.3, sx, sLen);
      ctx.quadraticCurveTo(sx + sW * 0.8, sLen * 0.3, sx + sW, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Dark cave opening frame (arch at top)
    ctx.save();
    const archGrd = ctx.createLinearGradient(0, 0, 0, 80);
    archGrd.addColorStop(0, 'rgba(8,4,14,1)');
    archGrd.addColorStop(1, 'rgba(8,4,14,0)');
    ctx.fillStyle = archGrd;
    ctx.fillRect(0, 0, W, 80);
    ctx.restore();

    // Lava/fire glow from below
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const lavaGrd = ctx.createLinearGradient(0, H, 0, H - 120);
    lavaGrd.addColorStop(0, `rgba(200,60,10,${0.12 + Math.sin(t * 1.5) * 0.04})`);
    lavaGrd.addColorStop(0.3, `rgba(180,40,5,${0.06 + Math.sin(t * 2) * 0.02})`);
    lavaGrd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lavaGrd;
    ctx.fillRect(0, H - 120, W, 120);
    ctx.restore();

    // Stone ground layers
    drawHills(340, 0.3, 275, 18, 7, 0.8, 20, 0.006);
    drawHills(380, 0.5, 270, 15, 5, 0.9, 12, 0.01);

    // Cauldron (center)
    ctx.save();
    const cx = W * 0.5, cy = 340;
    // Cauldron body
    ctx.fillStyle = '#1a1520';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 15, 32, 24, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#0e0a14';
    ctx.beginPath();
    ctx.ellipse(cx, cy, 30, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Rim
    ctx.strokeStyle = '#2a2035';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 30, 12, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Green bubbling glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const cGlow = ctx.createRadialGradient(cx, cy - 5, 0, cx, cy - 5, 50);
    const cPulse = 0.6 + Math.sin(t * 2.5) * 0.3;
    cGlow.addColorStop(0, `rgba(50,200,80,${0.15 * cPulse})`);
    cGlow.addColorStop(0.4, `rgba(30,150,60,${0.08 * cPulse})`);
    cGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cGlow;
    ctx.fillRect(cx - 50, cy - 55, 100, 60);
    // Bubbles
    for (let bi = 0; bi < 6; bi++) {
      const bx = cx + Math.sin(t * 3 + bi * 1.5) * 18;
      const by = cy - 5 - ((t * 25 + bi * 12) % 30);
      const br = 2 + Math.sin(t * 4 + bi) * 1;
      ctx.globalAlpha = 0.3 * (1 - ((t * 25 + bi * 12) % 30) / 30);
      ctx.fillStyle = '#44ff88';
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    // Cauldron legs
    ctx.fillStyle = '#1a1520';
    ctx.fillRect(cx - 25, cy + 30, 5, 12);
    ctx.fillRect(cx + 20, cy + 30, 5, 12);
    ctx.restore();

    // Torches on walls (flickering, larger glow)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const torchPos = [
      { x: W * 0.1, y: 150 }, { x: W * 0.3, y: 140 },
      { x: W * 0.7, y: 140 }, { x: W * 0.9, y: 150 }
    ];
    for (let ti = 0; ti < torchPos.length; ti++) {
      const { x: tx, y: ty } = torchPos[ti];
      const flicker = 0.65 + Math.sin(t * 9 + ti * 3.7) * 0.2 + Math.sin(t * 14 + ti * 5) * 0.1;
      // Torch handle
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = '#2a1a10';
      ctx.fillRect(tx - 2, ty, 4, 18);
      // Torch bracket
      ctx.fillStyle = '#3a2a20';
      ctx.fillRect(tx - 6, ty + 14, 12, 4);
      ctx.globalAlpha = 1;
      // Large warm glow
      const grd = ctx.createRadialGradient(tx, ty - 5, 0, tx, ty - 5, 110 * flicker);
      grd.addColorStop(0, `rgba(255,140,40,${0.14 * flicker})`);
      grd.addColorStop(0.25, `rgba(220,80,15,${0.08 * flicker})`);
      grd.addColorStop(0.6, `rgba(150,40,5,${0.03 * flicker})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(tx - 110, ty - 115, 220, 220);
      // Flame tongues
      for (let fi = 0; fi < 5; fi++) {
        const fh = 10 + Math.sin(t * 12 + fi * 2.3 + ti) * 5;
        const fw = 3.5 + Math.sin(t * 9 + fi + ti) * 2;
        ctx.globalAlpha = 0.5 + Math.sin(t * 14 + fi + ti) * 0.2;
        const fColors = ['#ff6611', '#ff8822', '#ffaa33', '#ffcc55', '#ffe888'];
        ctx.fillStyle = fColors[fi];
        ctx.beginPath();
        ctx.ellipse(tx + Math.sin(t * 7 + fi * 1.3) * 3, ty - fh / 2 - 2, fw, fh, Math.sin(t * 5 + fi) * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      // Spark particles
      for (let sp = 0; sp < 3; sp++) {
        const spY = ty - 15 - ((t * 40 + sp * 15 + ti * 20) % 50);
        const spX = tx + Math.sin(t * 5 + sp * 2 + ti) * 10;
        ctx.globalAlpha = 0.6 * (1 - ((t * 40 + sp * 15 + ti * 20) % 50) / 50);
        ctx.fillStyle = '#ffcc44';
        ctx.beginPath();
        ctx.arc(spX, spY, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // Ground fog
    ctx.save();
    for (let fi = 0; fi < 10; fi++) {
      const fx = (fi * 120 + Math.sin(t * 0.3 + fi) * 40) % (W + 100) - 50;
      const fy = H - 50 + Math.sin(fi * 2.1) * 20;
      const fr = 60 + Math.sin(fi * 1.7) * 20;
      const fogA = 0.06 + Math.sin(t * 0.5 + fi * 1.3) * 0.03;
      const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
      fg.addColorStop(0, `rgba(80,40,20,${fogA})`);
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(fx - fr, fy - fr, fr * 2, fr * 2);
    }
    ctx.restore();

    // Dripping water
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let di = 0; di < 10; di++) {
      const dx = (di * 107 + 40) % W;
      const dropT = (t * 1.5 + di * 0.8) % 2.5;
      const dy = dropT * 160;
      if (dropT < 2.2) {
        ctx.globalAlpha = 0.25 * (1 - dropT / 2.5);
        ctx.fillStyle = '#6688cc';
        ctx.beginPath();
        ctx.ellipse(dx, dy, 1.5, 4, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
    ctx.globalAlpha = 1;

  // =============================================================
  // ACT 2: ENCHANTED FOREST — massive trees, big waterfall, god rays, lush
  // =============================================================
  } else if (theme === 'act2') {
    const skyGrd = ctx.createLinearGradient(0, 0, 0, H);
    skyGrd.addColorStop(0, '#020810');
    skyGrd.addColorStop(0.15, '#041018');
    skyGrd.addColorStop(0.4, '#061820');
    skyGrd.addColorStop(0.7, '#041410');
    skyGrd.addColorStop(1, '#030c08');
    ctx.fillStyle = skyGrd;
    ctx.fillRect(0, 0, W, H);

    // Distant misty mountains
    ctx.save();
    for (let mi = 0; mi < 3; mi++) {
      const mBaseY = 120 + mi * 40;
      const mAlpha = 0.15 - mi * 0.03;
      const mHue = 180 + mi * 10;
      ctx.fillStyle = `hsla(${mHue},30%,12%,${mAlpha})`;
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 4) {
        const y = mBaseY + Math.sin(x * 0.003 + mi * 2) * 50 + Math.sin(x * 0.008 + mi * 5) * 25;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Giant tree trunks (massive, detailed)
    ctx.save();
    const trunks = [
      { x: W * 0.02, w: 55, side: 'left' }, { x: W * 0.15, w: 35, side: 'left' },
      { x: W * 0.85, w: 35, side: 'right' }, { x: W * 0.98, w: 55, side: 'right' }
    ];
    for (let ti = 0; ti < trunks.length; ti++) {
      const tr = trunks[ti];
      const tw = tr.w;
      // Main trunk
      const tGrd = ctx.createLinearGradient(tr.x - tw, 0, tr.x + tw, 0);
      tGrd.addColorStop(0, 'rgba(12,22,16,0)');
      tGrd.addColorStop(0.2, 'rgba(18,32,22,0.7)');
      tGrd.addColorStop(0.4, 'rgba(22,38,26,0.85)');
      tGrd.addColorStop(0.5, 'rgba(25,42,28,0.9)');
      tGrd.addColorStop(0.6, 'rgba(22,38,26,0.85)');
      tGrd.addColorStop(0.8, 'rgba(18,32,22,0.7)');
      tGrd.addColorStop(1, 'rgba(12,22,16,0)');
      ctx.fillStyle = tGrd;
      ctx.fillRect(tr.x - tw, 0, tw * 2, H);
      // Bark texture lines
      ctx.strokeStyle = 'rgba(30,50,35,0.3)';
      ctx.lineWidth = 1;
      for (let bl = 0; bl < 5; bl++) {
        ctx.beginPath();
        const bx = tr.x - tw * 0.6 + bl * tw * 0.3;
        for (let by = 0; by < H; by += 6) {
          ctx.lineTo(bx + Math.sin(by * 0.04 + bl * 2) * 4, by);
        }
        ctx.stroke();
      }
      // Hanging vines
      for (let vi = 0; vi < 3; vi++) {
        const vx = tr.x + (vi - 1) * tw * 0.4;
        ctx.strokeStyle = `rgba(30,90,40,${0.2 + Math.sin(t * 0.4 + vi + ti) * 0.08})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        for (let vy = 0; vy < H * 0.8; vy += 5) {
          ctx.lineTo(vx + Math.sin(vy * 0.015 + t * 0.5 + vi + ti) * 15, vy);
        }
        ctx.stroke();
        // Vine leaves
        for (let lf = 0; lf < 4; lf++) {
          const ly = 60 + lf * 80 + Math.sin(lf * 3 + ti) * 30;
          const lx = vx + Math.sin(ly * 0.015 + t * 0.5 + vi + ti) * 15;
          ctx.fillStyle = `rgba(25,80,35,${0.3 + Math.sin(t * 0.3 + lf + vi) * 0.1})`;
          ctx.beginPath();
          ctx.ellipse(lx + 5, ly, 6, 3, Math.sin(t * 0.2 + lf) * 0.3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    ctx.restore();

    // Dense forest canopy (top)
    ctx.save();
    for (let ci = 0; ci < 25; ci++) {
      const clx = (ci * 48 + 10) % W;
      const cly = 10 + Math.sin(ci * 1.7) * 25;
      const cr = 35 + Math.sin(ci * 2.3) * 18;
      const ch = 130 + Math.sin(t * 0.15 + ci) * 20;
      const grd = ctx.createRadialGradient(clx, cly, cr * 0.1, clx, cly, cr);
      grd.addColorStop(0, `hsla(${ch},55%,14%,0.8)`);
      grd.addColorStop(0.5, `hsla(${ch},45%,10%,0.5)`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(clx - cr, cly - cr, cr * 2, cr * 2);
    }
    ctx.restore();

    // Forest floor layers
    drawHills(310, 0.3, 145, 40, 8, 0.7, 25, 0.005);
    drawHills(355, 0.6, 140, 35, 6, 0.8, 18, 0.008);
    drawHills(395, 0.9, 135, 30, 5, 0.9, 12, 0.012);

    // Large waterfall (right side, much bigger and more visible)
    ctx.save();
    const wfX = W * 0.72, wfTop = 50, wfBot = 370, wfW = 40;
    // Rock cliff behind waterfall
    ctx.fillStyle = 'rgba(20,35,25,0.5)';
    ctx.beginPath();
    ctx.moveTo(wfX - wfW - 15, wfTop - 10);
    ctx.lineTo(wfX + wfW + 15, wfTop - 10);
    ctx.lineTo(wfX + wfW + 25, wfBot + 30);
    ctx.lineTo(wfX - wfW - 25, wfBot + 30);
    ctx.closePath();
    ctx.fill();
    // Main water streams
    ctx.globalCompositeOperation = 'lighter';
    for (let wi = 0; wi < 30; wi++) {
      const streamX = wfX + (Math.sin(wi * 0.7) * wfW * 0.8);
      const fallSpeed = 120 + wi * 8;
      const wy = wfTop + ((t * fallSpeed + wi * 20) % (wfBot - wfTop));
      const wx = streamX + Math.sin(t * 2.5 + wi * 0.4) * 5;
      const wAlpha = 0.08 + Math.sin(t * 3 + wi) * 0.04;
      ctx.globalAlpha = wAlpha;
      ctx.fillStyle = wi % 3 === 0 ? '#aaddee' : '#88ccdd';
      ctx.fillRect(wx - 2, wy, 4, 18 + Math.sin(wi) * 8);
    }
    // White foam/spray streaks
    for (let fi = 0; fi < 8; fi++) {
      const fx = wfX + Math.sin(fi * 1.5) * wfW * 0.6;
      const fy = wfTop + ((t * 160 + fi * 40) % (wfBot - wfTop));
      ctx.globalAlpha = 0.12 + Math.sin(t * 4 + fi) * 0.06;
      ctx.fillStyle = '#cceeFF';
      ctx.fillRect(fx - 1, fy, 2, 25);
    }
    ctx.globalAlpha = 1;
    // Mist at waterfall base
    for (let mi = 0; mi < 8; mi++) {
      const mx = wfX + Math.sin(t * 0.4 + mi * 1.2) * 50;
      const my = wfBot + Math.sin(mi * 1.5) * 15;
      const mr = 40 + Math.sin(t * 0.6 + mi) * 15;
      const mA = 0.08 + Math.sin(t * 0.5 + mi * 0.8) * 0.04;
      const mg = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
      mg.addColorStop(0, `rgba(120,200,220,${mA})`);
      mg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = mg;
      ctx.fillRect(mx - mr, my - mr, mr * 2, mr * 2);
    }
    // Pool ripples at base
    ctx.strokeStyle = 'rgba(100,180,200,0.06)';
    ctx.lineWidth = 1;
    for (let ri = 0; ri < 4; ri++) {
      const rr = 20 + ri * 18 + Math.sin(t * 1.2 + ri) * 5;
      ctx.beginPath();
      ctx.ellipse(wfX, wfBot + 15, rr, rr * 0.2, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    // God rays from canopy
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let gi = 0; gi < 5; gi++) {
      const gx = W * (0.15 + gi * 0.18) + Math.sin(t * 0.1 + gi) * 30;
      const rayW = 15 + Math.sin(gi * 2) * 8;
      const rayA = 0.025 + Math.sin(t * 0.4 + gi * 1.5) * 0.015;
      const rg = ctx.createLinearGradient(gx, 0, gx + 30, H * 0.8);
      rg.addColorStop(0, `rgba(180,220,140,${rayA})`);
      rg.addColorStop(0.5, `rgba(140,200,100,${rayA * 0.6})`);
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.moveTo(gx - 2, 0);
      ctx.lineTo(gx + rayW + 20, H * 0.8);
      ctx.lineTo(gx - rayW + 20, H * 0.8);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Glowing mushrooms and flora
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const floraData = [
      { x: 0.06, y: 385 }, { x: 0.14, y: 395 }, { x: 0.25, y: 380 },
      { x: 0.38, y: 400 }, { x: 0.48, y: 388 }, { x: 0.55, y: 405 },
      { x: 0.62, y: 390 }, { x: 0.82, y: 398 }, { x: 0.9, y: 385 }, { x: 0.96, y: 400 }
    ];
    for (let fi = 0; fi < floraData.length; fi++) {
      const fd = floraData[fi];
      const fx = W * fd.x, fy = fd.y + Math.sin(fi * 2.1) * 10;
      const pulse = 0.5 + Math.sin(t * 1.8 + fi * 1.5) * 0.35;
      const fh = 140 + fi * 12;
      // Glow aura
      ctx.globalAlpha = 0.1 * pulse;
      const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, 25);
      fg.addColorStop(0, `hsl(${fh},85%,60%)`);
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(fx - 25, fy - 25, 50, 50);
      // Mushroom cap
      ctx.globalAlpha = 0.6 * pulse;
      ctx.fillStyle = `hsl(${fh},70%,45%)`;
      ctx.beginPath();
      ctx.ellipse(fx, fy - 3, 5, 3, 0, Math.PI, Math.PI * 2);
      ctx.fill();
      // Stem
      ctx.fillStyle = `hsl(${fh},40%,35%)`;
      ctx.fillRect(fx - 1, fy - 3, 2, 6);
      // Dot
      ctx.globalAlpha = 0.8 * pulse;
      ctx.fillStyle = `hsl(${fh},90%,70%)`;
      ctx.beginPath();
      ctx.arc(fx, fy - 4, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // Fireflies
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let fi = 0; fi < 20; fi++) {
      const fx = W * (0.05 + (fi / 19) * 0.9) + Math.sin(t * 0.8 + fi * 2.1) * 40;
      const fy = 100 + Math.sin(t * 0.5 + fi * 1.3) * 200;
      const fa = 0.15 + Math.sin(t * 2 + fi * 3) * 0.15;
      ctx.globalAlpha = fa;
      ctx.shadowColor = '#88ff44';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ccff88';
      ctx.beginPath();
      ctx.arc(fx, fy, 1.5 + Math.sin(t * 3 + fi) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();

  // =============================================================
  // ACT 3: NIGHT DOCKS — moon, water, wooden docks, ships, lanterns
  // =============================================================
  } else if (theme === 'act3') {
    // Night sky gradient
    const skyGrd = ctx.createLinearGradient(0, 0, 0, H);
    skyGrd.addColorStop(0, '#020818');
    skyGrd.addColorStop(0.25, '#041028');
    skyGrd.addColorStop(0.45, '#061430');
    skyGrd.addColorStop(0.55, '#061020');
    skyGrd.addColorStop(1, '#030810');
    ctx.fillStyle = skyGrd;
    ctx.fillRect(0, 0, W, H);

    // Stars (more visible for night sky)
    ctx.save();
    for (let si = 0; si < 60; si++) {
      const sx = (si * 137.5 + 20) % W;
      const sy = (si * 47.3) % (H * 0.4);
      const sa = 0.3 + Math.sin(t * 2 + si * 2.1) * 0.2;
      const sr = 0.5 + Math.sin(t + si) * 0.4;
      ctx.globalAlpha = sa;
      ctx.fillStyle = '#ddeeff';
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Large moon (upper left area)
    ctx.save();
    const moonX = W * 0.25, moonY = 70, moonR = 40;
    // Moon glow
    ctx.globalCompositeOperation = 'lighter';
    const moonGlow = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 4);
    moonGlow.addColorStop(0, 'rgba(180,200,240,0.12)');
    moonGlow.addColorStop(0.3, 'rgba(120,150,200,0.05)');
    moonGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = moonGlow;
    ctx.fillRect(moonX - moonR * 4, moonY - moonR * 4, moonR * 8, moonR * 8);
    ctx.globalCompositeOperation = 'source-over';
    // Moon disc
    ctx.fillStyle = '#c8d8ee';
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
    ctx.fill();
    // Moon craters
    ctx.fillStyle = 'rgba(160,180,210,0.4)';
    ctx.beginPath(); ctx.arc(moonX - 10, moonY - 8, 7, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX + 12, moonY + 5, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX - 3, moonY + 12, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(140,160,190,0.3)';
    ctx.beginPath(); ctx.arc(moonX + 5, moonY - 14, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Distant town silhouette
    ctx.save();
    ctx.fillStyle = 'rgba(10,15,30,0.6)';
    const buildings = [
      { x: 0, w: 60, h: 50 }, { x: 55, w: 40, h: 70 }, { x: 90, w: 50, h: 45 },
      { x: 135, w: 30, h: 85 }, { x: 160, w: 55, h: 55 }, { x: 210, w: 35, h: 65 },
    ];
    for (const b of buildings) {
      ctx.fillRect(b.x, 200 - b.h, b.w, b.h + 5);
      // Window lights
      ctx.fillStyle = `rgba(255,200,100,${0.08 + Math.sin(t * 0.5 + b.x) * 0.04})`;
      for (let wy = 200 - b.h + 10; wy < 195; wy += 14) {
        for (let wx = b.x + 6; wx < b.x + b.w - 6; wx += 10) {
          if (Math.sin(wx * 3 + wy * 7) > 0) ctx.fillRect(wx, wy, 4, 5);
        }
      }
      ctx.fillStyle = 'rgba(10,15,30,0.6)';
    }
    ctx.restore();

    // Water surface
    const waterY = 280;
    ctx.save();
    const waterGrd = ctx.createLinearGradient(0, waterY, 0, H);
    waterGrd.addColorStop(0, 'rgba(8,20,50,0.9)');
    waterGrd.addColorStop(0.3, 'rgba(6,16,40,0.95)');
    waterGrd.addColorStop(1, 'rgba(4,10,25,1)');
    ctx.fillStyle = waterGrd;
    ctx.fillRect(0, waterY, W, H - waterY);
    ctx.restore();

    // Water reflections (moonlight)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let ri = 0; ri < 20; ri++) {
      const rx = moonX + Math.sin(ri * 0.7 + t * 0.3) * (40 + ri * 8);
      const ry = waterY + 10 + ri * 8;
      const rw = 20 + Math.sin(t * 1.5 + ri) * 10;
      const ra = 0.04 - ri * 0.0015;
      if (ra > 0) {
        ctx.globalAlpha = ra;
        ctx.fillStyle = '#aabbdd';
        ctx.fillRect(rx - rw / 2, ry, rw, 2);
      }
    }
    // General water shimmer
    for (let wi = 0; wi < 40; wi++) {
      const wx = (wi * 29 + t * 15) % W;
      const wy = waterY + 5 + (wi * 17) % (H - waterY - 10);
      const ww = 8 + Math.sin(wi * 1.3 + t * 0.8) * 5;
      ctx.globalAlpha = 0.02 + Math.sin(t * 1.2 + wi * 2) * 0.01;
      ctx.fillStyle = '#6688aa';
      ctx.fillRect(wx, wy, ww, 1);
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // Wooden dock structure
    ctx.save();
    const dockX = W * 0.35, dockW = W * 0.45;
    const dockY = waterY - 8;
    // Dock pillars
    ctx.fillStyle = '#1a1410';
    const pillarPositions = [dockX, dockX + dockW * 0.25, dockX + dockW * 0.5, dockX + dockW * 0.75, dockX + dockW];
    for (const px of pillarPositions) {
      ctx.fillRect(px - 3, dockY, 6, 50 + Math.sin(px * 0.1) * 10);
      // Water ring around pillar
      ctx.strokeStyle = 'rgba(60,100,140,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(px, dockY + 12, 8 + Math.sin(t * 1.2 + px) * 2, 3, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Dock planks
    ctx.fillStyle = '#1e1812';
    ctx.fillRect(dockX - 5, dockY - 4, dockW + 10, 8);
    // Plank lines
    ctx.strokeStyle = 'rgba(40,30,20,0.5)';
    ctx.lineWidth = 0.5;
    for (let pl = 0; pl < 15; pl++) {
      const plx = dockX + pl * (dockW / 15);
      ctx.beginPath();
      ctx.moveTo(plx, dockY - 4);
      ctx.lineTo(plx, dockY + 4);
      ctx.stroke();
    }
    // Rope/railing
    ctx.strokeStyle = 'rgba(80,60,40,0.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(dockX, dockY - 18);
    for (let rx = dockX; rx <= dockX + dockW; rx += 4) {
      ctx.lineTo(rx, dockY - 18 + Math.sin((rx - dockX) * 0.04) * 4);
    }
    ctx.stroke();
    // Railing posts
    for (const px of pillarPositions) {
      ctx.fillStyle = '#1a1410';
      ctx.fillRect(px - 2, dockY - 22, 4, 18);
    }
    ctx.restore();

    // Moored ship silhouette (right side)
    ctx.save();
    const shipX = W * 0.82, shipY = waterY - 15;
    ctx.fillStyle = 'rgba(15,12,25,0.7)';
    ctx.beginPath();
    ctx.moveTo(shipX - 50, shipY);
    ctx.quadraticCurveTo(shipX - 60, shipY + 25, shipX - 30, shipY + 35);
    ctx.lineTo(shipX + 40, shipY + 35);
    ctx.quadraticCurveTo(shipX + 55, shipY + 25, shipX + 50, shipY);
    ctx.closePath();
    ctx.fill();
    // Mast
    ctx.fillStyle = 'rgba(20,16,30,0.8)';
    ctx.fillRect(shipX - 2, shipY - 80, 4, 80);
    // Crow's nest
    ctx.fillRect(shipX - 8, shipY - 80, 16, 4);
    // Sail (rolled)
    ctx.fillStyle = 'rgba(40,35,55,0.4)';
    ctx.fillRect(shipX - 20, shipY - 60, 40, 8);
    ctx.restore();

    // Lanterns on dock
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const lanterns = [dockX + dockW * 0.15, dockX + dockW * 0.5, dockX + dockW * 0.85];
    for (let li = 0; li < lanterns.length; li++) {
      const lx = lanterns[li], ly = dockY - 25;
      const lFlicker = 0.6 + Math.sin(t * 6 + li * 3) * 0.2 + Math.sin(t * 10 + li * 7) * 0.1;
      const lg = ctx.createRadialGradient(lx, ly, 0, lx, ly, 50 * lFlicker);
      lg.addColorStop(0, `rgba(255,180,80,${0.15 * lFlicker})`);
      lg.addColorStop(0.4, `rgba(220,120,40,${0.06 * lFlicker})`);
      lg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = lg;
      ctx.fillRect(lx - 50, ly - 50, 100, 100);
      // Lantern body
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = `rgba(255,200,100,${0.5 * lFlicker})`;
      ctx.beginPath();
      ctx.arc(lx, ly, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // Water-level fog
    ctx.save();
    for (let fi = 0; fi < 12; fi++) {
      const fx = (fi * 95 + Math.sin(t * 0.2 + fi) * 50) % (W + 80) - 40;
      const fy = waterY - 5 + Math.sin(fi * 1.7) * 10;
      const fr = 50 + Math.sin(fi * 2.1) * 20;
      const fA = 0.04 + Math.sin(t * 0.3 + fi * 1.1) * 0.02;
      const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
      fg.addColorStop(0, `rgba(60,80,120,${fA})`);
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(fx - fr, fy - fr, fr * 2, fr * 2);
    }
    ctx.restore();

  // =============================================================
  // BOSS: ICE CRYSTAL PORTAL — frozen cavern, glowing crystal portal, ice formations
  // =============================================================
  } else {
    // Dark icy gradient
    const skyGrd = ctx.createLinearGradient(0, 0, 0, H);
    skyGrd.addColorStop(0, '#040818');
    skyGrd.addColorStop(0.2, '#081028');
    skyGrd.addColorStop(0.4, '#0a1838');
    skyGrd.addColorStop(0.6, '#081430');
    skyGrd.addColorStop(0.8, '#061020');
    skyGrd.addColorStop(1, '#040810');
    ctx.fillStyle = skyGrd;
    ctx.fillRect(0, 0, W, H);

    // Ice cavern walls (left and right)
    ctx.save();
    for (let side = 0; side < 2; side++) {
      const sx = side === 0 ? 0 : W;
      const dir = side === 0 ? 1 : -1;
      const wallW = 120;
      const wGrd = ctx.createLinearGradient(sx, 0, sx + wallW * dir, 0);
      wGrd.addColorStop(0, 'rgba(15,25,50,0.9)');
      wGrd.addColorStop(0.5, 'rgba(10,20,40,0.5)');
      wGrd.addColorStop(1, 'rgba(5,10,25,0)');
      ctx.fillStyle = wGrd;
      ctx.fillRect(Math.min(sx, sx + wallW * dir), 0, wallW, H);
      // Ice crystals on walls
      for (let ci = 0; ci < 8; ci++) {
        const cy = 40 + ci * 55 + Math.sin(ci * 2.3) * 15;
        const cLen = 20 + Math.sin(ci * 1.7) * 12;
        const cW = 4 + Math.sin(ci * 3.1) * 2;
        const cAngle = dir * (0.3 + Math.sin(ci * 1.5) * 0.2);
        ctx.save();
        ctx.translate(sx + 5 * dir, cy);
        ctx.rotate(cAngle);
        const cGrd = ctx.createLinearGradient(0, -cW, cLen * dir, 0);
        cGrd.addColorStop(0, `rgba(100,180,240,${0.3 + Math.sin(t * 1.5 + ci) * 0.1})`);
        cGrd.addColorStop(1, 'rgba(60,120,200,0)');
        ctx.fillStyle = cGrd;
        ctx.beginPath();
        ctx.moveTo(0, -cW);
        ctx.lineTo(cLen * dir, 0);
        ctx.lineTo(0, cW);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();

    // Central portal (massive glowing oval)
    ctx.save();
    const portalX = W / 2, portalY = H * 0.38;
    const portalRx = 100 + Math.sin(t * 0.5) * 8;
    const portalRy = 130 + Math.sin(t * 0.7) * 10;
    // Portal outer glow
    ctx.globalCompositeOperation = 'lighter';
    for (let gi = 0; gi < 5; gi++) {
      const gr = portalRx + gi * 30 + Math.sin(t * 0.3 + gi) * 10;
      const gry = portalRy + gi * 25 + Math.sin(t * 0.4 + gi) * 8;
      const gA = 0.06 - gi * 0.01;
      const gH = 200 + gi * 10 + Math.sin(t * 0.2 + gi) * 15;
      const pg = ctx.createRadialGradient(portalX, portalY, 0, portalX, portalY, Math.max(gr, gry));
      pg.addColorStop(0, `hsla(${gH},80%,60%,${gA})`);
      pg.addColorStop(0.5, `hsla(${gH + 20},70%,40%,${gA * 0.5})`);
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.ellipse(portalX, portalY, gr, gry, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Portal inner energy
    const portalInner = ctx.createRadialGradient(portalX, portalY, 0, portalX, portalY, portalRx);
    const pH = 200 + Math.sin(t * 0.5) * 20;
    portalInner.addColorStop(0, `hsla(${pH},90%,85%,0.2)`);
    portalInner.addColorStop(0.3, `hsla(${pH + 10},85%,65%,0.15)`);
    portalInner.addColorStop(0.6, `hsla(${pH + 20},80%,50%,0.1)`);
    portalInner.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = portalInner;
    ctx.beginPath();
    ctx.ellipse(portalX, portalY, portalRx, portalRy, 0, 0, Math.PI * 2);
    ctx.fill();
    // Portal swirling energy rings
    for (let ri = 0; ri < 4; ri++) {
      const rr = portalRx * (0.4 + ri * 0.2);
      const rry = portalRy * (0.4 + ri * 0.2);
      const rAngle = t * (0.5 + ri * 0.2) * (ri % 2 === 0 ? 1 : -1);
      ctx.strokeStyle = `hsla(${pH + ri * 15},80%,70%,${0.08 - ri * 0.015})`;
      ctx.lineWidth = 2 - ri * 0.3;
      ctx.beginPath();
      ctx.ellipse(portalX, portalY, rr, rry, rAngle, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Energy particles flowing into portal
    for (let pi = 0; pi < 15; pi++) {
      const pAngle = (pi / 15) * Math.PI * 2 + t * 0.8;
      const pDist = portalRx * 1.3 - ((t * 40 + pi * 20) % (portalRx * 0.8));
      const px = portalX + Math.cos(pAngle) * pDist;
      const py = portalY + Math.sin(pAngle) * pDist * (portalRy / portalRx);
      const pA = 0.3 * (pDist / (portalRx * 1.3));
      ctx.globalAlpha = pA;
      ctx.fillStyle = `hsl(${pH + pi * 8},85%,75%)`;
      ctx.beginPath();
      ctx.arc(px, py, 1.5 + Math.sin(t * 3 + pi) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    // Large ice crystal formations (foreground)
    ctx.save();
    const crystals = [
      { x: W * 0.08, y: H, h: 140, w: 20, angle: 0.15 },
      { x: W * 0.18, y: H, h: 100, w: 15, angle: 0.1 },
      { x: W * 0.28, y: H, h: 75, w: 12, angle: -0.05 },
      { x: W * 0.72, y: H, h: 80, w: 13, angle: 0.08 },
      { x: W * 0.82, y: H, h: 110, w: 16, angle: -0.1 },
      { x: W * 0.92, y: H, h: 150, w: 22, angle: -0.15 },
      { x: W * 0.05, y: H, h: 60, w: 10, angle: 0.25 },
      { x: W * 0.95, y: H, h: 65, w: 11, angle: -0.25 },
    ];
    for (let ci = 0; ci < crystals.length; ci++) {
      const cr = crystals[ci];
      ctx.save();
      ctx.translate(cr.x, cr.y);
      ctx.rotate(cr.angle);
      const cGrd = ctx.createLinearGradient(0, 0, 0, -cr.h);
      const cH = 200 + ci * 8;
      cGrd.addColorStop(0, `hsla(${cH},50%,20%,0.8)`);
      cGrd.addColorStop(0.3, `hsla(${cH},60%,35%,0.6)`);
      cGrd.addColorStop(0.7, `hsla(${cH},70%,50%,0.4)`);
      cGrd.addColorStop(1, `hsla(${cH},80%,65%,0.2)`);
      ctx.fillStyle = cGrd;
      ctx.beginPath();
      ctx.moveTo(-cr.w, 0);
      ctx.lineTo(-cr.w * 0.3, -cr.h * 0.7);
      ctx.lineTo(0, -cr.h);
      ctx.lineTo(cr.w * 0.3, -cr.h * 0.7);
      ctx.lineTo(cr.w, 0);
      ctx.closePath();
      ctx.fill();
      // Crystal edge highlight
      ctx.strokeStyle = `hsla(${cH},80%,70%,${0.15 + Math.sin(t * 1.5 + ci) * 0.08})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-cr.w * 0.3, -cr.h * 0.7);
      ctx.lineTo(0, -cr.h);
      ctx.lineTo(cr.w * 0.3, -cr.h * 0.7);
      ctx.stroke();
      // Inner refraction line
      ctx.strokeStyle = `hsla(${cH},70%,60%,0.08)`;
      ctx.beginPath();
      ctx.moveTo(0, -cr.h * 0.9);
      ctx.lineTo(cr.w * 0.1, -cr.h * 0.2);
      ctx.stroke();
      ctx.restore();
      // Crystal base glow
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const bGlow = ctx.createRadialGradient(cr.x, cr.y - 10, 0, cr.x, cr.y - 10, 30);
      bGlow.addColorStop(0, `hsla(${cH},80%,60%,${0.06 + Math.sin(t * 1.2 + ci) * 0.03})`);
      bGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bGlow;
      ctx.fillRect(cr.x - 30, cr.y - 40, 60, 40);
      ctx.restore();
    }
    ctx.restore();

    // Frozen ground
    drawHills(400, 0.2, 210, 30, 8, 0.85, 12, 0.008);
    drawHills(430, 0.4, 205, 25, 5, 0.9, 8, 0.013);

    // Ice particle snow/dust
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let si = 0; si < 25; si++) {
      const sx = (si * 47 + t * 15) % W;
      const sy = (si * 31 + t * 20 + Math.sin(t * 0.5 + si) * 40) % H;
      ctx.globalAlpha = 0.15 + Math.sin(t * 1.5 + si * 2) * 0.1;
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + Math.sin(t + si) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // --- Stars (only for act1 and act2 - act3 and boss have their own) ---
  if (theme === 'act1' || theme === 'act2') {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const hB = theme === 'act1' ? 30 : 160;
    for (let si = 0; si < 30; si++) {
      const sx = ((si * 137.5 + Math.sin(t * 0.08 + si) * 12) % W);
      const sy = ((si * 73.1 + Math.cos(t * 0.06 + si * 0.7) * 8) % (H * 0.3));
      const sa = 0.12 + Math.sin(t * 1.5 + si * 2.1) * 0.1;
      const sr = 0.5 + Math.sin(t + si) * 0.4;
      const sh = (hB + si * 20) % 360;
      ctx.globalAlpha = sa;
      ctx.fillStyle = `hsl(${sh},40%,85%)`;
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // --- Floating light orbs (all themes, theme-colored) ---
  const hB = theme === 'act1' ? 30 : theme === 'act2' ? 130 : theme === 'act3' ? 210 : 200;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let oi = 0; oi < 12; oi++) {
    const ot2 = t * 0.6 + oi * 1.7;
    const ox = W * 0.08 + (oi / 11) * W * 0.84 + Math.sin(ot2 * 0.7) * 30;
    const oy = 100 + Math.sin(ot2 * 0.3 + oi * 0.8) * (H * 0.45);
    const or2 = 2 + Math.sin(ot2 * 0.6) * 2;
    const oh = (hB + oi * 25 + Math.sin(t * 1.2 + oi) * 30) % 360;
    ctx.globalAlpha = 0.18 + Math.sin(ot2 * 0.9) * 0.1;
    ctx.shadowColor = `hsl(${oh},80%,60%)`;
    ctx.shadowBlur = 12;
    ctx.fillStyle = `hsl(${oh},80%,70%)`;
    ctx.beginPath();
    ctx.arc(ox, oy, or2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
  ctx.globalAlpha = 1;

  renderAmbientParticles();
};

  if (u.weak) u.weak = u.weak + 1;
  return u;
};

const getCardPool = (character) => {
  const ch = character || game.character || 'pacto';
  const pool = [];
  for (let i = 0; i < CARDS.length; i++) {
    const r = CARDS[i].r;
    if (r === 'starter' || r === 'starter_sombra' || r === 'starter_cinza' || r === 'status') continue;
    const isSombra = r.includes('sombra');
    const isCinza = r.includes('cinza');
    if (isSombra && ch !== 'sombra') continue;
    if (isCinza && ch !== 'cinza') continue;
    if (!isSombra && !isCinza) { pool.push(i); continue; }
    pool.push(i);
  }
  return pool;
};

const awardTrophy = (id) => {
  if (!meta.trophies) meta.trophies = [];
  if (meta.trophies.includes(id)) return;
  meta.trophies.push(id);
  const t = TROPHIES.find(tr => tr.id === id);
  if (t) trophyQueue.push(t);
  saveMeta();
};

const checkTrophies = () => {
  const t = meta.trophies || [];
  const has = (id) => t.includes(id);

  if (!has('firstBlood') && meta.totalKills >= 1) awardTrophy('firstBlood');
  if (!has('tenKills') && meta.totalKills >= 10) awardTrophy('tenKills');
  if (!has('hundredKills') && meta.totalKills >= 100) awardTrophy('hundredKills');
  if (!has('thousandKills') && meta.totalKills >= 1000) awardTrophy('thousandKills');
  if (!has('firstRun') && meta.totalRuns >= 1) awardTrophy('firstRun');
  if (!has('eliteSlayer') && (meta.totalElitesKilled || 0) >= 5) awardTrophy('eliteSlayer');
  if (!has('potionUser') && (meta.totalPotionsUsed || 0) >= 1) awardTrophy('potionUser');
  if (!has('firstForge') && (meta.totalCardsForged || 0) >= 1) awardTrophy('firstForge');
  if (!has('shopVisit') && (meta.totalShopBuys || 0) >= 1) awardTrophy('shopVisit');
  if (!has('altarUpgrade5') && (meta.totalAltarBuys || 0) >= 5) awardTrophy('altarUpgrade5');
  if (!has('unlockChar') && meta.unlockedChars && meta.unlockedChars.length > 1) awardTrophy('unlockChar');
  if (!has('bigDamage') && (meta.maxSingleHit || 0) >= 50) awardTrophy('bigDamage');
  if (!has('allRelics') && meta.allRelicsEver && meta.allRelicsEver.length >= 10) awardTrophy('allRelics');

  const v = meta.victories || {};
  if (!has('victoryPacto') && (v.pacto || 0) >= 1) awardTrophy('victoryPacto');
  if (!has('victorySombra') && (v.sombra || 0) >= 1) awardTrophy('victorySombra');
  if (!has('victoryCinza') && (v.cinza || 0) >= 1) awardTrophy('victoryCinza');

  if (game.state !== 'menu') {
    if (!has('cardCollector') && game.deck && game.deck.length >= 15) awardTrophy('cardCollector');
    if (!has('goldHoarder') && game.gold >= 200) awardTrophy('goldHoarder');
    if (!has('survivor') && game.hp > 0 && game.hp <= 5) awardTrophy('survivor');
    if (!has('firstRelic') && game.relics && game.relics.length >= 1) awardTrophy('firstRelic');
    if (!has('relicHoarder') && game.relics && game.relics.length >= 5) awardTrophy('relicHoarder');
  }

  if (!has('actClear1') && (meta.actsCleared || 0) >= 1) awardTrophy('actClear1');
  if (!has('actClear2') && (meta.actsCleared || 0) >= 2) awardTrophy('actClear2');

  const nonPlat = TROPHIES.filter(tr => tr.id !== 'platinum');
  if (!has('platinum') && nonPlat.every(tr => t.includes(tr.id))) awardTrophy('platinum');
};

  let souls = (game.floor + 1) * 5;
  souls += (game.stats.elitesKilled || 0) * 20;

  if (won) souls += 100;

};

// ==================== DRAW HELPERS ====================
const roundRect = (x, y, w, h, r) => {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
};

const drawBar = (x, y, w, h, ratio, color1, color2, bgColor) => {
  ctx.fillStyle = bgColor || '#12101e';
  roundRect(x, y, w, h, 3);
  ctx.fill();
  if (ratio > 0) {
    const grd = ctx.createLinearGradient(x, y, x + w * ratio, y);
    grd.addColorStop(0, color1);
    grd.addColorStop(1, color2 || color1);
    ctx.fillStyle = grd;
    roundRect(x, y, w * clamp(ratio, 0, 1), h, 3);
    ctx.fill();
  }
  ctx.strokeStyle = PAL.panelBorder;
  ctx.lineWidth = 1;
  roundRect(x, y, w, h, 3);
  ctx.stroke();
};

const drawGlowText = (text, x, y, color, size, blur) => {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur || 10;
  ctx.font = `bold ${size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
};

const wrapText = (text, maxWidth, fontSize, fontFamily) => {
  ctx.font = `${fontSize}px ${fontFamily || 'sans-serif'}`;
  const lines = [];
  const paragraphs = text.split('\n');
  for (const para of paragraphs) {
    const words = para.split(' ');
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth) {
        if (currentLine) lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
  }
  return lines;
};

const drawVignette = () => {
  const grd = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.72);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
};

const drawPanel = (x, y, w, h, r) => {
  ctx.fillStyle = PAL.panel;
  roundRect(x, y, w, h, r || 8);
  ctx.fill();
  ctx.strokeStyle = PAL.panelBorder;
  ctx.lineWidth = 1.5;
  roundRect(x, y, w, h, r || 8);
  ctx.stroke();
};

const drawButton = (x, y, w, h, text, hovered, color) => {
  const baseColor = color || '#334466';
  ctx.fillStyle = hovered ? '#445577' : baseColor;
  roundRect(x, y, w, h, 6);

  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = PAL.text;
  ctx.fillText(text, x + w / 2, y + h / 2);
};

// ==================== CARD RENDERING ====================
const CARD_W = 120, CARD_H = 170;

const getCardColors = (type) => {
  const p = PAL[type] || PAL.status;
  return { c1: p.c1, c2: p.c2, c3: p.c3, border: p.border, glow: p.glow };
};

const getRarityColor = (rarity) => {
  if (rarity === 'starter') return PAL.rarity.starter;
  return PAL.rarity[rarity] || PAL.rarity.status;
};

const drawCardIcon = (cx, cy, type, size) => {
  const s = size || 18;
  ctx.save();
  ctx.translate(cx, cy);
  if (type === 'attack') {
    ctx.strokeStyle = '#ffcccc';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.3);
    ctx.lineTo(0, s * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 0.5, -s * 0.1);
    ctx.lineTo(s * 0.5, -s * 0.1);
    ctx.stroke();
    ctx.fillStyle = '#ff6666';
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.3);
    ctx.lineTo(s * 0.2, -s * 0.6);
    ctx.lineTo(-s * 0.2, -s * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s * 0.05, -s * 1.2);
    ctx.lineTo(s * 0.05, -s * 0.2);
    ctx.stroke();
  } else if (type === 'skill') {
    ctx.fillStyle = '#6699dd';
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.2);
    ctx.lineTo(s, -s * 0.3);
    ctx.lineTo(s * 0.7, s * 1.1);
    ctx.lineTo(0, s * 1.4);
    ctx.lineTo(-s * 0.7, s * 1.1);
    ctx.lineTo(-s, -s * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#88bbff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#e8dcc8';
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.1);
    ctx.lineTo(s * 0.7, -s * 0.25);
    ctx.lineTo(0, s * 0.2);
    ctx.lineTo(-s * 0.7, -s * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  } else if (type === 'power') {
    ctx.fillStyle = '#ddaa33';
    const points = 5;
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const r = i % 2 === 0 ? s * 1.1 : s * 0.5;
      if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
      else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ffcc44';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,204,68,0.3)';
    ctx.lineWidth = 0.8;
    for (let ri = 0; ri < 8; ri++) {
      const ra = (ri * Math.PI * 2) / 8;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ra) * s * 1.2, Math.sin(ra) * s * 1.2);
      ctx.lineTo(Math.cos(ra) * s * 1.6, Math.sin(ra) * s * 1.6);
      ctx.stroke();
    }
  } else {
    ctx.fillStyle = '#666666';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#807868';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-s * 0.4, -s * 0.3);
    ctx.lineTo(s * 0.4, s * 0.3);
    ctx.moveTo(s * 0.4, -s * 0.3);
    ctx.lineTo(-s * 0.4, s * 0.3);
    ctx.stroke();
  }
  ctx.restore();
};

const drawCard = (x, y, card, scale, hovered, selectable) => {
  const data = getCardData(card);
  const colors = getCardColors(data.t);
  const rarColor = getRarityColor(data.r);
  const w = CARD_W * scale;
  const h = CARD_H * scale;
  const now = Date.now();
  const sk = -0.08 * scale;

  ctx.save();

  if (hovered && selectable) {
    ctx.translate(x, y);
    ctx.scale(1.1, 1.1);
    ctx.translate(-x, -y);
  }

  const lx = x - w / 2;
  const ly = y - h / 2;

  ctx.save();
  ctx.transform(1, 0, sk, 1, 0, 0);

  const accent = colors.c1;
  const accentDark = colors.c2;

  ctx.fillStyle = accent;
  ctx.beginPath();
  ctx.moveTo(lx - 4, ly - 4);
  ctx.lineTo(lx + w + 4, ly - 4);
  ctx.lineTo(lx + w + 7, ly + h + 4);
  ctx.lineTo(lx + w, ly + h + 7);
  ctx.lineTo(lx - 4, ly + h + 7);
  ctx.lineTo(lx - 7, ly + h + 4);
  ctx.closePath();
  ctx.fill();

  if (data.r === 'uncommon' || data.r === 'rare') {
    const pulse = Math.sin(now * 0.004) * 0.5 + 0.5;
    ctx.save();
    ctx.shadowColor = data.r === 'rare' ? PAL.rarity.rare : PAL.rarity.uncommon;
    ctx.shadowBlur = 10 + pulse * 14;
    ctx.fillStyle = 'transparent';
    ctx.beginPath();
    ctx.moveTo(lx - 4, ly - 4);
    ctx.lineTo(lx + w + 4, ly - 4);
    ctx.lineTo(lx + w + 7, ly + h + 4);
    ctx.lineTo(lx - 7, ly + h + 4);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
  if (hovered && selectable) {
    ctx.save();
    ctx.shadowColor = colors.glow || accent;
    ctx.shadowBlur = 22;
    ctx.strokeStyle = '#e8dcc8';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(lx - 4, ly - 4);
    ctx.lineTo(lx + w + 4, ly - 4);
    ctx.lineTo(lx + w + 7, ly + h + 4);
    ctx.lineTo(lx - 7, ly + h + 4);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  ctx.fillStyle = '#3a2858';
  ctx.beginPath();
  ctx.moveTo(lx - 2, ly - 2);
  ctx.lineTo(lx + w + 2, ly - 2);
  ctx.lineTo(lx + w + 5, ly + h + 2);
  ctx.lineTo(lx + w - 1, ly + h + 5);
  ctx.lineTo(lx - 2, ly + h + 5);
  ctx.lineTo(lx - 5, ly + h + 2);
  ctx.closePath();
  ctx.fill();

  const grd = ctx.createLinearGradient(lx, ly, lx + w * 0.3, ly + h);
  grd.addColorStop(0, '#0e0a1a');
  grd.addColorStop(0.4, '#0a0818');
  grd.addColorStop(1, '#100e1a');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx + w, ly);
  ctx.lineTo(lx + w + 3, ly + h);
  ctx.lineTo(lx + w - 2, ly + h + 3);
  ctx.lineTo(lx, ly + h + 3);
  ctx.lineTo(lx - 3, ly + h);
  ctx.closePath();
  ctx.fill();

  const stripH = 28 * scale;
  const stripY = ly + 2;
  const stripGrd = ctx.createLinearGradient(lx, 0, lx + w, 0);
  stripGrd.addColorStop(0, accent);
  stripGrd.addColorStop(0.7, accentDark);
  stripGrd.addColorStop(1, accent + '88');
  ctx.fillStyle = stripGrd;
  ctx.beginPath();
  ctx.moveTo(lx, stripY);
  ctx.lineTo(lx + w, stripY);
  ctx.lineTo(lx + w + 1, stripY + stripH);
  ctx.lineTo(lx - 1, stripY + stripH);
  ctx.closePath();
  ctx.fill();

  ctx.font = `bold italic ${12 * scale}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8dcc8';
  ctx.shadowColor = '#000000';
  ctx.shadowBlur = 3;
  ctx.fillText(data.n, lx + w / 2, stripY + stripH / 2);
  ctx.shadowBlur = 0;

  if (!data.unplayable && data.c >= 0) {
    const orbR = 13 * scale;
    const orbX = lx + w - 4 * scale;
    const orbY = stripY + stripH / 2;
    ctx.save();
    ctx.shadowColor = accent;
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#0a0818';
    ctx.beginPath();
    ctx.moveTo(orbX, orbY - orbR);
    ctx.lineTo(orbX + orbR, orbY);
    ctx.lineTo(orbX, orbY + orbR);
    ctx.lineTo(orbX - orbR, orbY);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.5 * scale;
    ctx.stroke();
    ctx.restore();
    ctx.font = `bold ${14 * scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#e8dcc8';
    ctx.fillText(String(data.c), orbX, orbY);
  }

  const iconY = ly + stripH + 24 * scale;
  drawCardIcon(lx + w / 2, iconY, data.t, 16 * scale);

  const descLines = wrapText(data.d, w - 14 * scale, 10 * scale, 'sans-serif');
  ctx.font = `${10 * scale}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#bbaaaa';
  let descY = iconY + 22 * scale;
  for (const line of descLines) {
    ctx.fillText(line, lx + w / 2, descY);
    descY += 12 * scale;
  }

  const typeLabel = data.t === 'attack' ? 'ATAQUE' : data.t === 'skill' ? 'HABILIDADE' : data.t === 'power' ? 'PODER' : 'STATUS';
  const footY = ly + h - 4 * scale;
  ctx.fillStyle = accentDark;
  ctx.beginPath();
  ctx.moveTo(lx + 8 * scale, footY - 12 * scale);
  ctx.lineTo(lx + w - 8 * scale, footY - 12 * scale);
  ctx.lineTo(lx + w - 6 * scale, footY + 2 * scale);
  ctx.lineTo(lx + 6 * scale, footY + 2 * scale);
  ctx.closePath();
  ctx.fill();
  ctx.font = `bold italic ${8 * scale}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ddccbb';
  ctx.fillText(typeLabel, lx + w / 2, footY - 5 * scale);

  if (data.r === 'rare') {
    ctx.save();
    const sparkT = (now * 0.003) % (Math.PI * 2);
    for (let sp = 0; sp < 3; sp++) {
      const sa = sparkT + sp * Math.PI * 2 / 3;
      const sx = lx + w / 2 + Math.cos(sa) * w * 0.4;
      const sy = ly + h / 2 + Math.sin(sa) * h * 0.3;
      ctx.globalAlpha = 0.5 + Math.sin(now * 0.006 + sp) * 0.3;
      ctx.fillStyle = '#ffdd44';
      ctx.shadowColor = '#ffdd44';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(sx, sy - 3);
      ctx.lineTo(sx + 2, sy);
      ctx.lineTo(sx, sy + 3);
      ctx.lineTo(sx - 2, sy);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  const jagSide = 6 * scale;
  ctx.fillStyle = accent;
  for (let jy = ly + 20; jy < ly + h - 15; jy += jagSide * 3) {
    ctx.beginPath();
    ctx.moveTo(lx - 3, jy);
    ctx.lineTo(lx - 3 - jagSide * 0.6, jy + jagSide);
    ctx.lineTo(lx - 3, jy + jagSide * 2);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
  ctx.restore();
};

const drawEnemySprite = (key, cx, cy, size, shake) => {

    ctx.strokeStyle = '#c4b898'; ctx.lineWidth = s * 0.025; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-s * 0.2, -s * 0.12); ctx.lineTo(-s * 0.35, s * 0.0); ctx.stroke();

    ctx.save(); ctx.shadowColor = '#44ffcc'; ctx.shadowBlur = s * 0.2;
    const lichCrGrd = ctx.createRadialGradient(s * 0.35, -s * 0.56, 0, s * 0.35, -s * 0.56, s * 0.08);
    lichCrGrd.addColorStop(0, '#ccffee'); lichCrGrd.addColorStop(1, '#44ccaa');
    ctx.fillStyle = lichCrGrd;
    ctx.beginPath(); ctx.moveTo(s * 0.35, -s * 0.66); ctx.lineTo(s * 0.28, -s * 0.56);

    ctx.fillStyle = '#c4b898';

    ctx.fillStyle = '#b4a888';
    ctx.beginPath(); ctx.moveTo(-s * 0.1, -s * 0.3);
    ctx.quadraticCurveTo(-s * 0.14, -s * 0.24, 0, -s * 0.2);

    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.moveTo(-s * 0.015, -s * 0.33); ctx.lineTo(0, -s * 0.3);
    ctx.lineTo(s * 0.015, -s * 0.33); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ccaa33';
    ctx.beginPath(); ctx.moveTo(-s * 0.15, -s * 0.48); ctx.lineTo(-s * 0.16, -s * 0.52);
    ctx.lineTo(-s * 0.12, -s * 0.6); ctx.lineTo(-s * 0.06, -s * 0.54);
    ctx.lineTo(0, -s * 0.62); ctx.lineTo(s * 0.06, -s * 0.54);
    ctx.lineTo(s * 0.12, -s * 0.6); ctx.lineTo(s * 0.16, -s * 0.52);
    ctx.lineTo(s * 0.15, -s * 0.48); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff2244';
    ctx.beginPath(); ctx.arc(0, -s * 0.53, s * 0.02, 0, Math.PI * 2); ctx.fill();

  } else {

  const eyeGlowMap = {

    soulEater: { color: '#cc44ff', pos: [[-s*0.12, -s*0.2], [s*0.12, -s*0.18]], r: s*0.04 },
    chosen: { color: '#4488ff', pos: [[-s*0.06, -s*0.44], [s*0.06, -s*0.44]], r: s*0.03 },
