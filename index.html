const drawIntentIcon = (x, y, intent, enemy) => {
  const s = 12;
  ctx.save();
  ctx.translate(x, y);

  if (intent.intent === 'attack' || intent.intent === 'multi') {
    const totalDmg = (intent.dmg + (enemy.strength || 0)) * (intent.hits || 1);
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s * 0.7, s * 0.5);
    ctx.lineTo(-s * 0.7, s * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#ff6666';
    let label = String(totalDmg);
    if (intent.hits && intent.hits > 1) label = `${intent.dmg + (enemy.strength || 0)}x${intent.hits}`;
    ctx.fillText(label, 0, s + 2);
  } else if (intent.intent === 'block') {
    ctx.fillStyle = '#3498db';
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s, 0);
    ctx.lineTo(s * 0.6, s);
    ctx.lineTo(-s * 0.6, s);
    ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.fill();
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#88ccff';
    ctx.fillText(String(intent.blk), 0, s + 2);
  } else if (intent.intent === 'buff') {
    ctx.fillStyle = '#c8a040';
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s * 0.5, -s * 0.2);
    ctx.lineTo(s, -s * 0.2);
    ctx.lineTo(s * 0.6, s * 0.25);
    ctx.lineTo(s * 0.8, s);
    ctx.lineTo(0, s * 0.5);
    ctx.lineTo(-s * 0.8, s);
    ctx.lineTo(-s * 0.6, s * 0.25);
    ctx.lineTo(-s, -s * 0.2);
    ctx.lineTo(-s * 0.5, -s * 0.2);
    ctx.closePath();
    ctx.fill();
  } else if (intent.intent === 'debuff') {
    ctx.fillStyle = '#9933cc';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#cc66ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-s * 0.3, -s * 0.3);
    ctx.lineTo(s * 0.3, s * 0.3);
    ctx.moveTo(s * 0.3, -s * 0.3);
    ctx.lineTo(-s * 0.3, s * 0.3);
    ctx.stroke();
  }

  ctx.restore();
};

const drawEnemy = (enemy, idx) => {
  if (enemy.dead && enemy.deathTimer <= 0) return;

  const alpha = enemy.dead ? clamp(enemy.deathTimer, 0, 1) : 1;
  ctx.globalAlpha = alpha;

  const sizeMult = {
    imp: 0.7, cultist: 0.85, skeleton: 0.75, nob: 1.15, demonKnight: 1.25,
    darkElf: 0.85, chosen: 0.95, snake: 0.6, wraith: 0.95, lich: 1.1,
    gargoyle: 1.05, soulEater: 0.95, zealot: 0.8, dragon: 1.3, theVoid: 1.4,
  };
  const baseSize = (isTouchDevice ? 130 : 90) * (sizeMult[enemy.key] || 1);

  ctx.save();
  ctx.globalAlpha = alpha * 0.25;
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.ellipse(enemy.x, enemy.y + baseSize * 0.65, baseSize * 0.5, baseSize * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = alpha;

  const isLunging = enemyLungeAnims.has(enemy);
  if (isLunging) {
    const anim = enemyLungeAnims.get(enemy);
    if (anim.phase < 0.5) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.15 * (anim.phase * 2);
      ctx.fillStyle = '#ff2200';
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, baseSize * 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = alpha;
    }
  }

  drawEnemySprite(enemy.key, enemy.x, enemy.y, baseSize, enemy.shake);

  if (!enemy.dead) {
    drawIntentIcon(enemy.x, enemy.y - baseSize - 25, enemy.intent, enemy);
  }

  const mobE = isTouchDevice;
  const barW = mobE ? 100 : 70;
  const barX = enemy.x - barW / 2;
  const barY = enemy.y + baseSize * 0.7 + 5;
  drawBar(barX, barY, barW, mobE ? 14 : 10, enemy.hp / enemy.maxHp, '#e74c3c', '#cc3333');
  ctx.font = mobE ? 'bold 13px sans-serif' : 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8e0d0';
  ctx.fillText(`${enemy.hp}/${enemy.maxHp}`, enemy.x, barY + (mobE ? 7 : 5));

  if (enemy.block > 0) {
    ctx.fillStyle = '#3498db';
    ctx.beginPath();
    ctx.moveTo(enemy.x, barY - 8);
    ctx.lineTo(enemy.x + 10, barY - 2);
    ctx.lineTo(enemy.x + 7, barY + 8);
    ctx.lineTo(enemy.x - 7, barY + 8);
    ctx.lineTo(enemy.x - 10, barY - 2);
    ctx.closePath();
    ctx.fill();
    ctx.font = 'bold 9px sans-serif';
    ctx.fillStyle = '#e8dcc8';
    ctx.fillText(String(enemy.block), enemy.x, barY + 1);
  }

  ctx.font = '10px sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#e8e0d0';
  ctx.fillText(enemy.n, enemy.x, barY + 14);

  let statusY = barY + 28;
  if (enemy.vulnerable > 0) {
    ctx.fillStyle = '#cc6633';
    ctx.fillText(`Vuln ${enemy.vulnerable}`, enemy.x, statusY);
    statusY += 12;
  }
  if (enemy.weak > 0) {
    ctx.fillStyle = '#6699cc';
    ctx.fillText(`Fraco ${enemy.weak}`, enemy.x, statusY);
    statusY += 12;
  }
  if (enemy.strength > 0) {
    ctx.fillStyle = '#cc3333';
    ctx.fillText(`For +${enemy.strength}`, enemy.x, statusY);
    statusY += 12;
  }
  if (enemy.poison > 0) {
    // Poison badge
    const pbW = 42, pbH = 16;
    const pbX = enemy.x - pbW / 2, pbY = statusY - 6;
    ctx.fillStyle = '#0e2e0e';
    ctx.beginPath();
    ctx.moveTo(pbX, pbY);
    ctx.lineTo(pbX + pbW, pbY);
    ctx.lineTo(pbX + pbW + 2, pbY + pbH);
    ctx.lineTo(pbX - 2, pbY + pbH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#33cc3388';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = 'bold 10px sans-serif';
    ctx.fillStyle = '#33ee33';
    ctx.shadowColor = '#33cc33';
    ctx.shadowBlur = 6;
    ctx.fillText(`☠ ${enemy.poison}`, enemy.x, statusY + 2);
    ctx.shadowBlur = 0;

    // Animated poison bubbles
    const now = Date.now();
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let bi = 0; bi < 6; bi++) {
      const bPhase = now * 0.002 + bi * 1.05;
      const bx = enemy.x + Math.sin(bPhase * 1.3 + bi * 2.1) * (baseSize * 0.5);
      const rawY = (bPhase * 30 + bi * 40) % (baseSize * 1.4);
      const by = enemy.y + baseSize * 0.4 - rawY;
      const bRadius = 2 + Math.sin(bPhase * 2 + bi) * 1.2;
      const bAlpha = 0.35 - (rawY / (baseSize * 1.4)) * 0.3;
      if (bAlpha <= 0) continue;
      ctx.globalAlpha = bAlpha;
      ctx.fillStyle = `hsl(${120 + Math.sin(bPhase) * 20},80%,55%)`;
      ctx.beginPath();
      ctx.arc(bx, by, bRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = bAlpha * 0.4;
      ctx.strokeStyle = '#88ff88';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(bx, by, bRadius + 1, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();

    // Green tint aura on poisoned enemy
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.04 + Math.sin(now * 0.003) * 0.02;
    const poisonGrd = ctx.createRadialGradient(enemy.x, enemy.y, 0, enemy.x, enemy.y, baseSize * 0.8);
    poisonGrd.addColorStop(0, '#22cc22');
    poisonGrd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = poisonGrd;
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, baseSize * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.globalAlpha = 1;
};

// ==================== MAP GENERATION ====================
const generateMap = () => {
  const floors = [];
  for (let f = 0; f < 15; f++) {
    let nodeCount;
    if (f === 14) nodeCount = 1;
    else if (f === 0) nodeCount = randInt(3, 4);
    else nodeCount = randInt(2, 4);

    const nodes = [];
    for (let n = 0; n < nodeCount; n++) {
      let type = 'combat';
      if (f === 14) type = 'boss';
      else if (f === 7) type = 'rest';
      else if (f === 4 || f === 9) type = Math.random() < 0.5 ? 'shop' : 'rest';
      else if (f >= 5 && f <= 11 && Math.random() < 0.18 && type === 'combat') type = 'elite';
      else if (f > 0 && f < 14 && Math.random() < 0.2 && type === 'combat') type = 'event';
      nodes.push({ type, connections: [], visited: false });
    }
    floors.push(nodes);
  }

  for (let f = 0; f < 14; f++) {
    const cur = floors[f];
    const nxt = floors[f + 1];
    for (let i = 0; i < cur.length; i++) {
      const minJ = Math.max(0, Math.floor(i * nxt.length / cur.length));
      const maxJ = Math.min(nxt.length - 1, minJ + 1);
      for (let j = minJ; j <= maxJ; j++) {
        if (!cur[i].connections.includes(j)) cur[i].connections.push(j);
      }
    }
    for (let j = 0; j < nxt.length; j++) {
      let hasIn = false;
      for (let i = 0; i < cur.length; i++) {
        if (cur[i].connections.includes(j)) { hasIn = true; break; }
      }
      if (!hasIn) {
        const i = clamp(Math.floor(j * cur.length / nxt.length), 0, cur.length - 1);
        cur[i].connections.push(j);
      }
    }
  }
  return floors;
};

const MAP_MOBILE_SPACING = 85;
const MAP_MOBILE_TOTALW = 700;
const getNodePos = (floorIdx, nodeIdx, nodeCount) => {
  const mob = isTouchDevice;
  const totalW = mob ? MAP_MOBILE_TOTALW : 500;
  const startX = (W - totalW) / 2;
  const topMargin = 100;
  const botMargin = 80;
  const totalFloors = game.map ? game.map.length : 15;
  const usableH = H - topMargin - botMargin;
  const spacing = mob ? MAP_MOBILE_SPACING : usableH / Math.max(totalFloors - 1, 1);
  const baseY = H - botMargin - floorIdx * spacing;
  const y = mob ? baseY + mapScrollY : baseY;
  const x = nodeCount === 1 ? W / 2 : startX + (nodeIdx / (nodeCount - 1)) * totalW;
  return { x, y };
};
const getMapMaxScroll = () => {
  if (!isTouchDevice || !game.map) return 0;
  const totalFloors = game.map.length;
  const topMargin = 100;
  const botMargin = 80;
  const usableH = H - topMargin - botMargin;
  const totalMapH = (totalFloors - 1) * MAP_MOBILE_SPACING;
  return Math.max(0, totalMapH - usableH);
};
const centerMapOnFloor = (floor) => {
  if (!isTouchDevice || !game.map) return;
  const topMargin = 100;
  const botMargin = 80;
  const usableH = H - topMargin - botMargin;
  const targetY = floor * MAP_MOBILE_SPACING - usableH / 2 + MAP_MOBILE_SPACING;
  mapScrollY = clamp(targetY, 0, getMapMaxScroll());
};

const getReachableNodes = () => {
  if (!game.map) return [];
  if (game.floor === -1) {
    return game.map[0].map((_, i) => ({ floor: 0, node: i }));
  }
  if (game.floor >= 14) return [];
  const curNode = game.map[game.floor][game.nodeIdx];
  if (!curNode) return [];
  return curNode.connections.map(j => ({ floor: game.floor + 1, node: j }));
};

const NODE_ICONS = {
  combat: (x, y) => {
    ctx.strokeStyle = '#cc4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - 7, y - 7); ctx.lineTo(x + 7, y + 7);
    ctx.moveTo(x + 7, y - 7); ctx.lineTo(x - 7, y + 7);
    ctx.stroke();
  },
  elite: (x, y) => {
    ctx.fillStyle = '#ffaa22';
    ctx.beginPath();
    ctx.moveTo(x, y - 9); ctx.lineTo(x + 8, y + 7); ctx.lineTo(x - 8, y + 7);
    ctx.closePath(); ctx.fill();
  },
  event: (x, y) => {
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#cccc44';
    ctx.fillText('?', x, y);
  },
  shop: (x, y) => {
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f4d03f';
    ctx.fillText('$', x, y);
  },
  rest: (x, y) => {
    ctx.fillStyle = '#33cc66';
    ctx.beginPath();
    ctx.arc(x, y, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#116633';
    ctx.beginPath();
    ctx.arc(x, y - 2, 4, 0, Math.PI, true);
    ctx.fill();
  },
  boss: (x, y) => {
    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    const points = 5;
    for (let i = 0; i < points * 2; i++) {
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const r = i % 2 === 0 ? 10 : 5;
      if (i === 0) ctx.moveTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
      else ctx.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
    }
    ctx.closePath(); ctx.fill();
  },
};

const renderMap = () => {
  const now = Date.now();
  const t = now * 0.001;
  const skew = -0.07;

  // --- Background ---
  ctx.fillStyle = '#0a0816';
  ctx.fillRect(0, 0, W, H);

  // --- Animated diagonal red lines ---
  ctx.save();
  ctx.globalAlpha = 0.04;
  const lineSpacing = 60;
  const lineOff = (t * 15) % lineSpacing;
  ctx.strokeStyle = '#7733aa';
  ctx.lineWidth = 1;
  for (let li = -H; li < W + H; li += lineSpacing) {
    ctx.beginPath();
    ctx.moveTo(li + lineOff, 0);
    ctx.lineTo(li + lineOff - H * 0.6, H);
    ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;

  // --- Large angular red panel (left decoration) ---
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#7733aa';
  ctx.beginPath();
  ctx.moveTo(-30, 0);
  ctx.lineTo(120, 0);
  ctx.lineTo(80, H);
  ctx.lineTo(-30, H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;

  // --- Large angular red panel (right decoration) ---
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#7733aa';
  ctx.beginPath();
  ctx.moveTo(W + 30, 0);
  ctx.lineTo(W - 90, 0);
  ctx.lineTo(W - 50, H);
  ctx.lineTo(W + 30, H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;

  // --- Title banner (Persona angular) ---
  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);
  const titleW = 380, titleH = 48;
  const titleX = W / 2 - titleW / 2, titleY = 8;

  ctx.fillStyle = '#7733aa';
  ctx.beginPath();
  ctx.moveTo(titleX - 4, titleY - 3);
  ctx.lineTo(titleX + titleW + 4, titleY - 3);
  ctx.lineTo(titleX + titleW + 8, titleY + titleH + 3);
  ctx.lineTo(titleX - 8, titleY + titleH + 3);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#4a3878';
  ctx.beginPath();
  ctx.moveTo(titleX - 2, titleY - 1);
  ctx.lineTo(titleX + titleW + 2, titleY - 1);
  ctx.lineTo(titleX + titleW + 6, titleY + titleH + 1);
  ctx.lineTo(titleX - 6, titleY + titleH + 1);
  ctx.closePath();
  ctx.fill();

  const tGrd = ctx.createLinearGradient(titleX, 0, titleX + titleW, 0);
  tGrd.addColorStop(0, '#7733aa');
  tGrd.addColorStop(0.5, '#5c2488');
  tGrd.addColorStop(1, '#7733aa88');
  ctx.fillStyle = tGrd;
  ctx.beginPath();
  ctx.moveTo(titleX, titleY);
  ctx.lineTo(titleX + titleW, titleY);
  ctx.lineTo(titleX + titleW + 4, titleY + titleH);
  ctx.lineTo(titleX - 4, titleY + titleH);
  ctx.closePath();
  ctx.fill();

  // --- Animated light sweep on title ---
  const sweepX = titleX + ((t * 80) % (titleW + 120)) - 60;
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#e8dcc8';
  ctx.beginPath();
  ctx.moveTo(sweepX, titleY);
  ctx.lineTo(sweepX + 40, titleY);
  ctx.lineTo(sweepX + 30, titleY + titleH);
  ctx.lineTo(sweepX - 10, titleY + titleH);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.font = isTouchDevice ? 'bold italic 34px sans-serif' : 'bold italic 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8dcc8';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 6;
  ctx.fillText(`ATO ${game.act} — MAPA`, titleX + titleW / 2, titleY + titleH / 2);
  ctx.shadowBlur = 0;
  ctx.restore();

  // --- Stats bar (angular, below title) ---
  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);
  const statsW = isTouchDevice ? 560 : 460, statsH = isTouchDevice ? 36 : 28;
  const statsX = W / 2 - statsW / 2, statsY = titleY + titleH + 8;

  ctx.fillStyle = '#0c0a1ecc';
  ctx.beginPath();
  ctx.moveTo(statsX, statsY);
  ctx.lineTo(statsX + statsW, statsY);
  ctx.lineTo(statsX + statsW + 3, statsY + statsH);
  ctx.lineTo(statsX - 3, statsY + statsH);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#7733aa66';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.font = isTouchDevice ? 'bold italic 18px sans-serif' : 'bold italic 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const smid = statsY + statsH / 2;

  // HP
  ctx.fillStyle = '#44cccc';
  ctx.fillText(`HP`, statsX + 50, smid);
  const hpPct = game.hp / game.maxHp;
  const hpBarX = statsX + 75, hpBarW = isTouchDevice ? 130 : 100, hpBarH = isTouchDevice ? 16 : 12;
  ctx.fillStyle = '#12101e';
  ctx.fillRect(hpBarX, smid - hpBarH / 2, hpBarW, hpBarH);
  const hpGrd = ctx.createLinearGradient(hpBarX, 0, hpBarX + hpBarW * hpPct, 0);
  hpGrd.addColorStop(0, '#22ccaa');
  hpGrd.addColorStop(1, '#44eedd');
  ctx.fillStyle = hpGrd;
  ctx.fillRect(hpBarX, smid - hpBarH / 2, hpBarW * hpPct, hpBarH);
  ctx.fillStyle = '#e8dcc8';
  ctx.font = isTouchDevice ? 'bold 14px sans-serif' : 'bold 11px sans-serif';
  ctx.fillText(`${game.hp}/${game.maxHp}`, hpBarX + hpBarW / 2, smid);

  // Gold
  ctx.font = isTouchDevice ? 'bold italic 18px sans-serif' : 'bold italic 14px sans-serif';
  ctx.fillStyle = '#f4d03f';
  ctx.shadowColor = '#c8a040';
  ctx.shadowBlur = 6;
  ctx.fillText(`OURO: ${game.gold}`, statsX + statsW / 2, smid);
  ctx.shadowBlur = 0;

  // Deck
  ctx.fillStyle = '#9988cc';
  ctx.fillText(`DECK: ${game.deck.length}`, statsX + statsW - 60, smid);

  ctx.restore();

  // --- Clip map area (for scrollable mobile) ---
  if (isTouchDevice) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 90, W, H - 90 - 50);
    ctx.clip();
  }

  // --- Map connections ---
  const reachable = getReachableNodes();
  const reachSet = new Set(reachable.map(r => `${r.floor}-${r.node}`));

  const nodeGlowColors = {
    combat: '#aa3344', elite: '#8833bb', shop: '#d4a645',
    event: '#3399aa', rest: '#28aa55', boss: '#aa2233',
  };

  for (let f = 0; f < game.map.length - 1; f++) {
    const curFloor = game.map[f];
    for (let i = 0; i < curFloor.length; i++) {
      const from = getNodePos(f, i, curFloor.length);
      const nxtFloor = game.map[f + 1];
      for (const j of curFloor[i].connections) {
        const to = getNodePos(f + 1, j, nxtFloor.length);
        const visited = curFloor[i].visited && game.map[f + 1][j].visited;
        const isReachConn = reachSet.has(`${f + 1}-${j}`) && (game.floor === f && game.nodeIdx === i || game.floor === -1 && f === 0);

        if (isReachConn) {
          const pulse = 0.6 + Math.sin(now * 0.004 + f) * 0.4;
          ctx.save();
          ctx.shadowColor = '#7733aa';
          ctx.shadowBlur = 8;
          ctx.strokeStyle = `rgba(119,51,170,${pulse})`;
          ctx.lineWidth = isTouchDevice ? 4 : 2.5;
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(to.x, to.y);
          ctx.stroke();
          ctx.restore();

          ctx.strokeStyle = `rgba(200,180,255,${pulse * 0.4})`;
          ctx.lineWidth = isTouchDevice ? 2 : 1;
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(to.x, to.y);
          ctx.stroke();
        } else {
          ctx.strokeStyle = visited ? '#2a2840' : '#1e1c34';
          ctx.lineWidth = isTouchDevice ? 2.5 : 1.5;
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(to.x, to.y);
          ctx.stroke();
        }
      }
    }
  }

  // --- Map nodes ---
  for (let f = 0; f < game.map.length; f++) {
    const floorNodes = game.map[f];
    for (let i = 0; i < floorNodes.length; i++) {
      const node = floorNodes[i];
      const pos = getNodePos(f, i, floorNodes.length);
      const isReachable = reachSet.has(`${f}-${i}`);
      const isCurrent = f === game.floor && i === game.nodeIdx;
      const glowCol = nodeGlowColors[node.type] || '#4a4050';

      ctx.save();

      if (isReachable) {
        const nodePulse = 1 + Math.sin(now * 0.005 + f * 0.5) * 0.08;
        ctx.translate(pos.x, pos.y);
        ctx.scale(nodePulse, nodePulse);
        ctx.translate(-pos.x, -pos.y);
      }

      const ns = isTouchDevice ? 28 : 17;
      const drawNodeShape = (x, y, s) => {
        ctx.beginPath();
        ctx.moveTo(x, y - s);
        ctx.lineTo(x + s * 0.87, y - s * 0.5);
        ctx.lineTo(x + s * 0.87, y + s * 0.5);
        ctx.lineTo(x, y + s);
        ctx.lineTo(x - s * 0.87, y + s * 0.5);
        ctx.lineTo(x - s * 0.87, y - s * 0.5);
        ctx.closePath();
      };

      if (isReachable || isCurrent) {
        ctx.save();
        ctx.shadowColor = glowCol;
        ctx.shadowBlur = isReachable ? 16 : 10;
        drawNodeShape(pos.x, pos.y, ns + 3);
        ctx.fillStyle = glowCol;
        ctx.globalAlpha = 0.3;
        ctx.fill();
        ctx.restore();
      }

      // Red border
      drawNodeShape(pos.x, pos.y, ns + 2);
      ctx.fillStyle = isReachable ? '#7733aa' : isCurrent ? '#c8a040' : '#2a2a3e';
      ctx.fill();

      // Ornate border
      drawNodeShape(pos.x, pos.y, ns + 0.5);
      ctx.fillStyle = isReachable ? '#5a4880' : isCurrent ? '#d4a645' : '#1a1830';
      ctx.fill();

      // Inner fill
      drawNodeShape(pos.x, pos.y, ns - 1);
      ctx.fillStyle = isReachable ? '#12101e' : isCurrent ? '#1a1428' : node.visited ? '#0e0c1a' : '#0a0818';
      ctx.fill();

      const iconFn = NODE_ICONS[node.type];
      if (iconFn) {
        ctx.globalAlpha = node.visited && !isCurrent && !isReachable ? 0.3 : 1;
        if (isTouchDevice) {
          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.scale(1.5, 1.5);
          ctx.translate(-pos.x, -pos.y);
        }
        iconFn(pos.x, pos.y);
        if (isTouchDevice) ctx.restore();
        ctx.globalAlpha = 1;
      }

      ctx.restore();
    }
  }

  if (isTouchDevice) {
    ctx.restore();
  }

  // --- Scroll indicators (mobile) ---
  if (isTouchDevice) {
    const maxSc = getMapMaxScroll();
    if (maxSc > 0) {
      if (mapScrollY > 0) {
        ctx.save();
        ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
        ctx.fillStyle = '#7733aa';
        ctx.beginPath();
        ctx.moveTo(W / 2 - 12, 96);
        ctx.lineTo(W / 2 + 12, 96);
        ctx.lineTo(W / 2, 86);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      if (mapScrollY < maxSc) {
        ctx.save();
        ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
        ctx.fillStyle = '#7733aa';
        const arrY = H - 56;
        ctx.beginPath();
        ctx.moveTo(W / 2 - 12, arrY);
        ctx.lineTo(W / 2 + 12, arrY);
        ctx.lineTo(W / 2, arrY + 10);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }
  }

  // --- Relics bar (angular footer) ---
  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);

  const footH = 50;
  const footY = H - footH;
  ctx.fillStyle = '#0a0816ee';
  ctx.beginPath();
  ctx.moveTo(-10, footY);
  ctx.lineTo(W + 10, footY);
  ctx.lineTo(W + 10, H + 5);
  ctx.lineTo(-10, H + 5);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#7733aa66';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, footY);
  ctx.lineTo(W + 10, footY);
  ctx.stroke();

  ctx.font = isTouchDevice ? 'bold italic 16px sans-serif' : 'bold italic 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#7733aa';
  ctx.fillText('RELÍQUIAS', 20, footY + footH / 2);

  let relicX = 120;
  const relicPositions = [];
  for (const rId of game.relics) {
    const rel = RELICS.find(r => r.id === rId);
    if (rel) {
      const ry = footY + footH / 2;
      ctx.save();
      ctx.shadowColor = rel.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = rel.color;
      ctx.beginPath();
      ctx.arc(relicX, ry, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = '#0a0816';
      ctx.beginPath();
      ctx.arc(relicX, ry, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = rel.color;
      ctx.beginPath();
      ctx.arc(relicX, ry, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e8dcc888';
      ctx.fillText(rel.n.slice(0, 4).toUpperCase(), relicX, ry + 16);
      relicPositions.push({ x: relicX, y: ry, rel });
      relicX += 40;
    }
  }

  ctx.font = 'bold italic 13px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#7733aa';
  ctx.fillText(`ATO ${game.act}`, W - 20, footY + footH / 2);

  ctx.restore();

  // Relic tooltip (drawn OUTSIDE the skew transform)
  for (const rp of relicPositions) {
    const dx = mouse.x - rp.x;
    const dy = mouse.y - rp.y;
    if (dx * dx + dy * dy < 20 * 20) {
      ctx.save();
      ctx.font = '12px sans-serif';
      const tipText = `${rp.rel.n}: ${rp.rel.d}`;
      const tipW = ctx.measureText(tipText).width + 16;
      const tipH = 26;
      let tipX = rp.x - tipW / 2;
      let tipY = rp.y - tipH - 16;
      if (tipX < 5) tipX = 5;
      if (tipX + tipW > W - 5) tipX = W - tipW - 5;

      ctx.fillStyle = '#0c0a1eee';
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX + tipW, tipY);
      ctx.lineTo(tipX + tipW + 2, tipY + tipH);
      ctx.lineTo(tipX - 2, tipY + tipH);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = rp.rel.color + '88';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = rp.rel.color;
      ctx.font = 'bold 12px sans-serif';
      ctx.fillText(rp.rel.n, tipX + 8, tipY + tipH / 2);
      const nameW = ctx.measureText(rp.rel.n).width;
      ctx.fillStyle = '#c0b8a8';
      ctx.font = '11px sans-serif';
      ctx.fillText(': ' + rp.rel.d, tipX + 8 + nameW, tipY + tipH / 2);
      ctx.restore();
      break;
    }
  }

  drawVignette();
};

// ==================== COMBAT INITIALIZATION ====================
const startCombat = (encounterType) => {
  const act = game.act;
  const encounters = ENCOUNTERS[act][encounterType];
  const chosen = encounters[randInt(0, encounters.length - 1)];

  combat.enemies = [];
  const mob = isTouchDevice;
  const enemySpan = Math.min(W * 0.65, mob ? 850 : 700);
  const spacing = Math.min(mob ? 260 : 200, enemySpan / chosen.length);
  const startX = W / 2 - (chosen.length - 1) * spacing / 2;
  for (let i = 0; i < chosen.length; i++) {
    const e = makeEnemy(chosen[i]);
    e.x = startX + i * spacing;
    e.y = mob ? 180 : 200;
    combat.enemies.push(e);
  }

  combat.hand = [];
  combat.drawPile = game.deck.map(c => ({ ...c }));
  shuffle(combat.drawPile);
  combat.discardPile = [];
  combat.exhaustPile = [];
  combat.energy = combat.maxEnergy;
  combat.turn = 0;
  combat.playerBlock = 0;
  combat.playerStrength = 0;
  combat.playerDexterity = 0;
  combat.playerVulnerable = 0;
  combat.playerWeak = 0;
  combat.playerPoison = 0;
  combat.playerThorns = 0;
  combat.selectedCardIdx = -1;
  combat.targeting = false;
  combat.hoveredCardIdx = -1;
  combat.hoveredEnemyIdx = -1;
  combat.animating = false;
  combat.animTimer = 0;
  combat.enemyTurnIdx = -1;
  combat.playerTurn = true;
  combat.turnPhase = 'player';
  combat.powers = { metallicize: 0, demonForm: 0, barricade: false, feelNoPain: 0, brutality: 0 };
  combat.penNibCount = 0;
  combat.rampageBonuses = {};

  if (game.relics.includes('vajra')) combat.playerStrength += 1;
  if (game.relics.includes('anchor')) combat.playerBlock = 10;
  if (game.relics.includes('threadNeedle')) combat.playerDexterity += 4;

  if (!meta.enemiesSeen) meta.enemiesSeen = [];
  for (const e of combat.enemies) {
    if (!meta.enemiesSeen.includes(e.key)) meta.enemiesSeen.push(e.key);
  }
  saveMeta();

  // Switch to boss music if fighting a boss
  if (encounterType === 'boss') {
    const bossTrack = BGM_TRACKS[`boss${game.act}`] || BGM_TRACKS.boss1;
    switchBGM(bossTrack);
    const bossKey = combat.enemies[0] ? combat.enemies[0].key : null;
    if (bossKey && BOSS_INTRO[bossKey]) {
      bossIntro = { key: bossKey, timer: 4.5, phase: 0 };
    }
  }

  spawnAmbientParticles(game.act);
  startPlayerTurn();
};

const advanceTutorialStep = () => {
  tutorial.step++;
  tutorial.waitingConfirm = false;
  if (tutorial.step >= TUTORIAL_STEPS.length) {
    combat.enemies[0].hp = 0;
    combat.enemies[0].dead = true;
    combat.enemies[0].deathTimer = 1;
    finishTutorial();
  }
};

const handleTutorialClick = () => {
  if (!tutorial.active || tutorial.finished) return;
  if (combat.animating) return;

  const step = TUTORIAL_STEPS[tutorial.step];
  if (!step) return;

  switch (step.target) {
    case 'card_attack': {
      const cidx = getHoveredCardIdx();
      if (cidx >= 0) {
        const data = getCardData(combat.hand[cidx]);
        if (data.n.startsWith('Golpe')) {
          combat.selectedCardIdx = cidx;
          combat.targeting = true;
          layoutHand();
          const card = combat.hand[cidx];
          card.targetY -= isTouchDevice ? 90 : 65;
          card.targetScale = isTouchDevice ? 1.5 : 1.05;
          card.hover = true;
          advanceTutorialStep();
        }
      }
      break;
    }
    case 'enemy': {
      const eidx = getHoveredEnemyIdx();
      if (eidx >= 0 && combat.selectedCardIdx >= 0) {
        playCard(combat.selectedCardIdx, eidx);
        advanceTutorialStep();
      }
      break;
    }
    case 'card_defend': {
      const cidx = getHoveredCardIdx();
      if (cidx >= 0) {
        const data = getCardData(combat.hand[cidx]);
        if (data.n.startsWith('Defesa')) {
          combat.selectedCardIdx = cidx;
          combat.targeting = false;
          layoutHand();
          const card = combat.hand[cidx];
          card.targetY -= isTouchDevice ? 90 : 65;
          card.targetScale = isTouchDevice ? 1.5 : 1.05;
          card.hover = true;
          advanceTutorialStep();
        }
      }
      break;
    }
    case 'card_defend_confirm': {
      const cidx = getHoveredCardIdx();
      if (cidx >= 0 && combat.selectedCardIdx === cidx) {
        playCard(cidx, -1);
        advanceTutorialStep();
      } else if (combat.selectedCardIdx >= 0) {
        playCard(combat.selectedCardIdx, -1);
        advanceTutorialStep();
      }
      break;
    }
    case 'end_turn': {
      const mob = isTouchDevice;
      const endBtnW = mob ? 160 : 120, endBtnH = mob ? 54 : 40;
      const endBtnX = W - endBtnW - 20, endBtnY = mob ? 340 : 420;
      const endPad = mob ? 8 : 0;
      if (isInRect(mouse.x, mouse.y, endBtnX - endPad, endBtnY - endPad, endBtnW + endPad * 2, endBtnH + endPad * 2)) {
        endPlayerTurn();
        advanceTutorialStep();
      }
      break;
    }
    case 'info': {
      if (tutorial._infoBtnRect) {
        const r = tutorial._infoBtnRect;
        if (isInRect(mouse.x, mouse.y, r.x, r.y, r.w, r.h)) {
          advanceTutorialStep();
          if (tutorial.step < TUTORIAL_STEPS.length) {
            combat.hand = [];
            combat.drawPile = [makeCard(0), makeCard(1)];
            shuffle(combat.drawPile);
            combat.energy = 3;
            combat.maxEnergy = 3;
            combat.playerBlock = 0;
            drawCards(2);
          }
        }
      }
      break;
    }
    case 'potion': {
      const mob = isTouchDevice;
      const potSlotW = mob ? 56 : 42, potSlotH = mob ? 56 : 42, potGap = mob ? 8 : 6;
      const potSlotX = mob ? 340 : 290, potSlotY = mob ? 345 : 420;
      for (let pi = 0; pi < game.potions.length; pi++) {
        const ppx = potSlotX + pi * (potSlotW + potGap);
        if (isInRect(mouse.x, mouse.y, ppx, potSlotY, potSlotW, potSlotH)) {
          usePotion(pi);
          advanceTutorialStep();
          break;
        }
      }
      break;
    }
  }
};

const finishTutorial = () => {
  tutorial.active = false;
  tutorial.finished = true;
  tutorial.step = 0;
  meta.tutorialDone = true;
  saveMeta();

  game.potions = tutorial._savedPotions || [];
  game.hp = tutorial._savedHp || game.maxHp;

  addFloatingText(W / 2, H / 2 - 60, 'Tutorial Completo!', PAL.gold, 28);
  addFloatingText(W / 2, H / 2, 'Você está pronto para a aventura!', PAL.ivory, 18);

  setTimeout(() => {
    fadeToState('map');
  }, 2200);
};

const drawCards = (count) => {
  for (let i = 0; i < count; i++) {
    if (combat.drawPile.length === 0) {
      if (combat.discardPile.length === 0) break;
      combat.drawPile = [...combat.discardPile];
      combat.discardPile = [];
      shuffle(combat.drawPile);
    }
    const card = combat.drawPile.pop();
    card.x = 50;
    card.y = H - 50;
    card.targetX = 0;
    card.targetY = 0;
    card.scale = 0.3;
    card.targetScale = 0.75;
    card.hover = false;
    combat.hand.push(card);
    sfxDraw();
  }
  layoutHand();
};

const startPlayerTurn = () => {
  combat.turn++;
  combat.playerTurn = true;
  combat.turnPhase = 'player';
  combat.energy = combat.maxEnergy;
  combat.selectedCardIdx = -1;
  combat.targeting = false;

  if (!combat.powers.barricade) {
    combat.playerBlock = 0;
  }

  if (combat.powers.demonForm > 0) {
    combat.playerStrength += combat.powers.demonForm;
    addFloatingText(150, 430, `+${combat.powers.demonForm} Força`, '#cc3333');
    sfxBuff();
  }

  if (combat.powers.brutality > 0) {
    game.hp -= 1;
    addFloatingText(150, 460, '-1 HP', '#cc3333');
  }

  if (combat.powers.shadowCloak > 0) {
    combat.playerStealth += combat.powers.shadowCloak;
    addFloatingText(150, 460, `+${combat.powers.shadowCloak} Furtividade`, '#9933cc');
  }
  if (combat.powers.transcend > 0) {
    drawCards(combat.powers.transcend);
  }
  if (combat.powers.lethalPoison > 0) {
    for (const e of combat.enemies) {
      if (!e.dead && e.poison > 0) {
        e.poison += combat.powers.lethalPoison;
        addFloatingText(e.x, e.y - 30, `+${combat.powers.lethalPoison} Veneno`, '#33cc33', 12);
      }
    }
  }

  if (game.relics.includes('lantern') && combat.turn === 1) {
    combat.energy += 1;
  }
  if (game.relics.includes('hornCleat') && combat.turn === 2) {
    combat.playerBlock += 14;
    addFloatingText(150, 430, '+14 Bloqueio', '#3498db');
    sfxBlock();
  }

  let drawCount = 5;
  if (game.relics.includes('bagOfPrep') && combat.turn === 1) drawCount += 2;
  if (combat.powers.brutality > 0) drawCount += combat.powers.brutality;

  drawCards(drawCount);
};

// ==================== HAND LAYOUT ====================
const layoutHand = () => {
  const cards = combat.hand;
  const count = cards.length;
  if (count === 0) return;
  const mob = isTouchDevice;
  const cardSpacing = mob ? 155 : 95;
  const cardScale = mob ? 1.3 : 0.75;
  const totalWidth = Math.min(count * cardSpacing, W * 0.88);
  const halfCard = cardSpacing / 2;
  const startX = (W - totalWidth) / 2 + halfCard;
  const baseY = mob ? H - 130 : H - 85;

  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0.5 : i / (count - 1);
    cards[i].targetX = count === 1 ? W / 2 : startX + t * (totalWidth - cardSpacing);
    cards[i].targetY = baseY + Math.abs(t - 0.5) * 20;
    cards[i].targetScale = cardScale;
    cards[i].hover = false;
  }
};

const getHoveredCardIdx = () => {
  for (let i = combat.hand.length - 1; i >= 0; i--) {
    const card = combat.hand[i];
    const w = CARD_W * card.scale / 2;
    const h = CARD_H * card.scale / 2;
    if (mouse.x >= card.x - w && mouse.x <= card.x + w &&
        mouse.y >= card.y - h && mouse.y <= card.y + h) {
      return i;
    }
  }
  return -1;
};

const getHoveredEnemyIdx = () => {
  for (let i = 0; i < combat.enemies.length; i++) {
    const e = combat.enemies[i];
    if (e.dead) continue;
    const dx = mouse.x - e.x;
    const dy = mouse.y - e.y;
    const hitR = isTouchDevice ? 100 : 50;
    if (dx * dx + dy * dy < hitR * hitR) return i;
  }
  return -1;
};

// ==================== COMBAT LOGIC ====================
const calcDamage = (baseDmg, strength, weak, targetVuln, penNibDouble, demonSkull) => {
  let dmg = baseDmg + strength;
  if (weak) dmg = Math.floor(dmg * 0.75);
  if (targetVuln) dmg = Math.floor(dmg * 1.5);
  if (penNibDouble) dmg *= 2;
  if (demonSkull) dmg = Math.floor(dmg * 1.5);
  return Math.max(0, dmg);
};

const calcBlock = (baseBlk, dex) => {
  return Math.max(0, baseBlk + dex);
};

const dealDamageToEnemy = (enemy, amount) => {
  let dmg = amount;
  if (enemy.block > 0) {
    if (enemy.block >= dmg) {
      enemy.block -= dmg;
      dmg = 0;
    } else {
      dmg -= enemy.block;
      enemy.block = 0;
    }
  }
  enemy.hp -= dmg;
  if (dmg > 0) {
    enemy.shake = 0.3;
    spawnParticles(enemy.x, enemy.y, '#cc3333', 6, 30);
    addFloatingText(enemy.x, enemy.y - 40, `-${dmg}`, '#ff4444', 22);
    sfxHit();
    game.stats.damageDealt += dmg;
    if (dmg > (meta.maxSingleHit || 0)) { meta.maxSingleHit = dmg; }
  } else if (amount > 0) {
    spawnParticles(enemy.x, enemy.y, '#3498db', 4, 20);
    addFloatingText(enemy.x, enemy.y - 40, 'Bloqueado', '#3498db', 14);
    sfxBlock();
  }
  if (enemy.hp <= 0) {
    enemy.hp = 0;
    enemy.dead = true;
    enemy.deathTimer = 0.5;
    game.stats.enemiesKilled++;
    sfxDeath();
    spawnParticles(enemy.x, enemy.y, '#882222', 15, 50);
    for (let di = 0; di < 20; di++) {
      addParticle(enemy.x + rand(-25, 25), enemy.y + rand(-25, 25),
        Math.random() < 0.5 ? '#cc4444' : '#ff8844',
        rand(-35, 35), rand(-80, -20), rand(0.5, 1.2), rand(2, 6));
    }
  }
  return dmg;
};

const dealDamageToPlayer = (amount) => {
  let dmg = amount;
  if (combat.playerBlock > 0) {
    if (combat.playerBlock >= dmg) {
      combat.playerBlock -= dmg;
      dmg = 0;
    } else {
      dmg -= combat.playerBlock;
      combat.playerBlock = 0;
    }
  }
  if (dmg > 0) {
    game.hp -= dmg;
    addFloatingText(150, 420, `-${dmg}`, '#ff4444', 22);
    sfxHit();
    spawnParticles(150, 450, '#cc3333', 5, 30);
    triggerShake(Math.min(dmg * 0.5, 8));
    triggerDamageFlash();
  } else if (amount > 0) {
    addFloatingText(150, 420, 'Bloqueado', '#3498db', 14);
    sfxBlock();
    spawnParticles(150, 460, '#3498db', 6, 25);
  }
  if (game.hp <= 0) {
    game.hp = 0;
  }
};

const gainBlock = (amount) => {
  combat.playerBlock += amount;
  addFloatingText(150, 440, `+${amount} Bloqueio`, '#3498db', 16);
  sfxBlock();
  spawnParticles(150, 460, '#3498db', 4, 20);
};

const canPlayCard = (cardIdx) => {
  if (!combat.playerTurn || combat.animating) return false;
  const card = combat.hand[cardIdx];
  const data = getCardData(card);
  if (data.unplayable) return false;
  if (data.c > combat.energy) return false;
  return true;
};

const playCard = (cardIdx, targetEnemyIdx) => {
  if (!canPlayCard(cardIdx)) return;
  const card = combat.hand[cardIdx];
  const data = getCardData(card);

  combat.energy -= data.c;
  combat.hand.splice(cardIdx, 1);
  game.stats.cardsPlayed++;
  sfxCard();

  const isAttack = data.t === 'attack';
  const hasPenNib = game.relics.includes('penNib');
  const hasDemonSkull = game.relics.includes('demonSkull') && game.hp < game.maxHp * 0.5;
  let penNibActive = false;

  if (isAttack && hasPenNib) {
    combat.penNibCount++;
    if (combat.penNibCount >= 10) {
      combat.penNibCount = 0;
      penNibActive = true;
      addFloatingText(W / 2, H / 2, 'Pena Afiada!', '#f4d03f', 24);
    }
  }

  const vulnBonus = game.relics.includes('oddMushroom') ? 1 : 0;

  if (data.blk) {
    const blkVal = calcBlock(data.blk, combat.playerDexterity);
    gainBlock(blkVal);
  }

  if (data.selfDmg) {
    game.hp -= data.selfDmg;
    addFloatingText(150, 430, `-${data.selfDmg} HP`, '#cc3333', 16);
  }

  if (data.gainEnergy) {
    combat.energy += data.gainEnergy;
    addFloatingText(60, 520, `+${data.gainEnergy} Energia`, '#f39c12', 16);
    spawnParticles(60, 530, '#f39c12', 4, 20);
  }

  if (data.gainStr) {
    combat.playerStrength += data.gainStr;
    addFloatingText(150, 410, `+${data.gainStr} Força`, '#cc3333', 16);
    sfxBuff();
  }

  if (data.special === 'heavyBlade' && isAttack) {
    const str = combat.playerStrength;
    const totalDmg = data.dmg + str * 3;
    const weak = combat.playerWeak > 0;
    const enemies = targetEnemyIdx >= 0 ? [combat.enemies[targetEnemyIdx]] : [];
    for (const e of enemies) {
      if (e.dead) continue;
      const vuln = e.vulnerable > 0;
      const finalDmg = calcDamage(totalDmg, 0, weak, vuln, penNibActive, hasDemonSkull);
      dealDamageToEnemy(e, finalDmg);
    }
  } else if (data.special === 'rampage') {
    if (!combat.rampageBonuses[card.uid]) combat.rampageBonuses[card.uid] = 0;
    const bonus = combat.rampageBonuses[card.uid];
    const enemies = targetEnemyIdx >= 0 ? [combat.enemies[targetEnemyIdx]] : [];
    for (const e of enemies) {
      if (e.dead) continue;
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      const finalDmg = calcDamage(data.dmg + bonus, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
      dealDamageToEnemy(e, finalDmg);
    }
    combat.rampageBonuses[card.uid] = bonus + 5;
  } else if (data.special === 'reaper') {
    const alive = combat.enemies.filter(e => !e.dead);
    let totalHeal = 0;
    for (const e of alive) {
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      const finalDmg = calcDamage(data.dmg, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
      const dealt = dealDamageToEnemy(e, finalDmg);
      totalHeal += dealt;
    }
    if (totalHeal > 0) {
      game.hp = Math.min(game.maxHp, game.hp + totalHeal);
      addFloatingText(150, 400, `+${totalHeal} HP`, '#33cc33', 18);
      sfxHeal();
      spawnParticles(150, 430, '#33cc33', 5, 20);
    }
  } else if (data.special === 'fiendFire') {
    const cardsInHand = combat.hand.length;
    const enemies = targetEnemyIdx >= 0 ? [combat.enemies[targetEnemyIdx]] : [];
    for (const handCard of combat.hand) {
      combat.exhaustPile.push(handCard);
    }
    combat.hand = [];
    for (const e of enemies) {
      if (e.dead) continue;
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      for (let h = 0; h < cardsInHand; h++) {
        const finalDmg = calcDamage(data.dmg, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
        dealDamageToEnemy(e, finalDmg);
      }
    }
  } else if (data.dmg && data.tgt === 'all') {
    const alive = combat.enemies.filter(e => !e.dead);
    const hits = data.hits || 1;
    for (const e of alive) {
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      for (let h = 0; h < hits; h++) {
        const finalDmg = calcDamage(data.dmg, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
        dealDamageToEnemy(e, finalDmg);
      }
    }
  } else if (data.dmg && targetEnemyIdx >= 0) {
    const e = combat.enemies[targetEnemyIdx];
    if (e && !e.dead) {
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      const hits = data.hits || 1;
      for (let h = 0; h < hits; h++) {
        const finalDmg = calcDamage(data.dmg, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
        dealDamageToEnemy(e, finalDmg);
      }
    }
  }

  if (data.vuln) {
    const targets = data.tgt === 'all' ? combat.enemies.filter(e => !e.dead) : (targetEnemyIdx >= 0 ? [combat.enemies[targetEnemyIdx]] : []);
    for (const e of targets) {
      if (e && !e.dead) e.vulnerable += data.vuln + vulnBonus;
    }
  }
  if (data.weak) {
    const targets = data.tgt === 'all' ? combat.enemies.filter(e => !e.dead) : (targetEnemyIdx >= 0 ? [combat.enemies[targetEnemyIdx]] : []);
    for (const e of targets) {
      if (e && !e.dead) e.weak += data.weak;
    }
  }
  if (data.poison) {
    const targets = data.tgt === 'all' ? combat.enemies.filter(e => !e.dead) : (targetEnemyIdx >= 0 ? [combat.enemies[targetEnemyIdx]] : []);
    for (const e of targets) {
      if (e && !e.dead) {
        e.poison += data.poison;
        addFloatingText(e.x, e.y - 30, `+${data.poison} Veneno`, '#33cc33', 16);
        spawnParticles(e.x, e.y, '#33cc33', 5, 25);
      }
    }
  }
  if (data.healSelf) {
    game.hp = Math.min(game.maxHp, game.hp + data.healSelf);
    addFloatingText(150, 400, `+${data.healSelf} HP`, '#33cc33', 16);
  }

  if (data.draw) {
    drawCards(data.draw);
  }

  if (data.special === 'anger') {
    combat.discardPile.push(makeCard(card.id, card.upgraded));
  }
  if (data.special === 'wildStrike') {
    combat.drawPile.push(makeCard(33));
    shuffle(combat.drawPile);
  }
  if (data.special === 'trueGrit') {
    if (combat.hand.length > 0) {
      const ri = randInt(0, combat.hand.length - 1);
      const removed = combat.hand.splice(ri, 1)[0];
      combat.exhaustPile.push(removed);
      if (combat.powers.feelNoPain > 0) gainBlock(combat.powers.feelNoPain * 3);
    }
  }
  if (data.special === 'flameBarrier') {
    combat.playerThorns += 4;
    addFloatingText(150, 400, '+4 Espinhos', '#cc6633', 16);
  }
  if (data.special === 'metallicize') {
    combat.powers.metallicize += 3;
    addFloatingText(150, 400, 'Metalizar!', '#aaaacc', 16);
    sfxBuff();
  }
  if (data.special === 'demonForm') {
    combat.powers.demonForm += 2;
    addFloatingText(150, 400, 'Forma Demoníaca!', '#cc3333', 16);
    sfxBuff();
  }
  if (data.special === 'barricade') {
    combat.powers.barricade = true;
    addFloatingText(150, 400, 'Barricada!', '#3498db', 16);
    sfxBuff();
  }
  if (data.special === 'feelNoPain') {
    combat.powers.feelNoPain += 1;
    addFloatingText(150, 400, 'Sem Dor!', '#aaaacc', 16);
    sfxBuff();
  }
  if (data.special === 'brutality') {
    combat.powers.brutality += 1;
    addFloatingText(150, 400, 'Brutalidade!', '#cc3333', 16);
    sfxBuff();
  }
  if (data.special === 'stealth') {
    combat.playerStealth += 1;
    addFloatingText(150, 400, '+1 Furtividade', '#9933cc', 16);
    sfxBuff();
  }
  if (data.special === 'stealthStrike' && targetEnemyIdx >= 0) {
    const e = combat.enemies[targetEnemyIdx];
    if (e && !e.dead) {
      let bonus = combat.playerStealth > 0 ? 2 : 0;
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      const finalDmg = calcDamage(data.dmg + bonus, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
      dealDamageToEnemy(e, finalDmg);
      if (combat.playerStealth > 0) {
        combat.playerStealth--;
        addFloatingText(e.x, e.y - 60, 'Furtivo!', '#9933cc', 14);
      }
    }
  }
  if (data.special === 'ambush' && targetEnemyIdx >= 0) {
    const e = combat.enemies[targetEnemyIdx];
    if (e && !e.dead) {
      const multiplier = combat.playerStealth > 0 ? 2 : 1;
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      const finalDmg = calcDamage(data.dmg * multiplier, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
      dealDamageToEnemy(e, finalDmg);
      if (combat.playerStealth > 0) {
        combat.playerStealth = 0;
        addFloatingText(e.x, e.y - 60, 'Emboscada!', '#9933cc', 18);
      }
    }
  }
  if (data.special === 'deathShadow' && targetEnemyIdx >= 0) {
    const e = combat.enemies[targetEnemyIdx];
    if (e && !e.dead) {
      const poisonDmg = e.poison * 6;
      const vuln = e.vulnerable > 0;
      const weak = combat.playerWeak > 0;
      const finalDmg = calcDamage(poisonDmg, combat.playerStrength, weak, vuln, penNibActive, hasDemonSkull);
      dealDamageToEnemy(e, finalDmg);
    }
  }
  if (data.special === 'shadowCloak') {
    combat.powers.shadowCloak = (combat.powers.shadowCloak || 0) + 2;
    addFloatingText(150, 400, 'Manto das Sombras!', '#9933cc', 16);
    sfxBuff();
  }
  if (data.special === 'lethalPoison') {
    combat.powers.lethalPoison = (combat.powers.lethalPoison || 0) + 2;
    addFloatingText(150, 400, 'Veneno Letal!', '#33cc33', 16);
    sfxBuff();
  }
  if (data.special === 'transcend') {
    combat.powers.transcend = (combat.powers.transcend || 0) + 2;
    addFloatingText(150, 400, 'Transcendência!', '#3366cc', 16);
    sfxBuff();
  }

  if (data.exhaust || data.special === 'fiendFire') {
    combat.exhaustPile.push(card);
    if (combat.powers.feelNoPain > 0) gainBlock(combat.powers.feelNoPain * 3);
  } else {
    combat.discardPile.push(card);
  }

  if (data.special === 'enrage' || false) {}

  combat.selectedCardIdx = -1;
  combat.targeting = false;
  layoutHand();

  checkCombatEnd();
};

const endPlayerTurn = () => {
  if (!combat.playerTurn || combat.animating) return;
  sfxClick();
  combat.selectedCardIdx = -1;
  combat.targeting = false;

  for (let i = combat.hand.length - 1; i >= 0; i--) {
    const card = combat.hand[i];
    const data = getCardData(card);
    if (data.ethereal) {
      combat.exhaustPile.push(card);
      if (combat.powers.feelNoPain > 0) gainBlock(combat.powers.feelNoPain * 3);
    } else if (data.special === 'burn') {
      dealDamageToPlayer(2);
      combat.discardPile.push(card);
    } else {
      combat.discardPile.push(card);
    }
  }
  combat.hand = [];

  if (combat.powers.metallicize > 0) {
    gainBlock(combat.powers.metallicize);
  }

  combat.playerTurn = false;
  combat.turnPhase = 'enemyTurn';
  combat.enemyTurnIdx = 0;
  combat.animTimer = 0.4;
  combat.animating = true;
};

const processEnemyAction = (enemy) => {
  if (enemy.dead) return;
  const intent = enemy.intent;

  if (intent.intent === 'attack' || intent.intent === 'multi') {
    const hits = intent.hits || 1;
    let dmg = intent.dmg + enemy.strength;
    if (enemy.weak > 0) dmg = Math.floor(dmg * 0.75);
    if (combat.playerVulnerable > 0) dmg = Math.floor(dmg * 1.5);

    triggerEnemyLunge(enemy, 150, 450);

    for (let h = 0; h < hits; h++) {
      dealDamageToPlayer(Math.max(0, dmg));
      if (combat.playerThorns > 0) {
        dealDamageToEnemy(enemy, combat.playerThorns);
      }
    }

    triggerSlash(180, 400, 1);
    if (hits > 1) triggerSlash(120, 430, -1);
    triggerGlitch();
    triggerShake(Math.min(dmg * 1.2, 18));
    if (intent.special === 'lifesteal') {
      const healed = Math.min(dmg, enemy.maxHp - enemy.hp);
      enemy.hp = Math.min(enemy.maxHp, enemy.hp + healed);
      if (healed > 0) {
        addFloatingText(enemy.x, enemy.y - 50, `+${healed}`, '#33cc33', 16);
      }
    }
  } else if (intent.intent === 'block') {
    enemy.block += intent.blk;
    addFloatingText(enemy.x, enemy.y - 40, `+${intent.blk} Bloqueio`, '#3498db', 14);
    sfxBlock();
  } else if (intent.intent === 'buff') {
    if (intent.str) {
      enemy.strength += intent.str;
      addFloatingText(enemy.x, enemy.y - 40, `+${intent.str} Força`, '#c8a040', 14);
      sfxBuff();
    }
  } else if (intent.intent === 'debuff') {
    if (intent.weak) {
      combat.playerWeak += intent.weak;
      addFloatingText(150, 410, `+${intent.weak} Fraqueza`, '#6699cc', 16);
    }
    if (intent.vuln) {
      combat.playerVulnerable += intent.vuln;
      addFloatingText(150, 430, `+${intent.vuln} Vulnerável`, '#cc6633', 16);
    }
  }

  enemy.patIdx = (enemy.patIdx + 1) % enemy.pattern.length;
  enemy.intent = enemy.pattern[enemy.patIdx];

  if (enemy.special === 'enrage') {
    if (game.stats.cardsPlayed > 0) {
      const lastPlayed = combat.discardPile.length > 0 ? combat.discardPile[combat.discardPile.length - 1] : null;
    }
  }
};

const endEnemyTurns = () => {
  for (const e of combat.enemies) {
    if (e.dead) continue;
    e.block = 0;
    if (e.vulnerable > 0) e.vulnerable--;
    if (e.weak > 0) e.weak--;
    if (e.poison > 0) {
      const poisonDmg = e.poison;
      addFloatingText(e.x + 20, e.y - 55, `-${poisonDmg} ☠`, '#22ee44', 20);
      spawnParticles(e.x, e.y, '#22ee44', 8, 35);
      dealDamageToEnemy(e, poisonDmg);
      e.poison--;
    }
  }

  if (combat.playerVulnerable > 0) combat.playerVulnerable--;
  if (combat.playerWeak > 0) combat.playerWeak--;
  if (combat.playerPoison > 0) {
    dealDamageToPlayer(combat.playerPoison);
    combat.playerPoison--;
  }

  combat.playerThorns = 0;

  if (game.hp <= 0) {
    fadeToState('gameover');
    return;
  }

  if (checkCombatEnd()) return;

  if (tutorial.active && tutorial.step === 5) {
    tutorial.enemyTurnDone = true;
    combat.playerTurn = true;
    combat.turnPhase = 'player';
    return;
  }

  startPlayerTurn();
};

const checkCombatEnd = () => {
  const allDead = combat.enemies.every(e => e.dead);
  if (allDead) {
    if (tutorial.active) {
      finishTutorial();
      return true;
    }
    endCombat();
    return true;
  }
  if (game.hp <= 0) {
    if (tutorial.active) {
      game.hp = 1;
      return false;
    }
    fadeToState('gameover');
    return true;
  }
  return false;
};

const endCombat = () => {
  const nodeType = game.map[game.floor][game.nodeIdx].type;
  if (nodeType === 'elite') game.stats.elitesKilled = (game.stats.elitesKilled || 0) + 1;
  if (nodeType === 'boss') game.stats.bossesKilled = (game.stats.bossesKilled || 0) + 1;
  // Return to normal BGM after boss fight
  if (bgmCurrentTrack !== BGM_TRACKS.normal) switchBGM(BGM_TRACKS.normal);

  if (game.relics.includes('burningBlood')) {
    game.hp = Math.min(game.maxHp, game.hp + 6);
    addFloatingText(150, 420, '+6 HP', '#33cc33', 18);
  }

  const healPostLv = meta.upgrades['heal1'] || 0;
  if (healPostLv > 0) {
    const healAmt = healPostLv * 3;
    game.hp = Math.min(game.maxHp, game.hp + healAmt);
    addFloatingText(150, 440, `+${healAmt} HP`, '#33cc66', 14);
  }

  let goldMin = 10, goldMax = 25;
  if (nodeType === 'elite') { goldMin = 25; goldMax = 50; }
  if (nodeType === 'boss') { goldMin = 50; goldMax = 100; }
  const goldReward = randInt(goldMin, goldMax);
  game.gold += goldReward;

  rewards.gold = goldReward;
  rewards.cardPicked = false;
  rewards.relic = null;

  const basePool = getCardPool();
  const cardPool = [];
  for (const i of basePool) {
    const c = CARDS[i];
    const r = c.r;
    const isCommon = r === 'common' || r.endsWith('_common');
    const isUncommon = r === 'uncommon' || r.endsWith('_uncommon');
    const isRare = r === 'rare' || r.endsWith('_rare');
    if (isCommon) { cardPool.push(i); cardPool.push(i); cardPool.push(i); }
    else if (isUncommon) { cardPool.push(i); cardPool.push(i); }
    else if (isRare) { cardPool.push(i); }
    else { cardPool.push(i); }
  }
  shuffle(cardPool);
  const seen = new Set();
  rewards.cards = [];
  for (const cid of cardPool) {
    if (!seen.has(cid)) {
      seen.add(cid);
      rewards.cards.push(makeCard(cid));
    }
    if (rewards.cards.length >= 3 + ((meta.upgrades['cardChoice'] || 0) >= 1 ? 1 : 0)) break;
  }

  if (nodeType === 'elite' || nodeType === 'boss') {
    const ownedIds = new Set(game.relics);
    const available = RELICS.filter(r => !ownedIds.has(r.id));
    if (available.length > 0) {
      rewards.relic = available[randInt(0, available.length - 1)];
    }
  }

  game.stats.floorsCleared++;

  meta.totalKills += combat.enemies.filter(e => e.dead).length;
  if (nodeType === 'elite') meta.totalElitesKilled = (meta.totalElitesKilled || 0) + 1;
  if (nodeType === 'boss') meta.totalElitesKilled = (meta.totalElitesKilled || 0) + 1;
  for (const rId of game.relics) {
    if (!meta.allRelicsEver) meta.allRelicsEver = [];
    if (!meta.allRelicsEver.includes(rId)) meta.allRelicsEver.push(rId);
  }
  checkTrophies();

  fadeToState('rewards');
};

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const pg = ctx.createRadialGradient(bx + bw / 2, by + bh / 2, 0, bx + bw / 2, by + bh / 2, bw * 0.7);
      pg.addColorStop(0, `rgba(212,166,69,${0.15 * pulseFactor})`);
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(bx - bw * 0.3, by - bh * 0.5, bw * 1.6, bh * 2);
      ctx.restore();
    }

    const borderColor = shouldPulse ? `rgb(${180 + 75 * pulseFactor},${130 + 36 * pulseFactor},${40 + 29 * pulseFactor})` : (active ? (endBtnHov ? '#d4a645' : '#4a3878') : '#2a1838');
    ctx.fillStyle = borderColor;
    ctx.beginPath();
    ctx.moveTo(bx - 4, by - 3);
    ctx.lineTo(bx + bw + 4, by - 3);
    ctx.lineTo(bx + bw + 6, by + bh + 3);
    ctx.lineTo(bx - 6, by + bh + 3);
    ctx.closePath();
    ctx.fill();

    if (active) {
      ctx.fillStyle = endBtnHov || shouldPulse ? '#1a1230' : '#0c081e';
    } else {
      ctx.fillStyle = '#12101e';
    }
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + bw, by);
    ctx.lineTo(bx + bw + 3, by + bh);
    ctx.lineTo(bx - 3, by + bh);
    ctx.closePath();
    ctx.fill();

    if (shouldPulse) {
      ctx.fillStyle = `rgb(${200 + 55 * pulseFactor},${155 + 45 * pulseFactor},${50 + 30 * pulseFactor})`;
    } else if (active && endBtnHov) {
      ctx.fillStyle = '#d4a645';
    } else if (active) {
      ctx.fillStyle = '#e0d8c8';
    } else {
      ctx.fillStyle = '#444040';
    }
    ctx.font = mobC ? 'bold italic 18px sans-serif' : 'bold italic 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FIM DO TURNO', bx + bw / 2, by + bh / 2);

    ctx.restore();
  }

  ctx.save();
  ctx.font = mobC ? 'bold italic 14px sans-serif' : 'bold italic 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const infoSkew = -0.06;

  ctx.save();
  ctx.transform(1, 0, infoSkew, 1, 0, 0);
  ctx.fillStyle = '#0a0818cc';
  const diX = 20, diY = H - 28, diW = 80, diH = 18;
  ctx.beginPath();
  ctx.moveTo(diX, diY);
  ctx.lineTo(diX + diW, diY);
  ctx.lineTo(diX + diW + 2, diY + diH);
  ctx.lineTo(diX - 2, diY + diH);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#88aacc';
  ctx.fillText(`DECK ${combat.drawPile.length}`, diX + diW / 2, diY + diH / 2);
  ctx.restore();

  ctx.save();
  ctx.transform(1, 0, infoSkew, 1, 0, 0);
  const ddX = W - 110, ddY = H - 28, ddW = 90, ddH = 18;
  ctx.fillStyle = '#0a0818cc';
  ctx.beginPath();
  ctx.moveTo(ddX, ddY);
  ctx.lineTo(ddX + ddW, ddY);
  ctx.lineTo(ddX + ddW + 2, ddY + ddH);
  ctx.lineTo(ddX - 2, ddY + ddH);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#cc8866';
  ctx.fillText(`DESC ${combat.discardPile.length}`, ddX + ddW / 2, ddY + ddH / 2);
  ctx.restore();

  if (combat.exhaustPile.length > 0) {
    ctx.save();
    ctx.transform(1, 0, infoSkew, 1, 0, 0);
    const deX = W - 110, deY = H - 50, deW = 90, deH = 18;
    ctx.fillStyle = '#0a0818cc';
    ctx.beginPath();
    ctx.moveTo(deX, deY);
    ctx.lineTo(deX + deW, deY);
    ctx.lineTo(deX + deW + 2, deY + deH);
    ctx.lineTo(deX - 2, deY + deH);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#886666';
    ctx.fillText(`EXH ${combat.exhaustPile.length}`, deX + deW / 2, deY + deH / 2);
    ctx.restore();
  }

  ctx.save();
  ctx.transform(1, 0, infoSkew, 1, 0, 0);
  const ttX = W / 2 - 40, ttY = 5, ttW = 80, ttH = 18;
  ctx.fillStyle = '#0a0818cc';
  ctx.beginPath();
  ctx.moveTo(ttX, ttY);
  ctx.lineTo(ttX + ttW, ttY);
  ctx.lineTo(ttX + ttW + 2, ttY + ttH);
  ctx.lineTo(ttX - 2, ttY + ttH);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#c0b8a8';
  ctx.fillText(`TURNO ${combat.turn}`, ttX + ttW / 2, ttY + ttH / 2);
  ctx.restore();

  ctx.restore();

  {
    const _bs = mobC ? 32 : 22;
    const _bg = mobC ? 10 : 8;
    const _rm = mobC ? 16 : 14;
    const _goldX = W - _rm - _bs - _bg - _bs - _bg - _bs - _bg - 6;
    ctx.font = mobC ? 'bold 14px sans-serif' : '12px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = PAL.gold;
    ctx.fillText(`Ouro: ${game.gold}`, _goldX, mobC ? 26 : 22);
  }

  for (let i = 0; i < combat.hand.length; i++) {
    if (i === combat.hoveredCardIdx || i === combat.selectedCardIdx) continue;
    const card = combat.hand[i];
    const data = getCardData(card);
    const selectable = combat.playerTurn && !combat.animating && data.c <= combat.energy && !data.unplayable;
    const dimmed = combat.selectedCardIdx >= 0;
    if (dimmed) ctx.globalAlpha = 0.5;
    drawCard(card.x, card.y, card, card.scale, false, selectable);
    if (dimmed) ctx.globalAlpha = 1;
  }
  // Draw hovered card on top (if not the selected one)
  if (combat.hoveredCardIdx >= 0 && combat.hoveredCardIdx < combat.hand.length && combat.hoveredCardIdx !== combat.selectedCardIdx) {
    const card = combat.hand[combat.hoveredCardIdx];
    const data = getCardData(card);
    const selectable = combat.playerTurn && !combat.animating && data.c <= combat.energy && !data.unplayable;
    drawCard(card.x, card.y, card, card.scale, true, selectable);
  }
  // Draw selected card last (topmost)
  if (combat.selectedCardIdx >= 0 && combat.selectedCardIdx < combat.hand.length) {
    const selCard = combat.hand[combat.selectedCardIdx];
    const selData = getCardData(selCard);
    const selectable = combat.playerTurn && !combat.animating && selData.c <= combat.energy && !selData.unplayable;
    const isAttackOne = selData.t === 'attack' && selData.tgt === 'one' && selData.special !== 'reaper';
    // Glow behind selected card
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const glowColor = selData.t === 'attack' ? 'rgba(200,60,60,' : selData.t === 'skill' ? 'rgba(60,100,200,' : 'rgba(200,160,60,';
    const selPulse = 0.3 + Math.sin(Date.now() * 0.005) * 0.15;
    const sg = ctx.createRadialGradient(selCard.x, selCard.y, 0, selCard.x, selCard.y, 90);
    sg.addColorStop(0, glowColor + selPulse + ')');
    sg.addColorStop(0.6, glowColor + (selPulse * 0.3) + ')');
    sg.addColorStop(1, glowColor + '0)');
    ctx.fillStyle = sg;
    ctx.fillRect(selCard.x - 90, selCard.y - 90, 180, 180);
    ctx.restore();
    drawCard(selCard.x, selCard.y, selCard, selCard.scale, true, selectable);
    // Hint below selected card
    ctx.save();
    ctx.font = `bold ${mobC ? 14 : 11}px sans-serif`;
    ctx.textAlign = 'center';
    const hintY = selCard.y + (CARD_H * selCard.scale / 2) + (mobC ? 18 : 14);
    if (isAttackOne && combat.targeting) {
      ctx.fillStyle = '#ffaa44';
      ctx.fillText('⚔ Selecione um inimigo alvo ⚔', selCard.x, hintY);
    } else {
      const hintPulse = 0.6 + Math.sin(Date.now() * 0.004) * 0.3;
      ctx.fillStyle = `rgba(232,220,200,${hintPulse})`;
      ctx.fillText('▲ Toque novamente para usar ▲', selCard.x, hintY);
    }
    ctx.restore();
  }

  // Targeting arrows on enemies
  if (combat.targeting && combat.selectedCardIdx >= 0) {
    const now = Date.now() * 0.004;
    ctx.save();
    for (let ei = 0; ei < combat.enemies.length; ei++) {
      const e = combat.enemies[ei];
      if (e.dead) continue;
      const eHov = combat.hoveredEnemyIdx === ei;
      const arrowY = e.y - (isTouchDevice ? 90 : 70) + Math.sin(now + ei) * 6;
      const arrowAlpha = eHov ? 1 : (0.6 + Math.sin(now * 1.5 + ei * 2) * 0.25);
      const arrowSize = (mobC ? 14 : 10) * (eHov ? 1.3 : 1);
      ctx.globalAlpha = arrowAlpha;
      ctx.fillStyle = eHov ? '#ff6644' : '#ffaa44';
      // Arrow pointing down
      ctx.beginPath();
      ctx.moveTo(e.x, arrowY + arrowSize);
      ctx.lineTo(e.x - arrowSize * 0.7, arrowY);
      ctx.lineTo(e.x - arrowSize * 0.2, arrowY);
      ctx.lineTo(e.x - arrowSize * 0.2, arrowY - arrowSize * 0.6);
      ctx.lineTo(e.x + arrowSize * 0.2, arrowY - arrowSize * 0.6);
      ctx.lineTo(e.x + arrowSize * 0.2, arrowY);
      ctx.lineTo(e.x + arrowSize * 0.7, arrowY);
      ctx.closePath();
      ctx.fill();
      // Glow ring around enemy
      ctx.globalCompositeOperation = 'lighter';
      const ringR = mobC ? 55 : 40;
      const rg = ctx.createRadialGradient(e.x, e.y, ringR * 0.6, e.x, e.y, ringR);
      rg.addColorStop(0, 'rgba(0,0,0,0)');
      rg.addColorStop(0.7, `rgba(255,140,50,${eHov ? 0.12 : 0.05})`);
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(e.x - ringR, e.y - ringR, ringR * 2, ringR * 2);
      ctx.globalCompositeOperation = 'source-over';
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    // Central message
    ctx.save();
    ctx.font = `bold ${mobC ? 16 : 14}px sans-serif`;
    ctx.textAlign = 'center';
    const msgPulse = 0.7 + Math.sin(Date.now() * 0.004) * 0.3;
    ctx.fillStyle = `rgba(255,170,68,${msgPulse})`;
    ctx.fillText('⚔ Selecione um inimigo ⚔', W / 2, mobC ? 130 : 160);
    ctx.restore();
  }

  let relicX = 260;
  for (const rId of game.relics) {
    const rel = RELICS.find(r => r.id === rId);
    if (rel) {
      ctx.fillStyle = rel.color;
      ctx.beginPath();
      ctx.arc(relicX, 15, 8, 0, Math.PI * 2);
      ctx.fill();
      relicX += 22;
    }
  }

  const potSlotW = mobC ? 56 : 42, potSlotH = mobC ? 56 : 42, potGap = mobC ? 8 : 6;
  const potSlotX = mobC ? 340 : 290, potSlotY = mobC ? 345 : 420;
  let hoveredPotionTip = null;
  for (let i = 0; i < 3; i++) {
    const px = potSlotX + i * (potSlotW + potGap);
    const py = potSlotY;
    const hasPot = i < game.potions.length;
    const pot = hasPot ? getPotion(game.potions[i]) : null;
    const hov = hasPot && combat.playerTurn && !combat.animating && isInRect(mouse.x, mouse.y, px, py, potSlotW, potSlotH);

    ctx.save();
    ctx.fillStyle = hov ? '#12101eee' : '#0a0818cc';
    ctx.strokeStyle = hasPot ? pot.color + '88' : '#333333';
    ctx.lineWidth = hov ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(px + 2, py);
    ctx.lineTo(px + potSlotW - 2, py);
    ctx.lineTo(px + potSlotW, py + potSlotH);
    ctx.lineTo(px, py + potSlotH);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    if (hasPot) {
      ctx.fillStyle = pot.color;
      ctx.beginPath();
      const cx = px + potSlotW / 2, cy = py + potSlotH / 2 - 2;
      ctx.moveTo(cx - 5, cy - 8);
      ctx.lineTo(cx + 5, cy - 8);
      ctx.lineTo(cx + 4, cy - 5);
      ctx.lineTo(cx + 8, cy + 2);
      ctx.lineTo(cx + 8, cy + 10);
      ctx.quadraticCurveTo(cx, cy + 14, cx - 8, cy + 10);
      ctx.lineTo(cx - 8, cy + 2);
      ctx.lineTo(cx - 4, cy - 5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = pot.color + '44';
      ctx.beginPath();
      ctx.arc(cx, cy + 4, 10, 0, Math.PI * 2);
      ctx.fill();

      if (hov) {
        ctx.strokeStyle = '#e8dcc844';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px + 2, py);
        ctx.lineTo(px + potSlotW - 2, py);
        ctx.lineTo(px + potSlotW, py + potSlotH);
        ctx.lineTo(px, py + potSlotH);
        ctx.closePath();
        ctx.stroke();
        hoveredPotionTip = { text: `${pot.n}: ${pot.d}`, x: px, y: py - 4, color: pot.color };
      }
    } else {
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#333333';
      ctx.fillText('vazio', px + potSlotW / 2, py + potSlotH / 2);
    }
    ctx.restore();
  }

  if (hoveredPotionTip) {
    ctx.save();
    ctx.font = '12px sans-serif';
    const tipW = ctx.measureText(hoveredPotionTip.text).width + 16;
    const tipH = 26;
    let tipX = hoveredPotionTip.x;
    let tipY = hoveredPotionTip.y - tipH - 4;
    if (tipX + tipW > W) tipX = W - tipW - 5;
    if (tipX < 5) tipX = 5;
    ctx.fillStyle = '#0a0a14ee';
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX + tipW, tipY);
    ctx.lineTo(tipX + tipW + 2, tipY + tipH);
    ctx.lineTo(tipX - 2, tipY + tipH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = hoveredPotionTip.color + '88';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#dddddd';
    ctx.fillText(hoveredPotionTip.text, tipX + 8, tipY + tipH / 2);
    ctx.restore();
  }

  

  renderCombatWarning();
  drawVignette();
};

// ==================== REWARD SCREEN ====================
const renderRewards = () => {
  ctx.fillStyle = '#08061a';
  ctx.fillRect(0, 0, W, H);

  const now = Date.now();
  const skew = -0.07;
  const panelX = W / 2 - 310, panelY = 25, panelW = 620, panelH = 700;

  drawPersonaPanel(panelX, panelY, panelW, panelH);

  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);

  const titleY = panelY + 10;
  const titleH = 50;
  const titleGrd = ctx.createLinearGradient(panelX, 0, panelX + panelW, 0);
  titleGrd.addColorStop(0, '#7733aa');
  titleGrd.addColorStop(0.5, '#5c2488');
  titleGrd.addColorStop(1, '#7733aa88');
  ctx.fillStyle = titleGrd;
  ctx.beginPath();
  ctx.moveTo(panelX + 4, titleY);
  ctx.lineTo(panelX + panelW - 4, titleY);
  ctx.lineTo(panelX + panelW - 2, titleY + titleH);
  ctx.lineTo(panelX + 2, titleY + titleH);
  ctx.closePath();
  ctx.fill();

  ctx.font = 'bold italic 30px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8dcc8';
  ctx.shadowColor = '#000000';
  ctx.shadowBlur = 5;
  ctx.fillText('RECOMPENSAS', panelX + panelW / 2, titleY + titleH / 2);
  ctx.shadowBlur = 0;

  const goldY = titleY + titleH + 20;
  const goldW = 200;
  const goldH = 34;
  const goldX = panelX + panelW / 2 - goldW / 2;
  ctx.fillStyle = '#1a1508';
  ctx.beginPath();
  ctx.moveTo(goldX, goldY);
  ctx.lineTo(goldX + goldW, goldY);
  ctx.lineTo(goldX + goldW + 4, goldY + goldH);
  ctx.lineTo(goldX - 4, goldY + goldH);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#c8a040';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.font = 'bold italic 20px sans-serif';
  ctx.fillStyle = '#f4d03f';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#c8a040';
  ctx.shadowBlur = 8;
  ctx.fillText(`+ ${rewards.gold} OURO`, goldX + goldW / 2, goldY + goldH / 2);
  ctx.shadowBlur = 0;

  if (rewards.relic) {
    const relY = goldY + goldH + 14;
    const relW = 320;
    const relH = 44;
    const relX = panelX + panelW / 2 - relW / 2;
    ctx.fillStyle = '#0e0e18';
    ctx.beginPath();
    ctx.moveTo(relX, relY);
    ctx.lineTo(relX + relW, relY);
    ctx.lineTo(relX + relW + 3, relY + relH);
    ctx.lineTo(relX - 3, relY + relH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = rewards.relic.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.shadowColor = rewards.relic.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = rewards.relic.color;
    ctx.beginPath();
    ctx.arc(relX + 22, relY + relH / 2, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.font = 'bold italic 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#e8dcc8';
    ctx.fillText(rewards.relic.n, relX + 40, relY + 16);
    ctx.font = 'italic 11px sans-serif';
    ctx.fillStyle = '#887766';
    ctx.fillText(rewards.relic.d, relX + 40, relY + 32);
  }

  ctx.restore();

  if (!rewards.cardPicked && rewards.cards.length > 0) {
    const promptY = rewards.relic ? 235 : 195;
    ctx.save();
    ctx.transform(1, 0, skew, 1, 0, 0);
    const promptW = 340;
    const promptH = 28;
    const promptX = W / 2 - promptW / 2;
    ctx.fillStyle = '#12101e';
    ctx.beginPath();
    ctx.moveTo(promptX, promptY);
    ctx.lineTo(promptX + promptW, promptY);
    ctx.lineTo(promptX + promptW + 2, promptY + promptH);
    ctx.lineTo(promptX - 2, promptY + promptH);
    ctx.closePath();
    ctx.fill();
    ctx.font = 'bold italic 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ccbbaa';
    ctx.fillText('ESCOLHA UMA CARTA', promptX + promptW / 2, promptY + promptH / 2);
    ctx.restore();

    const rwdScale = isTouchDevice ? 1.5 : 1;
    const rwdSpacing = isTouchDevice ? 240 : 160;
    for (let i = 0; i < rewards.cards.length; i++) {
      const cx = W / 2 + (i - 1) * rwdSpacing;
      const cy = 380;
      const hitW = CARD_W * rwdScale, hitH = CARD_H * rwdScale;
      const hovered = isInRect(mouse.x, mouse.y, cx - hitW / 2, cy - hitH / 2, hitW, hitH);
      drawCard(cx, cy, rewards.cards[i], hovered ? rwdScale * 1.05 : rwdScale, hovered, true);
    }
  } else {
    ctx.save();
    ctx.transform(1, 0, skew, 1, 0, 0);
    const msgY = 330;
    const msgW = 380;
    const msgH = 36;
    const msgX = W / 2 - msgW / 2;
    ctx.fillStyle = '#0e1a0e';
    ctx.beginPath();
    ctx.moveTo(msgX, msgY);
    ctx.lineTo(msgX + msgW, msgY);
    ctx.lineTo(msgX + msgW + 3, msgY + msgH);
    ctx.lineTo(msgX - 3, msgY + msgH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#33cc33';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = 'bold italic 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#33cc33';
    ctx.fillText(rewards.cardPicked ? 'CARTA ADICIONADA AO BARALHO!' : 'SEM CARTAS DISPONÍVEIS', msgX + msgW / 2, msgY + msgH / 2);
    ctx.restore();
  }

  const skipX = W / 2 - 80, skipY = 580, skipW = 160, skipH = 44;
  const skipHov = isInRect(mouse.x, mouse.y, skipX, skipY, skipW, skipH);
  const skipText = rewards.cardPicked ? 'CONTINUAR' : 'PULAR';
  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);

  ctx.fillStyle = '#7733aa';
  ctx.beginPath();
  ctx.moveTo(skipX - 4, skipY - 3);
  ctx.lineTo(skipX + skipW + 4, skipY - 3);
  ctx.lineTo(skipX + skipW + 6, skipY + skipH + 3);
  ctx.lineTo(skipX - 6, skipY + skipH + 3);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = skipHov ? '#e8dcc8' : '#0a0818';
  ctx.beginPath();
  ctx.moveTo(skipX, skipY);
  ctx.lineTo(skipX + skipW, skipY);
  ctx.lineTo(skipX + skipW + 3, skipY + skipH);
  ctx.lineTo(skipX - 3, skipY + skipH);
  ctx.closePath();
  ctx.fill();

  ctx.font = 'bold italic 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = skipHov ? '#7733aa' : '#e8dcc8';
  ctx.fillText(skipText, skipX + skipW / 2, skipY + skipH / 2);
  ctx.restore();

  drawVignette();
};

// ==================== SHOP SCREEN ====================
const initShop = () => {
  shopData.cards = [];
  shopData.relics = [];
  shopData.potions = [];
  shopData.purchased = {};
  shopData.pickingRemove = false;
  shopData.removeScrollY = 0;

  const pool = getCardPool();
  shuffle(pool);
  for (let i = 0; i < Math.min(6, pool.length); i++) {
    const c = CARDS[pool[i]];
    const r = c.r;
    let price = 50;
    if (r === 'uncommon' || r.endsWith('_uncommon')) price = 75;
    if (r === 'rare' || r.endsWith('_rare')) price = 150;
    shopData.cards.push({ cardId: pool[i], price });
  }

  const ownedRelics = new Set(game.relics);
  const available = RELICS.filter(r => !ownedRelics.has(r.id));
  shuffle(available);
  for (let i = 0; i < Math.min(2, available.length); i++) {
    shopData.relics.push({ relic: available[i], price: randInt(150, 250) });
  }

  for (let i = 0; i < 2; i++) {
    const pot = POTIONS[randInt(0, POTIONS.length - 1)];
    shopData.potions.push({ potion: pot, price: 50 });
  }
};

const drawShopItemRow = (rx, ry, rw, rh, text, subText, price, affordable, hov, iconColor) => {
  const skew = -0.07;
  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);

  ctx.fillStyle = hov ? '#12101e' : '#0e0e18';
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.lineTo(rx + rw, ry);
  ctx.lineTo(rx + rw + 2, ry + rh);
  ctx.lineTo(rx - 2, ry + rh);
  ctx.closePath();
  ctx.fill();

  if (hov) {
    ctx.strokeStyle = '#7733aa66';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  if (iconColor) {
    ctx.save();
    ctx.shadowColor = iconColor;
    ctx.shadowBlur = 6;
    ctx.fillStyle = iconColor;
    ctx.beginPath();
    ctx.moveTo(rx + 16, ry + rh / 2 - 8);
    ctx.lineTo(rx + 24, ry + rh / 2);
    ctx.lineTo(rx + 16, ry + rh / 2 + 8);
    ctx.lineTo(rx + 8, ry + rh / 2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  const textX = iconColor ? rx + 34 : rx + 12;
  ctx.font = 'bold italic 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8e0d0';
  if (subText) {
    ctx.fillText(text, textX, ry + rh * 0.35);
    ctx.font = 'italic 10px sans-serif';
    ctx.fillStyle = '#887766';
    ctx.fillText(subText, textX, ry + rh * 0.7);
  } else {
    ctx.fillText(text, textX, ry + rh / 2);
  }

  if (price != null) {
    ctx.font = 'bold italic 14px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = affordable ? '#f4d03f' : '#6a3a4a';
    ctx.shadowColor = affordable ? '#c8a04066' : 'transparent';
    ctx.shadowBlur = affordable ? 4 : 0;
    ctx.fillText(`${price}g`, rx + rw - 10, ry + rh / 2);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
};

    ctx.font = 'bold italic 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aa55dd';
    ctx.fillText('ESCOLHA UMA CARTA PARA REMOVER', W / 2, 80);
    ctx.font = 'italic 13px sans-serif';
    ctx.fillStyle = '#c8a040';
    ctx.fillText(`Custo: ${shopData.removeCost} ouro`, W / 2, 105);
    ctx.restore();

    const rmClipTop = 175;

    const rmRowH = rmCH + rmGapY;
    const rmTotalRows = Math.ceil(game.deck.length / rmCols);

    const rmMaxScroll = Math.max(0, rmContentH - (rmClipBot - rmClipTop));
    if (shopData.removeScrollY > rmMaxScroll) shopData.removeScrollY = rmMaxScroll;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, rmClipTop, W, rmClipBot - rmClipTop);
    ctx.clip();

    for (let ri = 0; ri < game.deck.length; ri++) {
      const col = ri % rmCols;

  drawVignette();

// ==================== EVENT SCREEN ====================
const drawPersonaPanel = (px, py, pw, ph) => {
  const skew = -0.07;
  const now = Date.now();
  const t = now * 0.003;

  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);

  // --- Liquid spikes border (right side) ---
  ctx.fillStyle = '#7733aa';
  ctx.beginPath();
  ctx.moveTo(px + pw + 6, py - 10);
  for (let sy = py - 10; sy <= py + ph + 12; sy += 6) {
    const wave = Math.sin(sy * 0.08 + t) * 6 + Math.sin(sy * 0.15 + t * 1.7) * 4;
    const spike = Math.sin(sy * 0.04 + t * 0.8) > 0.3 ? (Math.sin(sy * 0.12 + t * 2) * 8 + 8) : 0;
    ctx.lineTo(px + pw + 10 + wave + spike, sy);
  }
  ctx.lineTo(px + pw + 6, py + ph + 12);
  ctx.lineTo(px + pw + 4, py + ph + 12);
  for (let sy = py + ph + 12; sy >= py - 10; sy -= 8) {
    ctx.lineTo(px + pw + 4, sy);
  }
  ctx.closePath();
  ctx.fill();

  // --- Liquid spikes border (left side) ---
  ctx.beginPath();
  ctx.moveTo(px - 6, py - 10);
  for (let sy = py - 10; sy <= py + ph + 12; sy += 6) {
    const wave = Math.sin(sy * 0.07 + t * 1.2 + 2) * 5 + Math.sin(sy * 0.13 + t * 1.5 + 1) * 3;
    const spike = Math.sin(sy * 0.05 + t * 0.9 + 3) > 0.4 ? (Math.sin(sy * 0.11 + t * 1.8 + 2) * 7 + 7) : 0;
    ctx.lineTo(px - 10 - wave - spike, sy);
  }
  ctx.lineTo(px - 6, py + ph + 12);
  ctx.lineTo(px - 4, py + ph + 12);
  for (let sy = py + ph + 12; sy >= py - 10; sy -= 8) {
    ctx.lineTo(px - 4, sy);
  }
  ctx.closePath();
  ctx.fill();

  // --- Liquid spikes border (top) ---
  ctx.beginPath();
  ctx.moveTo(px - 12, py - 6);
  for (let sx = px - 12; sx <= px + pw + 12; sx += 6) {
    const wave = Math.sin(sx * 0.06 + t * 1.1) * 4 + Math.sin(sx * 0.14 + t * 1.6) * 3;
    const spike = Math.sin(sx * 0.04 + t * 0.7 + 1) > 0.3 ? (Math.sin(sx * 0.1 + t * 2.1) * 6 + 6) : 0;
    ctx.lineTo(sx, py - 8 - wave - spike);
  }
  ctx.lineTo(px + pw + 12, py - 4);
  for (let sx = px + pw + 12; sx >= px - 12; sx -= 8) {
    ctx.lineTo(sx, py - 4);
  }
  ctx.closePath();
  ctx.fill();

  // --- Liquid spikes border (bottom) ---
  ctx.beginPath();
  ctx.moveTo(px - 12, py + ph + 6);
  for (let sx = px - 12; sx <= px + pw + 12; sx += 6) {
    const wave = Math.sin(sx * 0.065 + t * 1.3 + 4) * 4 + Math.sin(sx * 0.12 + t * 1.4 + 2) * 3;
    const spike = Math.sin(sx * 0.045 + t * 0.85 + 5) > 0.35 ? (Math.sin(sx * 0.11 + t * 1.9 + 3) * 6 + 6) : 0;
    ctx.lineTo(sx, py + ph + 8 + wave + spike);
  }
  ctx.lineTo(px + pw + 12, py + ph + 4);
  for (let sx = px + pw + 12; sx >= px - 12; sx -= 8) {
    ctx.lineTo(sx, py + ph + 4);
  }
  ctx.closePath();
  ctx.fill();

  // --- Ornate inner border ---
  ctx.fillStyle = '#4a3878';
  ctx.beginPath();
  ctx.moveTo(px - 3, py - 3);
  ctx.lineTo(px + pw + 3, py - 3);
  ctx.lineTo(px + pw + 7, py + ph + 3);
  ctx.lineTo(px + pw + 1, py + ph + 9);
  ctx.lineTo(px - 3, py + ph + 9);
  ctx.lineTo(px - 9, py + ph + 3);
  ctx.closePath();
  ctx.fill();

  // --- Dark inner fill ---
  ctx.fillStyle = '#0c081e';
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px + pw, py);
  ctx.lineTo(px + pw + 5, py + ph);
  ctx.lineTo(px + pw - 1, py + ph + 6);
  ctx.lineTo(px, py + ph + 6);
  ctx.lineTo(px - 6, py + ph);
  ctx.closePath();
  ctx.fill();

  // --- Subtle inner glow ---
  ctx.globalAlpha = 0.06;
  const innerGlow = ctx.createRadialGradient(px + pw / 2, py + ph / 2, 0, px + pw / 2, py + ph / 2, pw * 0.7);
  innerGlow.addColorStop(0, '#7733aa');
  innerGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = innerGlow;
  ctx.fillRect(px - 6, py, pw + 12, ph + 6);
  ctx.globalAlpha = 1;

  ctx.restore();
};

const drawPersonaTitle = (text, px, pw, ty, th) => {

  ctx.save();
  ctx.transform(1, 0, skew, 1, 0, 0);
