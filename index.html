  }

  const getCardCategory = (card) => {
    const r = card.r;
    if (r.includes('sombra')) return 'sombra';
    if (r.includes('cinza')) return 'cinza';
    if (r === 'starter') return 'pacto';
    return 'neutras';
  };

  let filteredCards = [];
  for (let i = 0; i < CARDS.length; i++) {
    const card = CARDS[i];
    const cat = getCardCategory(card);
    if (cardexFilter === 'all' || cardexFilter === cat) {
      filteredCards.push({ idx: i, card, char: cat });
    }
  }

  ctx.font = 'bold italic 14px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#9a9088';
  ctx.fillText(`${filteredCards.length} CARTAS`, W - 60, 90);

  const cardScale = 0.55;
  const cw = 120 * cardScale;
  const ch = 170 * cardScale;
  const cardCols = 6;
  const cardGapX = 20;
  const cardGapY = 18;
  const gridLeft = (W - (cardCols * cw + (cardCols - 1) * cardGapX)) / 2;
  const gridTop = 120;
  const clipTop = 115, clipBot = H - 60;

  const totalRows = Math.ceil(filteredCards.length / cardCols);
  const rowH = ch + cardGapY;
  const contentH = totalRows * rowH;
  const maxScroll = Math.max(0, contentH - (clipBot - clipTop));
  if (cardexScrollY > maxScroll) cardexScrollY = maxScroll;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, clipTop, W, clipBot - clipTop);
  ctx.clip();

  let hoveredCardData = null;
  let hovCardX = 0, hovCardY = 0;

  for (let fi = 0; fi < filteredCards.length; fi++) {
    const { idx, card, char: cardChar } = filteredCards[fi];
    const col = fi % cardCols;
    const row = Math.floor(fi / cardCols);
    const cx = gridLeft + col * (cw + cardGapX);
    const cy = gridTop + row * rowH - cardexScrollY;

    if (cy + ch < clipTop || cy > clipBot) continue;

    const locked = (cardChar === 'sombra' && (!meta.unlockedChars || !meta.unlockedChars.includes('sombra'))) ||
                   (cardChar === 'cinza' && (!meta.unlockedChars || !meta.unlockedChars.includes('cinza')));

    if (locked) {
      ctx.save();
      ctx.transform(1, 0, -0.07, 1, 0, 0);
      ctx.fillStyle = '#7733aa66';
      ctx.beginPath();
      ctx.moveTo(cx - 2, cy - 2);
      ctx.lineTo(cx + cw + 2, cy - 2);
      ctx.lineTo(cx + cw + 3, cy + ch + 2);
      ctx.lineTo(cx - 3, cy + ch + 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#151515';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + cw, cy);
      ctx.lineTo(cx + cw + 1, cy + ch);
      ctx.lineTo(cx - 1, cy + ch);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#444444';
      ctx.fillText('🔒', cx + cw / 2, cy + ch / 2 - 6);
      ctx.font = 'bold 9px sans-serif';
      ctx.fillStyle = '#4a4050';
      ctx.fillText('BLOQUEADO', cx + cw / 2, cy + ch / 2 + 14);
    } else {
      const cardHov = isInRect(mouse.x, mouse.y, cx, cy, cw, ch);
      drawCard(cx + cw / 2, cy + ch / 2, { id: idx, uid: 0, upgraded: false }, cardScale, cardHov, false);
      if (cardHov) {
        hoveredCardData = card;
        hovCardX = mouse.x;
        hovCardY = mouse.y;
      }
    }
  }

  ctx.restore();

  if (hoveredCardData) {
    const ttW = 220, ttH = 60;
    let ttX = hovCardX + 15;
    let ttY = hovCardY - ttH - 5;
    if (ttX + ttW > W) ttX = hovCardX - ttW - 15;
    if (ttY < 0) ttY = hovCardY + 15;

    ctx.save();
    ctx.transform(1, 0, -0.07, 1, 0, 0);
    ctx.fillStyle = '#7733aa';
    ctx.beginPath();
    ctx.moveTo(ttX - 3, ttY - 3);
    ctx.lineTo(ttX + ttW + 3, ttY - 3);
    ctx.lineTo(ttX + ttW + 4, ttY + ttH + 3);
    ctx.lineTo(ttX - 4, ttY + ttH + 3);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#0a0818';
    ctx.beginPath();
    ctx.moveTo(ttX, ttY);
    ctx.lineTo(ttX + ttW, ttY);
    ctx.lineTo(ttX + ttW + 1, ttY + ttH);
    ctx.lineTo(ttX - 1, ttY + ttH);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    ctx.font = 'bold italic 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#e8dcc8';
    ctx.fillText(hoveredCardData.n, ttX + 10, ttY + 18);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#bbbbbb';
    const descLine = (hoveredCardData.d || '').split('\n')[0];
    ctx.fillText(descLine.substring(0, 35), ttX + 10, ttY + 36);
    if (descLine.length > 35 || (hoveredCardData.d || '').includes('\n')) {
      const line2 = (hoveredCardData.d || '').split('\n')[1] || descLine.substring(35, 70);
      ctx.fillText(line2.substring(0, 35), ttX + 10, ttY + 50);
    }
  }

  if (cardexScrollY > 0) {
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7733aa';
    ctx.fillText('▲', W / 2, clipTop + 12);
  }
  if (cardexScrollY < maxScroll) {
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7733aa';
    ctx.fillText('▼', W / 2, clipBot - 4);
  }

  const backX = 40, backY = H - 50, backW = 160, backH = 36;
  const backHov = isInRect(mouse.x, mouse.y, backX - 5, backY - 5, backW + 10, backH + 10);
  drawPersonaBtn(backX, backY, backW, backH, 'VOLTAR', backHov);

  if (cardexZoomed !== null) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    const zoomScale = isTouchDevice ? 1.8 : 1.6;
    drawCard(W / 2, H / 2 - 20, { id: cardexZoomed, uid: 0, upgraded: false }, zoomScale, false, false);

    ctx.font = `bold ${isTouchDevice ? 14 : 12}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(200,180,220,0.6)';
    ctx.fillText('Toque para fechar', W / 2, H / 2 + CARD_H * zoomScale / 2 + 30);
  }

  drawVignette();
};

// ==================== TROPHY SCREEN ====================
const renderTrophies = () => {
  ctx.fillStyle = '#0a0816';
  ctx.fillRect(0, 0, W, H);

  const now = Date.now();
  const t = now * 0.001;
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#7733aa';
  ctx.lineWidth = 1;
  const lineOff = (t * 15) % 60;
  for (let li = -H; li < W + H; li += 60) {
    ctx.beginPath();
    ctx.moveTo(li + lineOff, 0);
    ctx.lineTo(li + lineOff - H * 0.6, H);
    ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;

  const trophies = meta.trophies || [];
  const total = TROPHIES.length - 1;
  const unlocked = trophies.filter(id => id !== 'platinum').length;
  const hasPlatinum = trophies.includes('platinum');

  drawPersonaTitle('TROFÉUS', 100, W - 200, 30, 48);

  ctx.font = 'bold italic 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#9a9088';
  ctx.fillText(`${unlocked} / ${total}`, W / 2, 72);

  // Platinum progress bar
  const pbX = W / 2 - 200, pbY = 82, pbW = 400, pbH = 12;
  ctx.fillStyle = '#12101e';
  ctx.fillRect(pbX, pbY, pbW, pbH);
  const ratio = unlocked / total;
  if (ratio > 0) {
    const grd = ctx.createLinearGradient(pbX, 0, pbX + pbW * ratio, 0);
    grd.addColorStop(0, '#00aacc');
    grd.addColorStop(1, '#00ccff');
    ctx.fillStyle = grd;
    ctx.fillRect(pbX, pbY, pbW * ratio, pbH);
  }
  if (hasPlatinum) {
    ctx.save();
    ctx.shadowColor = '#00ccff';
    ctx.shadowBlur = 10 + Math.sin(now * 0.005) * 5;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ccff';
    ctx.fillText('💎 PLATINA DESBLOQUEADA!', W / 2, pbY + pbH + 16);
    ctx.restore();
  }

  const clipTop = 105, clipBot = H - 55;
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, clipTop, W, clipBot - clipTop);
  ctx.clip();

  const tiers = ['bronze', 'silver', 'gold'];
  const tierNames = { bronze: 'BRONZE', silver: 'PRATA', gold: 'OURO' };
  let cy = clipTop + 15 - trophyScrollY;
  const cardW = 320, cardH = 52, gap = 6, cols = 3;
  const tGridW = cols * cardW + (cols - 1) * 12;
  const tGridStartX = (W - tGridW) / 2;

  for (const tier of tiers) {
    const tierTrophies = TROPHIES.filter(tr => tr.tier === tier);
    const tierColor = TROPHY_TIERS[tier].color;

    ctx.font = 'bold italic 16px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = tierColor;
    ctx.fillText(`🏆 ${tierNames[tier]}`, tGridStartX, cy + 12);
    cy += 28;

    for (let i = 0; i < tierTrophies.length; i++) {
      const tr = tierTrophies[i];
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = tGridStartX + col * (cardW + 12);
      const ry = cy + row * (cardH + gap);
      const isUnlocked = trophies.includes(tr.id);

      if (ry + cardH < clipTop - 20 || ry > clipBot + 20) continue;

      ctx.fillStyle = isUnlocked ? '#121222' : '#0a0a10';
      ctx.beginPath();
      ctx.moveTo(cx + 4, ry);
      ctx.lineTo(cx + cardW - 4, ry);
      ctx.lineTo(cx + cardW, ry + cardH);
      ctx.lineTo(cx, ry + cardH);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = isUnlocked ? tierColor + '66' : '#222222';
      ctx.lineWidth = 1;
      ctx.stroke();

      if (isUnlocked) {
        ctx.save();
        ctx.shadowColor = tierColor;
        ctx.shadowBlur = 6;
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = tierColor;
        ctx.fillText('🏆', cx + 22, ry + cardH / 2);
        ctx.restore();

        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#e8dcc8';
        ctx.fillText(tr.n, cx + 42, ry + 18);
        ctx.font = '10px sans-serif';
        ctx.fillStyle = '#807868';
        ctx.fillText(tr.d, cx + 42, ry + 36);
      } else {
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#222222';
        ctx.fillText('🔒', cx + 22, ry + cardH / 2);

        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#444444';
        ctx.fillText('???', cx + 42, ry + 18);
        ctx.font = '10px sans-serif';
        ctx.fillStyle = '#333333';
        ctx.fillText(tr.d, cx + 42, ry + 36);
      }
    }

    const rows = Math.ceil(tierTrophies.length / cols);
    cy += rows * (cardH + gap) + 10;
  }

  const contentH = cy + trophyScrollY - clipTop - 15;
  const maxScroll = Math.max(0, contentH - (clipBot - clipTop));
  trophyScrollY = clamp(trophyScrollY, 0, maxScroll);

  ctx.restore();

  if (trophyScrollY > 0) {
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.sin(now * 0.005) * 0.3;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7733aa';
    ctx.fillText('▲', W / 2, clipTop + 10);
    ctx.restore();
  }
  if (maxScroll > 0 && trophyScrollY < maxScroll) {
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.sin(now * 0.005) * 0.3;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7733aa';
    ctx.fillText('▼', W / 2, clipBot - 5);
    ctx.restore();
  }

  const backX = 40, backY = H - 50, backW = 160, backH = 36;
  const backHov = isInRect(mouse.x, mouse.y, backX, backY, backW, backH);
  drawPersonaBtn(backX, backY, backW, backH, 'VOLTAR', backHov);

  drawVignette();
};

// ==================== RENDER ====================
const render = (dt) => {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const applyShake = shakeAmount > 0 && game.state === 'combat';
  if (applyShake) {
    const sx = Math.round(rand(-shakeAmount, shakeAmount));
    const sy = Math.round(rand(-shakeAmount, shakeAmount));
    ctx.setTransform(1, 0, 0, 1, sx, sy);
  }

  switch (game.state) {
    case 'menu': renderMenu(dt); break;
    case 'map': renderMap(); break;
    case 'combat':
      renderCombat();
      if (tutorial.active) renderTutorialOverlay();
      if (bossIntro) renderBossIntro();
      break;
    case 'rewards': renderRewards(); break;
    case 'event': renderEvent(); break;
    case 'shop': renderShop(); break;
    case 'rest': renderRest(); break;
    case 'gameover': renderGameOver(); break;
    case 'victory': renderVictory(); break;
    case 'charSelect': renderCharSelect(); break;
    case 'tutorialAsk': renderTutorialAsk(); break;
    case 'altar': renderAltar(); break;
    case 'bestiary': renderBestiary(); break;
    case 'cardex': renderCardex(); break;
    case 'trophies': renderTrophies(); break;
  }

  renderParticles();
  renderFloatingTexts();

  if (applyShake && game.state === 'combat') {
    renderSlashEffects();
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0);

  if (damageFlashTimer > 0 && game.state === 'combat') {
    ctx.globalAlpha = clamp(damageFlashTimer, 0, 1) * 0.3;
    ctx.fillStyle = '#bb0000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (game.state === 'combat') {
    if (!applyShake) renderSlashEffects();
    renderGlitch();
  }

  // --- Top-right toolbar: [?] [II] [♫] ---
  {
    const mob = isTouchDevice;
    const btnSize = mob ? 32 : 22;
    const btnGap = mob ? 10 : 8;
    const btnY = mob ? 22 : 18;
    const rightMargin = mob ? 16 : 14;
    const inGame = !['menu', 'gameover', 'victory', 'charSelect', 'tutorialAsk', 'altar', 'trophies', 'bestiary', 'cardex'].includes(game.state);

    // Music toggle (rightmost)
    const mX = W - rightMargin;
    const playing = bgmStarted && !bgmMuted && bgmLayers.current && !bgmLayers.current.paused;
    const mHov = isInRect(mouse.x, mouse.y, mX - btnSize / 2, btnY - btnSize / 2, btnSize, btnSize);
    ctx.save();
    if (mob) {
      ctx.fillStyle = mHov ? '#e8dcc822' : '#e8dcc80e';
      ctx.beginPath();
      ctx.arc(mX, btnY, btnSize * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = playing ? (mHov ? '#aaccee' : '#7799bb') : (mHov ? '#667788' : '#445566');
    ctx.font = `${mob ? 20 : 14}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('♫', mX, btnY);
    if (!playing) {
      ctx.strokeStyle = '#aa3344';
      ctx.lineWidth = mob ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.moveTo(mX - 8, btnY - 10);
      ctx.lineTo(mX + 8, btnY + 6);
      ctx.stroke();
    }
    ctx.restore();

    // Pause button (second from right)
    if (!gamePaused && !showHelp && inGame) {
      const pbX = mX - btnSize - btnGap;
      const showPause = game.state === 'combat' || inGame;
      if (showPause) {
        const pbHov = isInRect(mouse.x, mouse.y, pbX - btnSize / 2, btnY - btnSize / 2, btnSize, btnSize);
        ctx.save();
        if (mob) {
          ctx.fillStyle = pbHov ? '#e8dcc822' : '#e8dcc80e';
          ctx.beginPath();
          ctx.arc(pbX, btnY, btnSize * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = pbHov ? '#e8dcc877' : '#e8dcc833';
        const barW = mob ? 5 : 3.5, barH = mob ? 16 : 12, barGap = mob ? 4 : 2.5;
        ctx.fillRect(pbX - barW - barGap / 2, btnY - barH / 2, barW, barH);
        ctx.fillRect(pbX + barGap / 2, btnY - barH / 2, barW, barH);
        ctx.restore();
      }

      // Help button (third from right)
      const hbX = pbX - btnSize - btnGap;
      const hbHov = isInRect(mouse.x, mouse.y, hbX - btnSize / 2, btnY - btnSize / 2, btnSize, btnSize);
      ctx.save();
      if (mob) {
        ctx.fillStyle = hbHov ? '#e8dcc822' : '#e8dcc80e';
        ctx.beginPath();
        ctx.arc(hbX, btnY, btnSize * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.font = `bold ${mob ? 18 : 13}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = hbHov ? '#e8dcc888' : '#e8dcc833';
      ctx.fillText('?', hbX, btnY);
      ctx.restore();
    }

    if (!mob) {
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillStyle = '#9a9088';
      if (inGame && !gamePaused && !showHelp) ctx.fillText('ESC = Pausa  |  H = Ajuda', 10, H - 5);
      ctx.restore();
    }
  }

  // ==================== PAUSE OVERLAY ====================
  if (gamePaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    const sk = 8;
    const titleW = 320, titleH = 50;
    const titleX = W / 2 - titleW / 2, titleY = H / 2 - 180;
    ctx.fillStyle = '#7733aa';
    ctx.beginPath();
    ctx.moveTo(titleX - 6 + sk, titleY - 4);
    ctx.lineTo(titleX + titleW + 6 + sk, titleY - 4);
    ctx.lineTo(titleX + titleW + 10 - sk, titleY + titleH + 4);
    ctx.lineTo(titleX - 10 - sk, titleY + titleH + 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#0c081e';
    ctx.beginPath();
    ctx.moveTo(titleX + sk, titleY);
    ctx.lineTo(titleX + titleW + sk, titleY);
    ctx.lineTo(titleX + titleW + 4 - sk, titleY + titleH);
    ctx.lineTo(titleX - 4 - sk, titleY + titleH);
    ctx.closePath();
    ctx.fill();
    ctx.font = 'bold italic 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#d4a645';
    ctx.fillText('PAUSADO', W / 2, titleY + titleH / 2);

    const pmW = isTouchDevice ? 400 : 300, pmBtnH = isTouchDevice ? 58 : 44, pmGap = isTouchDevice ? 16 : 12;
    const pmX = W / 2 - pmW / 2;
    const pmStartY = H / 2 - 80;
    const pauseBtns = ['CONTINUAR', 'AJUDA', 'TROFÉUS', 'MENU PRINCIPAL'];
    const pauseBtnColors = ['#7733aa', '#2a55aa', '#d4a645', '#555060'];
    for (let pi = 0; pi < pauseBtns.length; pi++) {
      const by = pmStartY + pi * (pmBtnH + pmGap);
      const hov = isInRect(mouse.x, mouse.y, pmX, by, pmW, pmBtnH);
      ctx.fillStyle = pauseBtnColors[pi];
      ctx.beginPath();
      ctx.moveTo(pmX - 4 + sk, by - 3);
      ctx.lineTo(pmX + pmW + 4 + sk, by - 3);
      ctx.lineTo(pmX + pmW + 6 - sk, by + pmBtnH + 3);
      ctx.lineTo(pmX - 6 - sk, by + pmBtnH + 3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = hov ? '#1a1230' : '#0c081e';
      ctx.beginPath();
      ctx.moveTo(pmX + sk, by);
      ctx.lineTo(pmX + pmW + sk, by);
      ctx.lineTo(pmX + pmW + 3 - sk, by + pmBtnH);
      ctx.lineTo(pmX - 3 - sk, by + pmBtnH);
      ctx.closePath();
      ctx.fill();
      ctx.font = isTouchDevice ? 'bold italic 22px sans-serif' : 'bold italic 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = hov ? pauseBtnColors[pi] : '#c8c0b0';
      ctx.fillText(pauseBtns[pi], pmX + pmW / 2, by + pmBtnH / 2);
    }

    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#9a9088';
    ctx.fillText('Pressione ESC para voltar', W / 2, H - 20);
    ctx.restore();
  }

  // ==================== HELP OVERLAY ====================
  if (showHelp) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H);

    const hpX = 60, hpY = 30, hpW = W - 120, hpH = H - 60;
    const skew = -0.04;
    ctx.save();

    ctx.fillStyle = '#7733aa';
    ctx.beginPath();
    ctx.moveTo(hpX - 5, hpY - 4);
    ctx.lineTo(hpX + hpW + 5, hpY - 4);
    ctx.lineTo(hpX + hpW + 8, hpY + hpH + 4);
    ctx.lineTo(hpX - 8, hpY + hpH + 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#0c0c14';
    ctx.fillRect(hpX, hpY, hpW, hpH);

    // Close button
    const closeX = hpX + hpW - 25, closeY = hpY + 12;
    const closeHov = isInRect(mouse.x, mouse.y, closeX - 12, closeY - 12, 24, 24);
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = closeHov ? '#cc77ff' : '#7733aa';
    ctx.fillText('✕', closeX, closeY);

    // Title
    ctx.font = 'bold italic 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7733aa';
    ctx.fillText('GUIA DO JOGO', hpX + hpW / 2, hpY + 20);

    // Clip content area
    const contentTop = hpY + 40, contentBot = hpY + hpH - 10;
    ctx.save();
    ctx.beginPath();
    ctx.rect(hpX + 10, contentTop, hpW - 20, contentBot - contentTop);
    ctx.clip();

    const helpSections = [
      { title: 'CONTROLES', items: [
        'ESC — Abrir/fechar menu de pausa',
        'H — Abrir/fechar esta tela de ajuda',
        'Clique — Selecionar cartas, alvos, botões',
        'Scroll — Rolar lista de cartas na Forja',
      ]},
      { title: 'COMO JOGAR', items: [
        'Navegue pelo mapa escolhendo nós para explorar.',
        'Enfrente combates usando cartas do seu deck.',
        'Cada turno você recebe Energia para jogar cartas.',
        'Vença combates para ganhar novas cartas e relíquias.',
        'Visite Fogueiras para curar ou melhorar cartas.',
        'Compre na Loja com ouro acumulado.',
        'Derrote o Boss do ato para avançar!',
      ]},
      { title: 'TIPOS DE CARTA', items: [
        'ATAQUE (vermelho) — Causa dano aos inimigos.',
        'HABILIDADE (azul) — Ganha bloqueio, buffs ou efeitos.',
        'PODER (amarelo) — Efeito permanente no combate. Jogue uma vez.',
      ]},
      { title: 'STATUS DO JOGADOR', items: [
        'STR (Força) — Aumenta dano de ataques.',
        'DEX (Destreza) — Aumenta bloqueio ganho.',
        'VUL (Vulnerável) — Recebe 50% mais dano.',
        'WEAK (Fraco) — Causa 25% menos dano.',
        'THN (Espinhos) — Reflete dano ao ser atacado.',
        'FURT (Furtividade) — Bônus ao próximo ataque furtivo.',
        'BARRICADE — Bloqueio persiste entre turnos.',
        'MTL (Metalizar) — Ganha bloqueio automaticamente no fim do turno.',
        'DEM (Demoníaco) — Ganha Força extra por turno.',
      ]},
      { title: 'STATUS DOS INIMIGOS', items: [
        '☠ Veneno — Perde HP no início de cada turno. Diminui por 1.',
        '🛡 Bloqueio — Reduz o dano recebido.',
        'STR (Força) — Aumenta o dano dos ataques inimigos.',
      ]},
      { title: 'POÇÕES', items: [
        'Cura (verde) — Restaura 30% do HP máximo.',
        'Bloqueio (azul) — +12 de Bloqueio imediato.',
        'Força (vermelho) — +2 de Força neste combate.',
        'Energia (laranja) — +2 de Energia neste turno.',
        'Clique no slot da poção durante o combate para usar.',
        'Máximo de 3 poções. Compre na loja!',
      ]},
      { title: 'NÓS DO MAPA', items: [
        '⚔ Combate — Batalha contra inimigos normais.',
        '💀 Elite — Inimigos mais fortes, melhores recompensas.',
        '👑 Boss — Chefe do ato. Derrote para avançar.',
        '? Evento — Escolhas com consequências variadas.',
        '$ Loja — Compre cartas, relíquias e poções.',
        '🔥 Fogueira — Cure HP ou melhore uma carta.',
      ]},
      { title: 'RELÍQUIAS', items: [
        'Itens passivos que dão bônus permanentes na run.',
        'Ganhas em combates de Elite/Boss ou eventos.',
        'Passe o mouse sobre elas no mapa para ver o efeito.',
      ]},
      { title: 'PERSONAGENS', items: [
        'PACTO — Equilibrado. Força + Bloqueio.',
        'SOMBRA — Veneno + Furtividade. Dano gradual.',
        'CINZA — Poderes + Canalização. Escalonamento.',
        'Desbloqueie com Almas Sombrias no Altar.',
      ]},
      { title: 'ALMAS SOMBRIAS', items: [
        'Moeda permanente ganha ao fim de cada run.',
        'Quanto mais longe chegar, mais almas ganha.',
        'Use no Altar das Almas para upgrades permanentes.',
        'Use para desbloquear novos personagens.',
      ]},
    ];

    let hy = contentTop + 10 - helpScrollY;
    const lx = hpX + 30;
    for (const section of helpSections) {
      ctx.font = 'bold italic 15px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#7733aa';
      ctx.fillText(section.title, lx, hy);
      hy += 22;
      ctx.font = '12px sans-serif';
      ctx.fillStyle = '#c0b8a8';
      for (const item of section.items) {
        ctx.fillText('• ' + item, lx + 10, hy);
        hy += 17;
      }
      hy += 12;
    }

    const helpContentH = hy + helpScrollY - contentTop - 10;
    const helpMaxScroll = Math.max(0, helpContentH - (contentBot - contentTop));
    helpScrollY = clamp(helpScrollY, 0, helpMaxScroll);

    ctx.restore();

    // Scroll indicators for help
    if (helpScrollY > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#7733aa';
      ctx.fillText('▲', hpX + hpW / 2, contentTop + 10);
      ctx.globalAlpha = 1;
    }
    if (helpScrollY < helpMaxScroll) {
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#7733aa';
      ctx.fillText('▼', hpX + hpW / 2, contentBot - 5);
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#9a9088';
    ctx.fillText('ESC ou H para fechar  |  Scroll para rolar', W / 2, H - 8);
    ctx.restore();
  }

  // ==================== TROPHY TOAST ====================
  if (!trophyToast && trophyQueue.length > 0) {
    const t = trophyQueue.shift();
    trophyToast = { trophy: t, timer: 0, phase: 'in' };
    sfxBuff();
  }
  if (trophyToast) {
    const tt = trophyToast;
    tt.timer += 1 / 60;
    let yOff = -80;
    if (tt.phase === 'in') {
      const p = clamp(tt.timer / 0.4, 0, 1);
      yOff = -80 + p * 80;
      if (p >= 1) { tt.phase = 'show'; tt.timer = 0; }
    } else if (tt.phase === 'show') {
      yOff = 0;
      if (tt.timer >= 3) { tt.phase = 'out'; tt.timer = 0; }
    } else if (tt.phase === 'out') {
      const p = clamp(tt.timer / 0.4, 0, 1);
      yOff = -p * 80;
      if (p >= 1) trophyToast = null;
    }

    if (trophyToast) {
      const tier = TROPHY_TIERS[tt.trophy.tier];
      const tw = 380, th = 60;
      const tx = W / 2 - tw / 2, ty = 10 + yOff;

      ctx.save();
      ctx.globalAlpha = clamp(1 + yOff / 40, 0, 1);

      ctx.fillStyle = '#0a0a14ee';
      ctx.beginPath();
      ctx.moveTo(tx + 6, ty);
      ctx.lineTo(tx + tw - 6, ty);
      ctx.lineTo(tx + tw, ty + th);
      ctx.lineTo(tx, ty + th);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = tier.color;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.save();
      ctx.shadowColor = tier.color;
      ctx.shadowBlur = 12;
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = tier.color;
      const icon = tt.trophy.tier === 'platinum' ? '💎' : '🏆';
      ctx.fillText(icon, tx + 30, ty + th / 2);
      ctx.restore();

      ctx.font = 'bold italic 14px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = tier.color;
      ctx.fillText(tt.trophy.n, tx + 55, ty + 20);

      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#9a9088';
      ctx.fillText(tt.trophy.d, tx + 55, ty + 40);

      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillStyle = tier.color + '88';
      ctx.fillText(tier.n.toUpperCase(), tx + tw - 12, ty + 14);

      ctx.restore();
    }
  }

  if (game.fadeAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${clamp(game.fadeAlpha, 0, 1)})`;
    ctx.fillRect(0, 0, W, H);
  }
};

// ==================== BOSS INTRO OVERLAY ====================
const renderBossIntro = () => {
  if (!bossIntro) return;
  const data = BOSS_INTRO[bossIntro.key];
  if (!data) return;

  const totalDur = 4.5;
  const elapsed = totalDur - bossIntro.timer;
  const mob = isTouchDevice;

  const fadeIn = Math.min(elapsed / 0.6, 1);
  const fadeOut = bossIntro.timer < 0.8 ? bossIntro.timer / 0.8 : 1;
  const alpha = fadeIn * fadeOut;

  ctx.save();

  ctx.fillStyle = `rgba(0,0,0,${0.65 * alpha})`;
  ctx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;
  const barH = mob ? 160 : 130;
  const barY = H / 2 - barH / 2;

  const slideIn = easeOutElastic(Math.min(elapsed / 1.2, 1));
  const slideX = (1 - slideIn) * (-W * 0.5);

  ctx.globalAlpha = alpha;

  const barGrd = ctx.createLinearGradient(0, barY, 0, barY + barH);
  barGrd.addColorStop(0, 'rgba(10,6,20,0.0)');
  barGrd.addColorStop(0.15, 'rgba(10,6,20,0.95)');
  barGrd.addColorStop(0.85, 'rgba(10,6,20,0.95)');
  barGrd.addColorStop(1, 'rgba(10,6,20,0.0)');
  ctx.fillStyle = barGrd;
  ctx.fillRect(0, barY, W, barH);

  ctx.strokeStyle = data.color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = alpha * 0.6;
  ctx.beginPath();
  ctx.moveTo(0, barY + 8);
  ctx.lineTo(W, barY + 8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, barY + barH - 8);
  ctx.lineTo(W, barY + barH - 8);
  ctx.stroke();
  ctx.globalAlpha = alpha;

  ctx.textAlign = 'center';

  const titleSize = mob ? 28 : 24;
  ctx.font = `bold ${titleSize}px sans-serif`;
  ctx.shadowColor = data.color;
  ctx.shadowBlur = 20;
  ctx.fillStyle = data.color;
  const titleY = barY + (mob ? 42 : 36) + slideX * 0.01;
  ctx.save();
  ctx.translate(W / 2 + slideX, titleY);
  ctx.fillText(`— ${data.title} —`, 0, 0);
  ctx.restore();
  ctx.shadowBlur = 0;

  const lineSize = mob ? 16 : 14;
  ctx.font = `italic ${lineSize}px sans-serif`;
  ctx.fillStyle = PAL.ivory;

  for (let i = 0; i < data.lines.length; i++) {
    const lineDelay = 0.8 + i * 0.7;
    const lineAlpha = Math.min(Math.max((elapsed - lineDelay) / 0.5, 0), 1) * fadeOut;
    const lineSlide = (1 - Math.min(Math.max((elapsed - lineDelay) / 0.6, 0), 1)) * 30;

    ctx.globalAlpha = lineAlpha * alpha;
    const ly = barY + (mob ? 76 : 66) + i * (mob ? 28 : 24) + lineSlide;
    ctx.fillText(data.lines[i], W / 2, ly);
  }

  ctx.globalAlpha = alpha;
  const skipAlpha = elapsed > 1.5 ? Math.min((elapsed - 1.5) / 0.5, 1) * fadeOut : 0;
  if (skipAlpha > 0) {
    ctx.globalAlpha = skipAlpha * 0.5 * alpha;
    ctx.font = `${mob ? 12 : 11}px sans-serif`;
    ctx.fillStyle = '#8a7a66';
    ctx.fillText('toque para pular', W / 2, barY + barH - (mob ? 18 : 16));
  }

  ctx.restore();
};

// ==================== TUTORIAL OVERLAY ====================
const getTutorialSpotlight = () => {
  const mob = isTouchDevice;
  const step = TUTORIAL_STEPS[tutorial.step];
  if (!step) return null;

  const getCardSpot = (namePrefix) => {
    for (let i = 0; i < combat.hand.length; i++) {
      const c = combat.hand[i];
      const data = getCardData(c);
      if (data.n.startsWith(namePrefix)) {
        return { arrowOnly: true, cx: c.x, cy: c.y - CARD_H * c.scale * 0.5 };
      }
    }
    return null;
  };

  switch (step.target) {
    case 'card_attack':
      return getCardSpot('Golpe');
    case 'card_defend':
    case 'card_defend_confirm':
      return getCardSpot('Defesa');
    case 'enemy': {
      const e = combat.enemies[0];
      if (!e || e.dead) return null;
      const sizeMult = { imp: 0.7, cultist: 0.85, skeleton: 0.75, nob: 1.15, demonKnight: 1.25, darkElf: 0.85, chosen: 0.95, snake: 0.6, wraith: 0.95, lich: 1.1, gargoyle: 1.05, soulEater: 0.95, zealot: 0.8, dragon: 1.3, theVoid: 1.4 };
      const bs = (mob ? 130 : 90) * (sizeMult[e.key] || 1);
      const spotW = bs * 1.3, spotH = bs * 1.7;
      return { x: e.x - spotW / 2, y: e.y - bs * 0.8, w: spotW, h: spotH, rounded: 16 };
    }
    case 'end_turn': {
      const endBtnW = mob ? 160 : 120, endBtnH = mob ? 54 : 40;
      const endBtnX = W - endBtnW - 20, endBtnY = mob ? 340 : 420;
      const skewOff = -0.08 * (endBtnY + endBtnH / 2);
      return { x: endBtnX + skewOff - 8, y: endBtnY - 4, w: endBtnW + 16, h: endBtnH + 8, rounded: 6 };
    }
    case 'potion': {
      const potSlotW = mob ? 56 : 42, potSlotH = mob ? 56 : 42;
      const potSlotX = mob ? 340 : 290, potSlotY = mob ? 345 : 420;
      return { x: potSlotX - 6, y: potSlotY - 6, w: potSlotW + 12, h: potSlotH + 12 };
    }
    case 'info':
      return null;
    default:
      return null;
  }
};

const renderTutorialOverlay = () => {
  if (!tutorial.active || tutorial.finished) return;
  const step = TUTORIAL_STEPS[tutorial.step];
  if (!step) return;

  const t = Date.now() / 1000;
  const spot = getTutorialSpotlight();

  ctx.save();

  if (spot && spot.arrowOnly) {
    let hx0 = W, hy0 = H, hx1 = 0, hy1 = 0;
    for (let i = 0; i < combat.hand.length; i++) {
      const c = combat.hand[i];
      const s = c.scale;
      const cw = CARD_W * s, ch = CARD_H * s;
      const skOff = cw * 0.7;
      hx0 = Math.min(hx0, c.x - cw / 2 - skOff);
      hy0 = Math.min(hy0, c.y - ch / 2 - 10);
      hx1 = Math.max(hx1, c.x + cw / 2 - 20);
      hy1 = Math.max(hy1, c.y + ch / 2 + 10);
    }
    const pad = 10;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.rect(0, 0, W, H);
    ctx.roundRect(hx0 - pad, hy0 - pad, hx1 - hx0 + pad * 2, hy1 - hy0 + pad * 2, 12);
    ctx.closePath();
    ctx.fill('evenodd');

    ctx.strokeStyle = PAL.gold;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(hx0 - pad, hy0 - pad, hx1 - hx0 + pad * 2, hy1 - hy0 + pad * 2, 12);
    ctx.stroke();

    ctx.save();
    const bob = Math.sin(t * 4) * 8;
    const ax = spot.cx, ay = spot.cy - 14 + bob;
    const sz = isTouchDevice ? 28 : 22;

    ctx.shadowColor = PAL.gold;
    ctx.shadowBlur = 18 + Math.sin(t * 3) * 6;
    ctx.fillStyle = PAL.gold;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - sz, ay - sz * 1.3);
    ctx.lineTo(ax - sz * 0.35, ay - sz * 1.3);
    ctx.lineTo(ax - sz * 0.35, ay - sz * 2.4);
    ctx.lineTo(ax + sz * 0.35, ay - sz * 2.4);
    ctx.lineTo(ax + sz * 0.35, ay - sz * 1.3);
    ctx.lineTo(ax + sz, ay - sz * 1.3);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  } else if (spot) {
    const pulse = 2 + Math.sin(t * 3) * 2;
    const r = spot.rounded || 14;
    const sx = spot.x - pulse, sy = spot.y - pulse;
    const sw = spot.w + pulse * 2, sh = spot.h + pulse * 2;

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.rect(0, 0, W, H);
    ctx.roundRect(sx, sy, sw, sh, r);
    ctx.closePath();
    ctx.fill('evenodd');

    ctx.strokeStyle = PAL.gold;
    ctx.lineWidth = 2.5 + Math.sin(t * 4) * 0.8;
    ctx.shadowColor = PAL.gold;
    ctx.shadowBlur = 12 + Math.sin(t * 3) * 5;
    ctx.beginPath();
    ctx.roundRect(sx, sy, sw, sh, r);
    ctx.stroke();
    ctx.shadowBlur = 0;

    const arrowY = sy - 22 + Math.sin(t * 4) * 6;
    const arrowX = sx + sw / 2;
    ctx.fillStyle = PAL.gold;
    ctx.beginPath();
    ctx.moveTo(arrowX - 10, arrowY - 12);
    ctx.lineTo(arrowX + 10, arrowY - 12);
    ctx.lineTo(arrowX, arrowY);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
  }

  const mob = isTouchDevice;
  const boxW = Math.min(W - 40, 560);
  const boxH = step.target === 'info' ? 140 : 100;
  const boxX = W / 2 - boxW / 2;
  const boxY = step.target === 'enemy' ? H - boxH - 30 : 20;

  ctx.fillStyle = 'rgba(16,10,40,0.92)';
  ctx.strokeStyle = PAL.gold;
  ctx.lineWidth = 2;
  ctx.shadowColor = PAL.gold;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(boxX, boxY, boxW, boxH, 14);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.shadowColor = PAL.gold;
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffffff';
  const fontSize = mob ? 19 : 17;
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = 'center';
  const lines = wrapText(step.msg, boxW - 40, fontSize, 'sans-serif');
  ctx.font = `bold ${fontSize}px sans-serif`;
  const lineH = mob ? 24 : 22;
  const textAreaH = step.target === 'info' ? boxH - 68 : boxH;
  const textStartY = boxY + textAreaH / 2 - (lines.length - 1) * lineH / 2;
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], W / 2, textStartY + i * lineH);
  }
  ctx.shadowBlur = 0;

  if (step.target === 'info') {
    const btnW = 180, btnH = 44;
    const btnX = W / 2 - btnW / 2, btnY = boxY + boxH - btnH - 12;
    const hov = isInRect(mouse.x, mouse.y, btnX, btnY, btnW, btnH);

    ctx.fillStyle = hov ? 'rgba(60,40,20,0.9)' : 'rgba(30,20,50,0.9)';
    ctx.strokeStyle = PAL.gold;
    ctx.lineWidth = hov ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 10);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = PAL.gold;
    ctx.font = `bold ${mob ? 16 : 14}px sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.fillText('Entendi!', W / 2, btnY + btnH / 2);

    tutorial._infoBtnRect = { x: btnX, y: btnY, w: btnW, h: btnH };
  } else {
    tutorial._infoBtnRect = null;
  }

  const stepText = `Passo ${tutorial.step + 1} de ${TUTORIAL_STEPS.length}`;
  ctx.fillStyle = 'rgba(200,180,220,0.6)';
  ctx.font = `${mob ? 12 : 11}px sans-serif`;
  ctx.fillText(stepText, W / 2, boxY + boxH + 16);

  ctx.restore();
};

// ==================== TUTORIAL ASK SCREEN ====================
const renderTutorialAsk = () => {
  ctx.fillStyle = '#08061a';
  ctx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#7733aa';
  ctx.lineWidth = 1;
  const lineOff = (t * 15) % 60;
  for (let li = -H; li < W + H; li += 60) {
    ctx.beginPath();
    ctx.moveTo(li + lineOff, 0);
    ctx.lineTo(li + lineOff - H * 0.6, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.save();

  const panelW = 600, panelH = 260;
  const px = W / 2 - panelW / 2, py = H / 2 - panelH / 2 - 20;
  ctx.fillStyle = 'rgba(20,14,46,0.92)';
  ctx.strokeStyle = PAL.gold;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(px, py, panelW, panelH, 18);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = PAL.ivory;
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('⚔ Tutorial de Combate ⚔', W / 2, py + 50);

  ctx.fillStyle = '#c8b8e0';
  ctx.font = '16px sans-serif';
  ctx.fillText('Deseja aprender as mecânicas básicas do jogo', W / 2, py + 90);
  ctx.fillText('em uma batalha guiada?', W / 2, py + 112);

  const bw = 220, bh = 56, bgap = 40;
  const bx1 = W / 2 - bw - bgap / 2, bx2 = W / 2 + bgap / 2;
  const by = H / 2 + 40;

  for (let bi = 0; bi < 2; bi++) {
    const bx = bi === 0 ? bx1 : bx2;
    const label = bi === 0 ? 'Sim, vamos lá!' : 'Pular';
    const hovered = isInRect(mouse.x, mouse.y, bx, by, bw, bh);
    const baseCol = bi === 0 ? PAL.gold : '#665577';
    const glowCol = bi === 0 ? PAL.gold : '#8877aa';

    if (hovered) {
      ctx.shadowColor = glowCol;
      ctx.shadowBlur = 18;
    }
    ctx.fillStyle = hovered ? (bi === 0 ? '#3a2a10' : '#2a2040') : 'rgba(20,14,46,0.8)';
    ctx.strokeStyle = baseCol;
    ctx.lineWidth = hovered ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 12);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = bi === 0 ? PAL.gold : PAL.ivory;
    ctx.font = `bold ${bi === 0 ? 18 : 16}px sans-serif`;
    ctx.fillText(label, bx + bw / 2, by + bh / 2 + 6);
  }

  ctx.restore();
  drawVignette();
};

// ==================== GAME LOOP ====================
let lastTime = 0;
const gameLoop = (timestamp) => {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;
    update(dt);
    render(dt);
  } catch (e) {
    console.error('Game loop error:', e);
  }
  requestAnimationFrame(gameLoop);
};

requestAnimationFrame(gameLoop);

})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
